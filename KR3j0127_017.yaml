body:
  text: 鶴林玉露補遺宋羅大經撰孟子釋公劉之詩曰故居者有積倉行者有裹糧也然後可以爰方啟行釋烝民之詩曰故有物必有則民之秉彞也故好是懿徳只添三兩字意義粲然六經古註亦皆簡潔不為繁辭朱文公毎病近世解經者推測太廣議論太多曰説得雖好聖人從初却元不曾有此意雖以吕成公之書解亦但言其熱閙而已盖不滿之辭也後来文公作易傳詩傳其辭極簡唐張參為國子司業手寫九經毎言讀書不如寫書髙宗以萬乗之尊萬幾之繁乃亦親洒宸翰遍寫九經雲章爛然終始如一日古帝王所未有也又嘗御書漢光武紀賜執政徐俯曰卿勸朕讀光武紀朕思讀十徧不如寫一徧今以賜卿聖學之勤如此史記張儀論韓地險惡曰民之食大抵飯菽羮藿此倒句也昌黎文春與猿吟兮秋鶴與飛淮之水舒舒楚山直叢叢亦此類春秋星隕如雨釋者曰如而也歐陽公集古録載後漢郭先生碑云其長也寛舒如好施是以宗族歸懐東坡得古鏡背有銘云漢有善銅出白陽取為鏡清如明皆訓如為而也昌黎汴州詩云母從子走者為誰大夫夫人留後兒昨日乗車騎大馬坐者起趨乗者下廟堂不肯用干戈嗚呼奈汝母子何為汴州之亂留後陸長源遭殺作也方董晉帥汴昌黎在幕中晉專行姑息知軍驕難制變在旦夕且死遺戒車速發及長源代之繩以嚴急軍果亂官屬多死之昌黎隨晉喪已去汴獲免夫長源固失矣晉不能酌寛猛之中潛消事變乃以姑息偷免其身使相激相形産後来之禍又不能先以一語忠告長源烏得無罪昌黎在幕中盖亦與有責矣此詩末句似有愧於中而為自解之辭左氏傳鞌之戰邴夏御齊侯逢丑父為右齊師敗績丑父與公易位為晉韓厥所及丑父使公下如蕐泉取飲而逃韓厥獻丑父郤獻子将戮之呼曰自今無有代其君任患者有一於此將為戮乎郤子曰人不難以死免其君我戮之不祥赦之以勸事君者此與紀信詐乗漢王之車以免高祖者何異晉宥丑父而楚焚紀信項氏之不長也宜哉張魏公貶零陵有書數笈自隨讒者謂其中皆與蜀士往来謀據西蜀之書髙宗命遣人盡録以來臨軒發視乃皆書册雖有尺牘率皆憂國愛君之語此外唯葛裘布衾類多垢敝上惻然曰張浚一貧如此哉乃遣使馳賜金三百兩秦檜令宣言於外謂賜浚死門生從者聞之垂泣告公公曰浚罪固當死若果如所傳朝服拜命就戮以謝國家可也何以泣為問使者為誰殿帥楊存中之子也公曰吾生矣存中吾故部曲朝廷誠欲誅浚必不遣其子来已而使者拜於馬前乃獲賜金之命公之在秦也開幕延賔鑄銅為印形迹似稍專故有以來讒者之口然反因此得以自明又賴賜金以自活天果不佑忠賢乎古詩云人生不滿百常懐千嵗憂而淵明以五字盡之曰世短意嘗多是也東坡云意長日月促則倒轉陶句爾吕氏春秋云今兹美禾来兹美麥注云兹年也公羊傳云諸侯有疾曰負兹注云兹新生草也一年草生一畨故以兹為年古詩云為樂當及時何能待來兹左氏傳五稔杜詩十暑岷山葛皆此意桓温雄猛盖一時賔僚相從燕賞豈應有失禮於前者孟嘉落㡌恐如禰正平䙝服摻撾嫚侮曹瞞之意陶淵明嘉之甥也為嘉作傳稱其在朝仗正門無雜賔則嘉亦一時之望乃肯從温何也温嘗從容謂曰人不可無勢我乃能駕馭卿亦頗有相靳之意辛幼安九日詞云雖與老兵供一笑落㡌將軍華髮莫倚忘懐西風也解㸃檢尊前客凄涼今古眼中三兩飛蝶意謂嘉不當從温故西風落其㡌以貶之若免冠然周瑜赤壁謝安淝水冦萊公澶淵陳魯公采石四勝大略相似杜牧云東風不與周郎便銅雀春深鎖二喬意亦著矣謝安圍棋别墅真是矯情鎮物喜出望外宜其折屐澶淵之役畢士安有相公交取鶻崙官家之説髙瓊有好唤宰相來吟兩首詩之説則當時策略亦自可見天發一矢之句王荆公句意與杜牧同采石之師若非逆亮暴急嗜殺自激三軍之變亦未易驅攘是時亮雖遭殘衂北歸紀律肅然無一人叛亡此豈易勝之師乎文公曰謝安之於桓温陳魯公之於完顔亮幸而捱得他死爾要之吳晉乃天幸宋朝真天助也張儀云兵不如者勿與挑戰粟不如者勿與持乆二語用兵者所當知守城必刼寨劉信叔守順昌以數千人摧烏珠數十萬衆刼寨之力也守城不刼寨是守死爾有士大夫於京師買一妾自言是蔡太師府包子厨中人一日令其作包子辭以不能詰之曰既是包子厨中人何為不能作包子對曰妾乃包子厨中縷葱絲者也曾無疑乃周益公門下士有委之作志銘者無疑援此事以辭曰某於益公之門乃包子厨中縷葱絲者也焉能作包子哉鄭注召對浴堂門彗長三尺韓琦賜第集英殿雲見五色君子小人之進天象昭昭如此俗語稱利市亦有所祖左氏傳鄭人盟商人之辭曰爾無我叛我無强賈爾有利市實賄我勿與之吳子之正孫子之竒兵法盡在是矣吳子似論語孫子似孟子吾郡陳國材詩云紅日晚天三四鴈碧波春水一雙鷗周益公楊誠齋盛稱之胡澹菴為師清節先生制師之服張魏公為張無垢制友之服唐人詩云三條燭盡鐘初動九轉丹成鼎未開明月漸低人擾擾不知誰是謫仙才此唐試進之士見燭騐也白樂天奏狀云禮部試進士例用書册兼得通宵蓋亦不禁懐挾矣鶴林玉露補遺
