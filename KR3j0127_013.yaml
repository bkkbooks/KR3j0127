body:
  text: 鶴林玉露卷十三宋羅大經撰宋慶元初趙子直當國召朱文公為侍講文公欣然而至積誠感悟且編次講義以進寧宗喜令點句來他日文公請問上曰宫中常讀之大要在求放心耳公因益推明其説曰陛下既知學問之要願勉強而力行之退謂其徒曰上可與為善若常得賢者輔導天下有望矣然是時韓托胄自謂有夾日之功已居中用事公因進對面諫又約吏部侍郎彭子壽請對面發其姦且以書白趙丞相云當以厚賞酬其勞勿使干預朝政托胄於是謀逐公忽一日御批云朕閔卿耆老當此隆冬難立講已除卿宫觀內侍王德謙徑遣付下宰相執奏臺諫給舍爭疏皆不從時子壽出護使客回則公已去矣即上章攻托胄云昔元符間向宗良兄弟止緣交通賓客漏泄機密陳瓘抗章劾之謂自古戚里侵權便為衰世之象外家干政即是亡國之本亦如州縣之政只要權出守令若子弟親戚交通關節則姦人鼓舞良民怨咨如瓘此言不可不察今托胄所為不止如宗良朝無陳瓘莫能出力排之在太上皇朝始用薑特立大臣尚能逐之使去後用袁佐諫官尚能論之使懼不意陛下初政清明有臣如此乃無一人敢出一語則其聲勢可知矣上甚嘉納謂宰相曰托胄是朕親戚龜年是朕舊學極是難處宰相進兩留之説且謂龜年性剛乞宣諭留之上曰此人質直兼是隨龍舊僚四人兩人罷一人去只有龜年有事肯來説如此區處甚好其晚忽降省劄直批彭龜年豫郡宰相亦不知也自是衆君子皆逐矣上始初雖為托胄所誤然三十一年敬仁勤儉如一日天文示變齋心露禱禁中酒器以鍚代銀上元夜嘗熒燭清坐小黃門奏曰官家何不開燕上愀然曰爾何知外間百姓無飯喫朕飲酒何安嘗幸聚景園晚歸都人觀者爭入門蹂踐有死者上聞之深恨自是不復出文公格心之效終不可泯陳正甫草保安赦文云朕寅畏以保邦嚴恭而事帝雖不明不敏有慚四海望治之心然無怠無荒未始縱一毫從已之欲真能寫出寧宗心事天下誦之徐淵子九日詩云衰容不似秋容好坐上誰憐老孟嘉牢褁烏紗莫吹却免教白髮見黃花時一朝士和云呼兒為我整烏紗不是無心學孟嘉要摘金英滿頭插明朝還是過時花二詩興致皆佳未易優劣宋嘉定間加史丞相實封制云天欲治舍我誰也負孟軻濟世之才民不被若已推之挺伊尹佐王之略用經句而帖妥然過諛失體勳德如韓魏公荆公草加官制不過曰保兹天子進無浮實之名正是國人退有顧言之行或謂荆公素不滿於魏公故無甚褒之詞非也王言之體當然耳杜陵詩云桑麻深雨露燕雀半生成后山詩云輟耕扶日月起廢極吹噓或謂虛實不類殊不知生為造成為化吹為隂噓為陽氣勢力量與日月字正相配也觀李斯逐客之書則秦固以客興觀齊人松柏之歌則齊人又以客亡客何所不有哉在吾所擇耳子思孟子荀卿子順亦當時之客也如時君之不用何用之則秦之客又何足道先君竹谷老人早登慶元諸老之門晚年以其所自得者著畏説一篇其詞曰大凡人心不可不知所畏畏心之存亡善惡之所由判也是以古之君子內則畏父母畏尊長詩云豈敢愛之畏我父母又曰豈敢愛之畏我諸兄是也外則畏師友古語曰凜乎若嚴師之在側逸詩曰豈不欲往畏我友朋是也仰則畏天俯則畏人詩曰胡不相畏不畏于天又曰豈敢愛之畏人之多言是也夫惟心有所畏是故非禮不敢為非義不敢動一念有愧則心為之震掉一事有差則顔為之忸怩戰兢自持日寡其過而不自知其入於君子之域矣茍惟內不畏父母尊長之嚴外不畏儕朋師友之議仰不畏天俯不畏人猖狂妄行恣其所欲吾懼其不日而為小人之歸也由是而之習以成性居官則不畏三尺任職則不畏簡書攫金則不畏市人嗚呼士而至此不可以為士矣仲尼所謂小人之無忌憚者矣夫人之所以必畏乎彼者非為彼計也蓋將以防吾心之縱而自律乎吾身也是故以天子之尊且有所畏詩曰我其夙夜畏天之威書曰成王畏相孰謂士大夫而可不知所畏乎聖賢之聰明且有所畏魯論曰君子有三畏畏天命畏大人畏聖人之言孰謂學者而可不知所畏乎然則畏之時義大矣哉余每以此自警且以效切磋於朋友云先君此説出一時流輩潛心理學者咸以為不可易余同年歐陽景顔跋云造道必有門伊洛先覺以持敬為造道之門至矣盡矣蓋敬德之聚也此心才敬萬理森列此身才敬四體端固繇勉強至成熟此心此身斂然法度中可以為人矣然世之作偽假真者往往竊持敬之名蓋不肖之實內雖荏而色若厲焉行無防檢而步趨若安徐焉識者病之至有效前輩打破一敬字以為訕侮者又有以髙視濶步幅巾大袖而乞加懲絶者一世特立之士欲哀救之而志不能遂近世葉水心作敬亭後記至不以張思叔之言為然謂敬為學者之終事竊深疑焉近因校文至澧陽謁竹谷羅先生以所著畏説見教僕醒然若有所悟嗚呼畏即敬也使人知畏父母畏尊長畏天命畏師友畏公論一如先生所言欲不敬得乎每事有所持循而畏則其敬也莫非體察在已實事見面盎背臨淵履冰以偽自蓋者能之乎髙視濶步幅巾大袖假聲音笑貌以為敬求之於父母兄長師友之間多可憾焉人其以敬許之乎蓋先生以實而求敬故其敬不可偽世人以虛而求敬故其敬或可假是説也羽翼吾道其功豈淺淺哉至此則敬不可偽為而攻持敬者當自思矣宋紹熙甲寅太學諸生擬勸行樂表云周公欺我願焚酒誥於通衢孔子空言請束孝經於髙閣以勸為諷字字有來歷苗劉之亂張魏公在秀州議舉勤王之師一夕獨坐從者皆寢忽一人持刃立燭後公知為刺客徐問曰豈非苗傳劉正彥遣汝來殺我乎曰然公曰若是則取吾首以去可也曰我亦知書寧肯為賊用况公忠義如此豈忍害公恐公防間不嚴有繼至者故來相告爾公問欲金帛乎笑曰殺公何患無財然則留事我乎曰我有老母在河北未可留也問其姓名俯而不答攝衣躍而登屋屋瓦無聲時方月明去如飛明日公命取死囚斬之曰夜來獲姦細公後嘗於河北物色之不可得此又賢於鉏麑矣孰謂世間無竒男子乎殆是唐劍客之流也張宣公題南城云坡頭望西山秋意已如許雲影度江來霏霏半空雨東渚云團團凌風桂宛在水之東月色穿林影却下碧波中麗澤云長哦伐木詩佇立以望子日暮飛鳥歸門前長春水濯清云芙蓉豈不好濯濯清漣漪采去不盈把惆悵暮忘飢西嶼云繫舟西岸邉幅巾自來去島嶼花木深蟬鳴不知處采菱舟云散策下舸亭水清魚可數却上采菱舟乘風過南浦六詩平淡簡逺德人之言也陶淵明贈長沙公族祖云同源分𣲖人易世疏慨然寤歎念兹厥初老蘇族譜引云服始乎衰而至於緦而至於無服無服則親盡親盡則情盡情盡則喜不慶憂不弔喜不慶憂不弔則塗人也吾所以相視如塗人者其初兄弟也兄弟其初一人之身也悲夫正淵明詩意詩字少意多尤可涵泳胡淡庵乞斬秦檜得貶瀘溪先生王廷圭字民瞻以詩送之曰癡兒不了公家事男子要為天下奇亦貶辰陽太府寺丞陳剛中字彥柔以啓賀之云屈膝請和知廟堂禦侮之無䇿張膽論事喜樞庭經逺之有人身為南海之行名若泰山之重又云誰能屈大丈夫之志寧忍為小朝廷之謀知無不言願請尚方之劍不遇故去聊乘下澤之車貶安逺宰瀘溪晚年孝宗召赴闕除直祕閣一子扶掖上殿亦豫官夀踰九十寺丞竟死安逺無子其妻削髮為尼幸不幸之不同如此吉州縣江濱有石材廟隆祐太后避兵御舟泊廟下一夕夢神告曰速行兵至太后驚悟即命發舟指章貢敵果躡其後追至造口不及而還事定特封廟神剛應侯寺丞南行題詩廟柱云疏爵新剛應論功舊石材能形文母夢還訝佞人來海市為誰出衡雲豈自開乞靈如見告逐客幾時回卒不如其願悲夫楊誠齋初欲習宏詞科南軒曰此何足習盍相與趨聖門德行科乎誠齋大悟不復習作千慮䇿論詞科可罷曰孟獻子有友五人孟子已忘其三周室班爵之籍孟子已不能道其詳孟子亦安能中今之詞科哉晚年作詩示兒云素王開國道無臣一勝春風放十人莫羡榜頭年十八舊春過了又新春昌黎記夢詩末句云我寧屈曲自世間安能從汝巢神山朱文公定寧字作能字謂神仙亦且護短憑愚則與凡人意態不殊矣我若能屈曲諂媚自在世間可也安能巢神山以從汝哉正栁下惠枉道而事人何必去父母之邦之意只一字之差意味天淵敻别張耳陳餘魏之名士秦聞此兩人名購求張耳千金陳餘五百金二人變名姓之陳為里監門里吏嘗笞餘餘欲起耳躡之使受笞吏去耳引餘之桑下數之曰始吾與公言何如今見小辱而欲死一吏乎耳之見過餘逺矣餘卒敗死泜水上而耳事漢富貴夀考福流子孫非偶然也大智大勇必能忍小恥小忿彼其雲蒸龍變欲有所會豈與瑣瑣者校乎東坡論子房頴濱論劉項専説一忍字張公藝九世同居亦只是得此一字之力杜牧之云包羞忍恥是男兒舜命契敷五教孟子以為君臣父子夫婦兄弟朋友是也左氏傳晏子曰君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽去朋友而言婦姑又曰君令而不違臣共而不二父慈而教子孝而針兄愛而友弟敬而順夫和而義妻柔而正姑慈而從婦聽而婉五者之中唯兄弟婦姑專主於和順至於君雖得以令臣而不可違於理而妄作臣所以共君而不可二於道而曲從父慈其子必教以義方子孝其父必針其闕失夫以和倡婦尤當制之以義妻以柔從夫尤當自守以正蓋三者乃三綱也所繫尤重故於睦雍敬愛之中必有檢方規正之道庶幾各盡其分而三綱立矣國家一統之業其合而遂裂者王安石之罪也其裂而不復合者秦檜之罪也渡江以前王安石之説浸漬士大夫之肺腸不可得而洗滌渡江以後秦檜之説淪浹士大夫之骨髓不可得而針砭朝廷一有計校利害之心便非王道士大夫一有計校利害之心便非儒紹興間張登為尤溪宰視事之日請邑之耆老人士相見首問天字以何字對皆曰地又問地以何字對皆曰月又問利字以何字對皆曰害張曰誤矣今只知以利對害便只管要尋利去人人尋利其間多少事利只當以義字對因詳言義利之辨一提而退豺能殺虎鼠可害象一夫足以勝禹三户可以亡秦范雎蔡澤皆辨士太史公以之連傳然睢傾危澤明坦睢幽險詭祕危人骨肉全是小人意態澤方入關便宣言欲代雎至其所以告睢者皆消息虛實之正理睢必俟澤反覆以禍福曉之乃肯退澤為秦相數月即告老為客卿以終進退雍容過睢遠甚雖然後之君子固權吝寵如狡兔之専窟如猩猩之嗜酒老死而不知止受禍而不之覺者智又在范雎下矣孟浩然詩曰江清月近人杜陵云江月去人只數尺子美視浩然為前輩豈祖述而敷衍之耶浩然之句渾涵子美之句精工陸羽茶經裴汶茶述皆不載建品唐末然後北苑出焉宋朝開寶間始命造龍團以别庶品厥後丁晉公漕閩乃載之茶録蔡忠惠又造小龍團以進東坡詩云武夷溪邉粟粒芽前丁後蔡相籠加吾君所乏豈此物致養口體何陋耶茶之為物滌昏雪滯於務學勤政未必無助其與進荔枝桃花者不同然充類至義則亦宦官宫妾之愛君也忠惠直道髙名與范歐相亞而進茶一事乃儕晉公君子之舉措可不謹哉宋皇祐間吳中大飢范文正公領浙西乃縱民競渡與僚佐日出燕湖上諭諸守以荒嵗價亷可大興土木於是諸寺工作鼎新又新倉厫吏舍日夜千夫監司劾奏杭州不恤荒政遊宴興作傷財勞民公乃條奏所以如此正欲發有餘之財以惠貧者使工技傭力之人皆得仰食於公私不至轉徙填壑荒政之施莫此為大是嵗惟杭飢而不害近時莆陽一寺規建大塔工費巨萬或告侍郎陳正仲曰當此荒嵗寺僧剝斂民財興無益之土木公為此邦之望盍白郡禁止之正仲笑曰子過矣建塔之役寺僧能自為之乎莫非傭此邦之人為之也斂之於富饒之家散之於貧窶之輩是小民藉此以得食而贏得一塔耳當此荒嵗惟恐僧之不為塔也子乃欲禁之乎東坡希慕樂天其詩曰應似香山老居士世緣終淺道根深然樂天醖籍東坡超邁正自不同魏鶴山詩云湓浦猿啼杜宇悲琵琶彈淚送人歸誰言蘇白能相似試看風騷赤壁磯此論得之矣楊誠齋在館中與同舍談及晉于寶一吏進曰乃干寶非于也問何以知之吏取韻書以呈干字下注云晉有干寶誠齋大喜曰汝乃吾一字之師宋紹興省試髙祖能用三傑賦一卷文甚奇而第四韻押運籌帷帳考官以漢書乃帷幄非帳字不敢取出院以語周益公公曰有司誤也史記正是帷帳漢書乃作幄宋夀皇問王季海曰聾字何以從龍耳對曰山海經云龍聽以角不以耳荆公解蔗字不得其義一日行圃見畦丁蒔蔗種瘞之曰他時節節背生公悟曰蔗切之夜庶生是也字義固有可得而解者如一而大謂之天是誠妙矣然不可強通者甚多世傳東坡問荆公何以謂之波曰水之皮坡曰然則滑者水之骨也荆公字説成以為可亞六經作詩云鼎湖龍去字書存開闢神機有聖孫湖海老臣無四目漫將糟粕汙修門正名百物自軒轅野老何知強討論但可與人漫醬瓿豈能令鬼哭黃昏蓋蒼頡四目其制字成天雨粟鬼夜哭漫瓿之句言知者少也胡忠簡公為舉子時值建炎之亂團結丁壯以保鄉井隆祐太后幸章貢金兵追至廬陵太守楊淵棄城走公所居曰薌城去城四十里乃自領民兵入城固守市井惡少乘間欲攘亂斬數人乃定張榜責楊淵棄城之罪募人收捕淵懼自歸隆祐隆祐赦之降敕書諭胡銓事定新太守來疑公有他志不敢入城公笑曰吾保鄉井耳豈有他哉即散遣民兵徒步歸薌城楊忠襄公少處郡庠足不涉茶房酒肆同舍欲壞其守拉之出飲託言朋友家實娼館也公初不疑酒數行娼艷粧而出公愕然疾趨而歸取其衣焚之流涕自責人徒見忠簡以一編修官乞斬秦檜甘心流竄忠襄以金陵一倅唾罵兀术視死如歸豈知其自為布衣時所立已卓然矣王梅溪守泉會邑宰勉以詩云九重天子愛民深令尹宜懷惻隱心今日黃堂一杯酒使君端為庶民斟邑宰皆感動真西山帥長沙宴十二邑宰於湘江亭作詩曰從來官吏與斯民本是同胞一體親既以脂膏供爾祿須知痛癢切吾身此邦素號唐朝古我輩當如漢吏循今日湘亭一杯酒便煩散作十分春蓋祖述梅溪而敷衍之惠民之法莫善於常平司馬溫公曰此三代聖人之法非李悝耿夀昌所能為也陳止齋曰周禮以年之上下出斂法蓋年下則出恐榖貴傷民年上則斂恐榖賤傷農也即常平之法孟子曰狗彘食人食而不知檢塗有餓殍而不知發檢字一本作斂蓋狗彘食人食粒米狼戾之嵗也法當斂之塗有餓殍凶嵗也法當發之由此而言三代之時無常平之名而有常平之政特廢於衰周耳真非耿李所能也郭仲晦謂劉信叔曰處事當以易簡簡以制繁易以制難便不費力乾坤之大所以使萬物由其宰制者不過此二字况於人乎仲晦此論可謂洞見天地萬物之理且以用兵言之韓信多多益辦只是一簡字狄武襄夜半破崑崙關只是一易字廖德明字子晦朱文公髙弟也少時夢謁大乾夢懷刺候謁廟廡下謁者索刺出諸袖視其題字云宣教郎廖某遂覺後登第改秩以宣教郎宰閩請迓者及門思前夢恐官止此不欲行親朋友相勉為質之文公公曰待徐思之一夕忽叩門曰得之矣因指案上物曰人與器物不同如筆止能為筆不能為硯劍止能為劍不能為琴故其成毁久速有一定不易之數惟人則不然虛靈知覺萬理兼該有朝為跖而暮為舜者故其吉凶禍福亦隨之而變難以一定言今子赴官但當充廣德性力行好事前夢不足芥蒂子晦拜而受教後把麾持節官至正郎本富為上末富次之姦富為下今之富者大抵皆姦富也而務本之農皆為僕妾於姦富之家矣嗚乎悲夫一顧傾城再顧傾國色也大者傾城下者傾鄉富也貨色之不祥如此哉鶴林玉露卷十三
