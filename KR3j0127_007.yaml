body:
  text: 鶴林玉露卷七宋羅大經撰高廟配享洪容齋在翰苑以吕頥浩趙鼎韓世忠張俊四人為請蓋文武各用兩人出於孝宗聖意也遂令侍從議時宇文子英等十一人以為宜如明詔而識者多謂吕元直不厭人望張魏公不應獨遣楊誠齋時為祕書少監以書爭之以欺専私三罪斥容齋且言魏公有社稷大功五建復辟之勳一也發儲嗣之議二也誅范瓊以正朝綱三也用吳玠以保全蜀四也却劉麟以定江左五也於是有旨再令詳議越數日上忽諭大臣曰吕頥浩等配享正合公論更不須議洪邁固是輕率楊萬里亦未免浮薄於是二人皆求去容齋守南徐誠齋守高安而魏公迄不得配食誠齋詩云出却金宫入梵宫翠微緑霧染衣濃三年不識西湖月一夜初聞南澗鐘藏室蓬山真昨戲園翁溪友得今從若非朝士追相送何處冥鴻更有蹤又云新晴在在野花香過雨迢迢沙路長兩度立朝今結局一生行客老還鄉猶嫌數騎傳書札賸喜千峰入肺腸到得前頭上船處莫將白髮照滄浪此去國時詩也可謂無幾微見於顔面矣其冡嗣東山先生伯子跋其論配享書藁云覆羮真得皂囊書錦水元來勝石渠但寶銀鈎并鐵畫何須玉帶與金魚蓋苗劉作亂時矯隆祐詔貶竄魏公高宗在升暘宫方啜羮左右來告驚懼羮覆于手手為之傷暨復辟見魏公泣數行下舉手示公痕迹猶存左次魏和伯子詩云鑾坡蓬監兩封書道院東西各付渠乾道聖人無固必是非付與直哉魚詞意亦佳但當塗乃江東道院容齋守南齊非當塗也渡江以來士大夫始衣紫窄衫上下如一紹興九年詔公卿長吏毋得以戎服臨民復用冠帶論者以為擾於是士大夫皆服涼衫乾道中李獻之上言會聚之際顔色可憎今陛下上承兩宫宜復紫衫為便上從之蓋人情樂簡便久矣昔孝節先生徐仲積事母至孝一日竦然自省曰吾以襴幞謁貴人而不以見母是敬母不如敬貴人也不可乃日具襴幞揖母人皆笑之孝節行之終身近時靜春先生劉子澄朱文公高弟也守衡陽日以衣冠涖事憲使趙民則嘗紫衫來見子澄不脫冠裳見之民則請免冠裳子澄端笏肅容曰戒石在前小臣豈敢民則皇恐退具冠裳以見然由是不相樂夫襴幞揖母冠裳臨民常事也而世俗且難之至於紫窄袖衫乃戎服也出於兵興一時權宜而相承至今不能改然則古道何時而可復乎李泰伯著常語非孟子後舉茂材論題出經正則庶民興不知出處曰吾無書不讀此必孟子中語也擲筆而出朝説之亦著論非孟子建炎中宰相進擬除官高宗曰孟子發揮王道説之何人乃敢非之勒令致仕鄭叔友著崇正論亦非孟子曰軻忍人也辨士也儀秦之流也戰國縱橫捭闔之士皆發冡之人而軻能以詩禮者也余謂孟子以儀秦之齒舌明周孔之肺腸的切痛快蘇醒萬世此何可非泰伯所以非之者謂其不當勸齊梁之君以王耳昔武王伐紂舉世不以為非而伯夷叔齊獨非之東萊吕先生曰武王憂當世之無君者也伯夷憂萬世之無君者也余亦謂孟子憂當世之無君者也泰伯憂萬世之無君者也此其特見卓論真可與夷齊同科至於説之叔友拾其遺説而附和之則過矣平原孟嘗君養天下客而未嘗得一客張湯公孫宏接天下士而未嘗得一士魯仲連固不肯與雞鳴狗盜者伍也汲長孺固不肯與奴顔婢膝者齒也若得一魯仲連則一客可以敵千客若得一汲長孺則一士可以埒千士故山谷詩曰匹士能光國三孱不滿隅不主癰疽瘠環所以為孔子不禮臧倉王歡所以為孟子宋璟不與內侍交語明皇深加歎奬杜悰不從監軍請選宫女入宫武宗知其有宰相才范純夫為諌官東鄰宦官陳衍園亭在焉衍每至園中不敢高聲謂其徒曰范諌議一言到上前吾輩不知死所矣此其所以為范純夫也此其所以為元祐也王黼為宰相與宦者梁師成鄰居密開後戶往來徽宗幸黼第徘徊觀覽偶見之大不樂此其所以為王黼也此其所以為崇觀政宣也東坡於世家中得王定國於宗室中得趙德麟奬許不容口定國坐坡纍謫賓州瘴煙窟裏五年面如紅玉尤為坡所敬服然其後乃階梁師成以進而德麟亦諂事談稹紹興初德麟主管大宗正司有旨令易環衛官宰相吕頥浩奏曰令畤讀書能文蘇軾嘗薦之已不須易高宗曰令畤昔事談稹為清議所薄竟易之士大夫晚節持身之難如此余觀屈平之騷經曰蘭芷變而不芳兮荃蕙化而為茅何昔日之芳草兮今直為此蕭艾也豈其有他故兮莫好修之害也朱文公釋之曰世亂俗薄士無常守乃小人害之而以為莫如好修之害者何哉蓋由君子好修而小人嫉之使不容於當世故中材以下莫不變化而從俗則是其所以致此者反無有如好修之為害也嗚呼其崇觀政宣之時乎宜二子之改節易行也張無垢在越上作幕官不請供給錢在館中進書不肯轉官人皆以為好名之過無垢曰既請月俸又受供給偶然進書又便受賞於我心實有不安此亦本分事何名之好貪者往往不曾尋思此心病也心有病人安得知我知之當自醫别人既不自知病反惡人醫病猶婦人妬者非特妬其夫又且妬人之夫其惑甚矣無垢此喻甚切世降俗薄貪濁成風反相與非笑亷者諛佞成風反相與非笑直者軟熟成風反相與非笑剛者競進成風反相與非笑恬退者侈靡成風反相與非笑儉約者傲誕成風反相與非笑謙默者賈子云莫邪為鈍兮鉛刀為銛東坡云變丹青於玉瑩兮乃反謂子為非智風俗至於如此豈不可哀安子文與楊巨源李好義合謀誅逆曦矯詔之詞曰惟干戈省厥躬朕既昧聖賢之戒雖犬馬識其主爾乃甘夷虜之臣邦有常刑罪在不赦詞旨明白乃好義姊夫楊君玉之詞也曦年十許嵗時其父挺嘗問其志曦有不臣之語其父怒蹴之爐火中灼其面號吳巴子云魏鶴山云古人稱字者最不輕儀禮子孫於祖禰皆稱字孔門諸子多稱夫子為仲尼子思孫也孟子又子思弟子也亦皆稱仲尼雖今人亦稱之而人不為怪遊夏之門人皆字其師漢初唯子房一人得稱字中世有字其諸父字其諸祖者近世猶有後學呼退之兒童誦君實之類觀鶴山此説古人蓋以稱字為至重今世唯平交乃稱字稍尊稍貴者便不敢以字稱之與古異矣魯哀公誄孔子亦曰尼父則君亦可以字臣周益公謂先君曰壽皇每稱東坡唯曰子瞻而不名其欽重如此大凡應大變處大事須是靜定凝重如周公之赤舄几几是也漢武帝因不移步識霍光因不轉盻識金日磾亦是窺見他靜定凝重處故逆知其可以託孤寄命韓魏公之凝立亦此類也歐陽公所謂垂紳正笏不動聲色而措天下於泰山之安形容得最好然魏公亦只是天資至如司馬公則加以學力尤不可及如更新法傅欽之蘇子瞻勸其防後患公起立拱手仰視厲聲曰天若祚宋必無此事此惟有大力量方能為此言張宣公云使某當時應答不過曰茍利社稷遑恤其他只如此説巳自好安能如公之言更不論一己利害想其平日所養故臨事發言能如是中理雖聖人不過如此説近於終條理者矣紹熙甲寅光宗以疾不能過宫吾郡尹德鄰初參大學簾引詩題出問寢龍樓曉德鄰詩云父母人皆有儀刑自冕旒問安趨燕寢拂曉過龍樓鶴駕嚴晨衛雞人徹夜籌慈闈天語接飛棟月華收萬姓齊呼舞三宫欵獻酬小儒憂國切幾白九分頭學官擊節一時傳誦象山與羅春伯書云宇宙無際天地開闢本只一家來書乃謂自家屋裏人不亦陋乎謂之自家不知孰為他家古人但問是非邪正不問自家他家君子之心未嘗不欲其去非而就是捨邪而適正其怙終不悛則當為夬之上六矣舜於四凶孔子於少正卯亦治其家人耳象山此論可謂渾厚高明且以我朝言之自慶厯以前未有君子小人之名所謂本只一家者也故君子未嘗受禍自慶厯以後君子小人之名始立則有自家他家之分矣故君子之受禍一節深於一節丁常任毗陵人淳熙間為郎冬至日上殿奏對玉音曰曉來雲物甚竒卿曾見否常任實不曾見即對曰豈惟臣見之四海萬姓皆見之孝宗大喜曰卿對甚偉命除淮漕詩家有以山喻愁者杜少陵云憂端如山來澒洞不可掇趙嘏云夕陽樓上山重疊未抵春愁一倍多是也有以水喻愁者李頎云請量東海水看取淺深愁李後主云問君都有幾多愁恰似一江春水向東流秦少遊云落紅萬點愁如海是也賀方回云試問間愁知幾許一川煙草滿城風絮梅子黃時雨蓋以三者比愁之多也尤為新竒兼興中有比意味更長宣和中大盜方臘擾浙中王師討之命陳亨伯以發運使經制東南七路財賦因建議如賣酒鬻糟商稅牙稅與夫頭子錢樓店錢皆少增其數别厯收繫謂之經制錢其後盧宗原頗附益之至翁彥國為總制使倣其法又收贏焉謂之總制錢靖康之初嘗詔罷之軍興議者再請施行色目寖廣視宣和有加焉以迄于今為州縣大患初亨伯之作俑也其兄聞之哭於家廟謂剝民産怨禍必及子孫厥後葉正則作外稿謂必盡去經總錢而後天下乃可為治平乃可望然中興百年非無聖君賢相未聞有議及此者是獨何也杜少陵詩云小兒學問止論語大兒結束隨商賈蓋以論語為兒童之書也趙普再相人言普山東人所讀者止論語蓋亦少陵之説也太宗嘗以此論問普普略不應對曰臣平生所知誠不出此昔以其半輔太祖定天下今欲以其半輔陛下致太平普之相業固未能無愧於論語而其言則天下之至言也朱文公曰某少時讀論語知愛自後求一書似此者卒無有林勳賀州人紹興中登進士第嘗進本政書欲漸復三代井田之法大略謂五尺為步步百為畝畝百為頃頃九為井井方一里井十為通通十為成成方十里成十為終終十為同同方百里一同之地提封萬井實為九萬頃三分去二為城郭市井官府道路山林川澤與夫磽崅不毛之地定其可耕與為民居者三千四百井實為三萬六百頃一頃之田二夫耕之夫田五十畝餘夫亦如之總二夫之田則為百畝百畝之收平嵗為米五十石上熟之嵗為米百石二夫以之養數口之家蓋裕如矣總八頃之稅為米十有六石錢三貫二百文此之謂什一井復一夫之稅以其人為農正掌勸督耕耨賦稅之事但收十有五夫之稅總計三千四百井之稅為米五萬一千石為錢一萬二千貫以此為一同之率一頃之居其地百畝十有六夫分之夫宅五畝總十有六夫之宅為地八十畝餘二十畝以為社學場圃一井之人共之使之朝夕羣居以教其子弟然貧富不等未易均齊奪有餘以補不足則民駭矣今宜立之法使一夫占田五十畝以上者為良農不足五十畝者為次農其無田而為間民與非工商在官而為遊惰末作者皆驅之使為𨽻農良農一夫以五十畝為正田以其餘為羡田正田毋敢廢業必躬耕之其有羡田之家則無得買田唯得賣田至於次農則毋得賣田而與𨽻農皆得買羡田以足一夫之數而升為良農凡次農𨽻農之未能買田者皆使之分耕良農之羡田各如其夫之數而嵗入其租於良農如其俗之故非自能買田及業主自收其田皆毋得遷業若良農之不願賣羡田者宜悉俟其子孫之長而分之官毋得奪以賈其怨少須暇之自合中制矣其書大略如此朱文公張宣公皆喜其説謂其有志復古然今時欲行經界尚以為難况均田乎橫渠西銘曰大君者父母之宗子其説本於召公召誥曰有王雖小元子哉又曰皇天上帝改厥元子元子即宗子也武王誓師之辭曰亶聰明作元后元后作民父母余謂父母之説不如元子宗子之説意味深長蓋謂之元子宗子則天父地母臨之於上諸弟之顛連無告者責望於下非特惻然於同胞之愛且有所嚴憚而不敢隳其職分也李強父為昭文相嘗出六和塔題詩云往來塔下幾經秋每恨無從到上頭今日登臨方覺險不如歸去臥林邱強父為相清正謹守規矩自奉如寒士書卷不釋手薨于位諡文清嘉定間楊伯子為湖州守彈壓豪貴牧養小民治聲赫然為三輔冠郡之士相與肖像祠于學宫與工部尚書戴少望並祠伯子意不悅會除浙東庾節將行辭先聖先師禮畢與校官諸生坐于講堂命取所祠畫象來題詩其上云面有憂民色天知報國心三年風月少兩鬢雪霜深更莫留形迹何曾廢古今不如隨我去相伴老山林遂卷藏而行當時士子有戲和其詩者末句云可憐戴工部獨樹不成林陸士規布衣工詩秦檜喜之嘗挾秦書干臨川守餽遺不滿意升堂嫚罵守懼以書白秦自解秦怒陸甚陸請見不出然猶令其子小相者見之問其近作陸誦其黃陵廟一絶云東風吹草緑離離路入黃陵古廟西帝子不知春又去亂山無主鷓鴣啼小相入誦之秦吟賞再四即命請見待之如初宗杲論禪云譬如人載一車兵器弄了一件又取出一件來弄便不是殺人手段我則只有寸鐵便可殺人朱文公亦喜其説蓋自吾儒言之若子貢之多聞弄一車兵器者也曾子之守約寸鐵殺人者也杜少陵詩云風含翠篠娟娟淨雨裛紅蕖冉冉香上句風中有雨下句雨中有風謂之互體楊誠齋詩云緑光風動麥白碎日翻池亦然上句風中有日下句日中有風韓文公作歐陽詹哀詞云詹閩人也父母老矣捨朝夕之養以來京師其心將以有得於是而歸為父母榮也雖其父母之心亦然詹在側雖無離憂其志不樂也詹在京師雖有離憂其志樂也山谷送秦少章從蘇公學云斑衣兒啼真自樂從師學道也不惡但使新年勝故年即如常在郎伯前後山云士有從師樂諸兒却未知欲行天下獨信有俗間疑秋入川原秀風連鼓角悲目前豚犬類未必慰親思二詩皆用韓意而後山之味永陸象山云男子生而以桑弧蓬矢射天地四方示有四方之志此其父母教之望之第一義也顔子之家一簞食一瓢飲在人不堪憂之地而顔子乃從其師周遊天下履宋衛陳蔡之厄而不以為悔此豈俚俗之人拘曲之士所能知其義哉蓋誠使此心無所放失無所陷溺全天之所豫而無傷焉則千萬里之逺無異於親膝不然雖日用三牲之養猶為不孝也象山此説尤更精透有僧住山或謀攘之僧乃挂草鞋一雙於方丈前題詩云方丈前頭挂草鞋流行坎止任安排老僧腳底從來闊未必枯髏就此埋余謂士大夫去就亦當如此楊誠齋立朝時計料自京還家之裹費貯以一篋鑰而置之臥所戒家人不許市一物恐纍歸擔日日若促裝者余又聞昔有京尹忘其名不攜家唯弊篋一擔每晨起則撒帳卷席食畢則洗鉢收箸以拄棒撑弊篋于廳事之前常若逆旅人將行者故擊搏豪強拒絶宦寺悉無所畏余曩在太學嘗館于一貴人之門一日命市薪六百劵有卒微哂謂其徒曰朝士今日不知明日事乃買柴六百貫耶余因竊歎士大夫之見有不如此卒者多矣劉平國云奏疏不必繁多為文但取其明白足以盡事理感悟人主而已此論極好如伊訓説命無逸立政所未論只如諸葛孔明前後出師表何嘗費詞近時如張宣公自都機入奏三劄陸象山為刪定官輪對五劄皆可法自昔士之間居野處者必有同道同志之士相與往還故有以自樂陶淵明移居詩云昔欲居南村非為卜其宅聞多素心人樂與數晨夕又云鄰曲時來往抗言談在昔竒文共欣賞疑義相與析則南村之鄰豈庸庸之士哉杜少陵在錦里亦與南鄰朱山人往還其詩云錦里先生烏角巾園收芋栗未全貧慣看賓客兒童喜得食階除鳥雀馴秋水才添四五尺野航恰受兩三人白沙翠竹江村暮相送柴門月色新又云相近竹參差相過人不知幽花欹滿徑野水細通池歸客村非逺殘尊席更移看君多道氣從此數追隨所謂朱山人者固亦非常流矣李太白尋魯城北范居士誤落蒼耳中詩云忽憶范野人間園養幽姿又云還傾四五酌自詠猛虎詞近作十日歡逺為千嵗期風流自簸蕩謔浪偏相宜想范野人者固亦可人之流也列子曰仲尼廢心而用形淵明詩云形迹憑化往靈府長獨間説得更好蓋其自彭澤賦歸之後灑然悟心為形役之非故其言如此果能行此則靜亦靜動亦靜雖過化存神之妙不外是矣謂淵明不知道可乎宋寶慶初當國者欲攻去真西山魏鶴山朝士莫有任責梁成大獨欣然願當之遂除察院擊搏無遺力當時太學諸生曰大字傍宜添一點曰梁成犬余謂犬之狺狺不過吠非其主耳是有功於主也今不肖之臺諌受權貴之指呼納豪富之賄賂內則剪天子之羽翼外則奪百姓之父母是有害於主也吾意犬亦羞與為伍矣韻書釋豉云配鹽幽菽四字甚工鶴林玉露卷七
