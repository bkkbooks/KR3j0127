body:
  text: 鶴林玉露巻十二宋羅大經撰法昭禪師偈云同氣連枝各自榮些些言語莫傷情一回相見一回老能得幾時為弟兄詞意藹然足以啟人友于之愛然余嘗謂人倫有五而兄弟相處之日最長君臣之遇合朋友之㑹聚久速固難必也父之生子妻之配夫其早者皆以二十嵗為率惟兄弟或一二年或三四年相繼而生自竹馬游戲以至鮐背鶴髪其相與周旋多者至七八十年之久若恩意浹洽猜間不生其樂豈有涯哉近時有周益公以太傅退休其兄秉成先生以將作監丞退休年皆八十詩酒相娛者終其身章泉趙昌甫兄弟亦俱𨼆玉山之下蒼顔華髪相從於泉石之間皆年近九十真人間至樂之事亦人間希有之事也嚴州烏石寺在髙山之上有岳武穆飛張循王俊劉太尉光世題名劉不能書令侍兒意真代書姜堯章題詩云諸老凋零極可哀尚留名姓壓崔嵬劉郎可是疎文墨幾㸃燕支涴綠苔大凡臨事無大小皆貴乎智智者何隨機應變足以弭患濟事者是也張乖崖守蜀兵火之餘人懐反側一日大閲方出軍衆忽嵩呼乖崖亦下馬隨衆東北望三呼攬轡復行衆不敢讙真宗不豫李文定公以宰相宿内祈禳時太子尚㓜八大王元儼者頗有威名問疾留禁中累日不出執政患之偶翰林司以金盂貯熟水過問之曰王所需也文定取案上墨筆攪水中盡黑王見之大駭意其為毒也即上馬去文潞公知成都大雪㑹客帳下卒有誶語共拆井亭燒以禦寒軍將以聞公徐曰今夜誠寒亭弊矣正欲改造更有一亭可盡拆為薪樂飲如常明日乃究問先拆亭者杖而流之前輩如此類甚多皆所謂知也小而文潞公㓜年之浮毬司馬公㓜年之撃甕亦皆於倉卒之中有變通之術世傳趙從善尹臨安宦寺欲窘之一日内索朱紅桌子三百隻限一日辦從善命於市中取茶卓一樣三百隻糊以清江紙用朱漆塗之咄嗟而成兩宫幸聚景園回索火炬三千枝限以時刻從善命於倡家取竹簾束之頃刻而辦辛㓜安在長沙欲於後圃建樓賞中秋時已八月初旬矣吏白他皆可辦唯瓦難辦㓜安命於市上毎家以錢一百賃簷前瓦二十片限兩月以瓦收錢於是瓦不可勝用嘉熈間江西峒丁反吉州萬安宰黄炳鳩兵守備一日五更探報冦且至炳亟遣巡尉領兵迎敵衆皆曰空腹奈何炳曰第速行飯即至矣炳乃率吏輩攜行蘿木桶沿市民之門曰知縣買飯時人家晨炊方熟皆有熱飯熟水厚酬其直負之以行於是士卒皆飽餐一戰破冦由此論功擢守臨川兼庾節杜陵詩云雨晴山不改晴罷峽如新言或雨或晴山之體本無改變然既雨初晴則山之精神煥然乃如新焉朱文公寄籍溪胡原仲詩云甕牖前頭翠作屛晚来相對靜儀刑浮雲一任閑舒巻萬古青山只麽青胡五峯見之以為有體而無用乃賡之曰幽人偏愛青山好為是青山青不老山中雲出雨乾坤洗出一畨青更好文公用杜上句意五峯用杜下句意然杜只是寫物二公則以喩道善師者不陳善陳者不戰琴以不鼓為妙棋以不着為髙子家羈不欲昭公與季氏立異子家羈豈黨季氏者乎陳平周勃不與吕氏立異平勃豈黨吕氏者乎狄仁傑不與武氏立異仁傑豈黨武氏者乎處事變者須識此意雖然夫子三都之墮王陵庭爭之語駱賓王舉兵之檄亦不可少也聲大義者張膽而明目定大䇿者潛慮而宻謀紹興間黄公度榜第三人陳脩福州人解試四海想中興之美賦第五韻隔對云葱嶺金堤不日復廣輪之土泰山玉牒何時清封禪之塵時諸郡試巻多經御覽髙宗親書此聨於幅紙黏之殿壁及唱名玉音云卿便是陳脩吟誦此聨凄然出涕問卿年幾何對曰臣年七十三問卿有幾子對曰臣尚未娶乃詔出内人施氏嫁之年三十貲奩甚厚時人戲為之語曰新人若問郎年幾五十年前二十三其年第五人方翥興化人解試中興日月可冀賦一聨云佇觀僚屬復光司𨽻之儀忍死須㬰咸泣山東之淚亦經御覽親筆録記唱名日特命加一資上恢復初志隨寓發見感憤如此而卒於不遂秦檜之罪可勝誅乎淳熙間廬陵有惡少子曰晏先以殺人減等流嶺南行有日逢其黨二人於市晏目之曰盍免我乎二人不應而去行數日送徒者節其飲食有害之之意一夕止旅舎二人者忽来為酒饌饗晏及送徒者盡夕歌呼至曉偕行過荒林間二人以白金一笏擲於地抽刃而言曰晏吾兄弟也汝能釋使逃請以此金為謝不然不能俱生矣送徒者欣然破械縱去為疑冢道傍而反越三十年晏自淮駕巨艦来歸貲貨鉅萬訪二人皆死矣妻子方貧不能自活晏哭祭其墓盡哀厚遺其妻子乃去鄭毅夫過朱亥墓詩云髙論唐虞儒者事賣君負國豈勝言憑君莫笑金椎陋却是屠沽解報恩諒哉韓子管仲隰朋從齊桓公伐孤竹春往而冬反迷惑失道管仲曰老馬之智可用也乃放老馬而隨之遂得道焉杜陵詩云古来存老馬不必取長途用此事也東坡代滕達道疏云自念舊臣譬之老馬雖筋力已衰不堪致逺而經涉險阻粗識道路又用杜詩意唐太宗末年讖家明言女主昌又明言為武氏又明言其人已在宫中乃以疑似殺李君羡過矣則天當時特一宫嬪誠無可疑之迹然史載太宗有駿馬曰師子驄極猛悍太宗親控馭之不能馴則天時侍側曰惟妾能制之太宗問其術對曰妾有三物始則捶以鐵鞭不服則撃以鐵撾又不服則以匕首斷其喉爾由此觀之其英烈猛厲之氣亦自發露特太宗不之覺耳則天後来駕馭羣臣専用此術袁和叔云非木非石無思無為楊敬仲深愛其語故銘其墓曰和叔之覺人所未知非木非石無思無為葢以為造極之語也然余觀蘇潁濱論語解云火必有光心必有思聖人無思非無思也外無物内無我物我既盡心全而不亂物至而知可否可者作不可者止因其自然而吾未嘗思未嘗為此所謂無思無為也如使頑然不動與木石為偶而謂之無思無為則亦何以通天下之故哉此説即和叔之説也豈敬仲未之見耶禪家去昏散病絶㫁常坑葢昏與斷則如木如石矣散與常則妄思妄為矣又云貴真空不貴頑空葢頑空則頑然無知之空木石是也若真空則猶之天焉湛然寂然元無一物然四時自爾行百物自爾生粲為日星滃為雲霧沛為雨露轟為雷霆皆自虚空生而所謂湛然寂然者自若也潁濱深味禪説故其論亦此意内繕已性當如紀渻之養雞外順物性當如顏闔之養虎淵明詩云既来孰不去人理固有終居常待其盡曲肱豈傷沖此脩身俟死之意也可謂了死生矣謝溪堂詩云淵明從遠公了此一大事余謂淵明性資高邁豈待從遠公而後了况其言曰得知千載外上頼古人書又曰羲農去我久舉世少復真汲汲魯中叟彌縫使其淳則其於六經孔孟之書固已探其㣲矣於了死生乎何有晚唐詩綺靡乏風骨或者薄之且因王維儲光羲輩而并薄其人然氣節之士亦往往出於其間昭宗末年朱温簒形已成韓偓在翰林蘇檢數為經營入相偓怒曰公不能有所為今朝夕不濟乃欲以此相汙耶昭宗欲相偓偓辭而薦趙崇崔𦙍怒使温譖而逐之昭宗與之泣别偓泣曰臣得遠貶及死乃幸不忍見簒弑之辱也司空圖初為禮部員外郎棄官𨼆居王官谷累徴不起柳璨以詔書徴之圖懼詣洛陽入見佯為衰野墜笏失儀乃下詔以為傲代釣名放還山羅𨼆乾符中舉進士十上不第黄巢亂歸依錢鏐及朱温簒詔至痛哭勸鏐舉義鏐不能從温聞其名以諌議大夫招之不就事鏐終於著作佐郎若三子者又可以晚唐詩人薄之乎詩有一句疊三字者如吳融秋樹詩云一聲南鴈已先紅摵摵淒淒葉葉同是也有一句連三字者如劉駕云樹樹樹梢啼曉鶯夜夜夜深聞子規是也有兩句連三字者如白樂天云新詩三十軸軸軸金玉聲是也有三聨疊字者如古詩云青青河畔草鬱鬱園中栁盈盈樓上女皎皎當忩牖娥娥紅粉粧纎纎出素手是也有七聨疊字者昌黎南山詩云延延離又屬夬夬叛還遘喁喁魚闖萍落落月經宿誾誾樹牆垣巘巘架庫廄參參削劍㦸􅀈􅀈銜瑩琇敷敷花披萼闟闟屋摧霤悠悠舒而安兀兀狂以狃超超出猶奔蠢蠢駭不懋是也近時李易安詞云尋尋覔覔冷冷清清凄凄慘慘戚戚起頭連疊七字以一婦人乃能創意出竒如此紹興中王鈇帥畨禺有狼藉聲朝廷除司諌韓璜為廣東提刑令往廉按憲治在韶陽韓纔建臺即行部指畨禺王憂甚寢食幾廢有妾故錢塘倡也問主公何憂王告之故妾曰不足憂也璜即韓九字叔夏舊游妾家最好歡須其来强邀之飲妾當有以敗其守已而韓至王郊迎不見入城乃見岸上不交一談次日報謁王宿治具於别館茶罷邀遊郡圃不許固請乃可至别館水陸畢陳伎樂大作韓踧踖不安王麾去伎樂隂命諸倡淡粧詐作姫侍迎入後堂劇飲酒半妾於簾内歌韓昔日所贈之詞韓聞之心動狂不自制曰汝乃在此耶即欲見之妾隔簾故邀其滿引至再至三終不肯出韓心益急妾乃曰司諌曩在妾家最善舞今日能為妾舞一曲即當出也韓醉甚不知所以即索舞衫塗抹粉墨踉蹡而起忽跌於地王亟命索輿諸倡扶掖而登歸船昏然酣寢五更酒醒覺衣衫拘絆索燭覽鏡羞愧無以自容即解舟還臺不敢復有所問此聲流播旋遭彈劾王迄善罷夫子曰棖也欲焉得剛韓璜之謂矣太公之鷹揚夷齊之叩馬道並行而不相悖也太公處東海之濱進而以功業濟世伯夷處北海之濱退而以名節勵世二老者天下之大老也故各為世間辦一大事可謂無負文王之所養矣使伯夷出而任太公之事則太公亦必退而為伯夷之事所謂易地則皆然切意二老受文王之養平居暇日同堂合席念王室之如燬固欲起而救亂思冠冕之毁裂又恐因而偕亂故水火相濟鹽梅相成各以一事自任如三仁之自獻自靖或殺身以全節或歸周以全祀或佯狂以全道均不失本心之徳而已矣豈故相矛盾者哉觀伯夷之諫太公扶而去之曰義士意可見矣紹興乙卯以旱禱雨諌議大夫趙霈上言自来祈禱斷屠止禁猪羊今後請并禁鵝鴨時胡致堂在西掖見之笑曰可謂鵝鴨諌議矣聞敵中有龍虎大王請以鵝鴨諌議當之嘉定中察院羅相上言越州多虎乞行下措置多方捕殺正言張次賢上言八盤嶺乃禁中来龍乞禁人行太學諸生遂有羅擒虎張尋龍之對胡澹庵十年貶海外北歸之日飲於湘潭胡氏園題詩云君恩許歸此一醉傍有梨頰生㣲渦謂侍妓黎倩也厥後朱文公見之題絶句云十年浮海一身輕歸對梨渦却有情世上無如人欲險幾人到此誤平生文公全集載此詩但題曰自警云余觀東坡志林載張元忠之説曰蘇子卿嚙雪啖氊蹈背出血可謂了死生之際矣然不免與彼婦生子而况洞房綺繡之下乎乃知此事未易消除文公之論澹庵亦猶張元忠之論蘇子卿也近時鄭叔友論劉項曰項王有吞嶽瀆意氣咸陽三月火骸骨亂如麻哭聲慘怛天日而眉容不斂是鐵作心肝者然當垓下訣别之際寳區血廟了不經意惟眷眷一婦人悲歌悵飲情不自禁髙帝非天人歟能决意於太公吕后而不能决意於戚夫人杯羮可分則笑嫚自若羽翼已成則欷歔不止乃知尤物移人雖大智大勇不能免由是言之世上無如人欲險信哉堯不以天下與丹朱而與舜世皆謂聖人至公無我知愛天下而不知愛其子余謂帝堯此舉固所以愛天下也尤所以愛丹朱也異時雲行雨施萬國咸寧虞賓在位同其福慶則安家而厚蒼生兩得之矣若使其以傲虐之資輕居臣民之上則毒痡四海不有南巢之放必有牧野之誅尚得為愛之乎曽子曰君子愛人以徳龎徳公曰吾遺子孫以安堯舜之於子亦不過愛之以徳遺之以安耳故愛子者人之常情也堯舜豈外人之常情以為異哉故其書曰典項平甫作信美樓記云王仲宣之言曰雖信美非吾土兮曽何足以少留自仲宣至今千有餘年文士一詞曰此思歸之曲也曽未有考其文而論其心者葢仲宣漢貴公孫也少依王室世受國恩雖遯身南夏而繋志西周彼以為撫清漳曲沮之流不若灞滻涇渭之速清也覽昭丘陶牧之勝不若終嵕吳華之亟平也冀道路之一開憂日月之逾邁故戛然以是為不可久留葢士之出處不齊久矣充仲宣之賦當與子美岳陽樓五言太白鳯凰臺長句同帙而共編不當與張翰思吳之歎班超玉門之書馬援浪泊西里之念雜然為一議狀也平甫此論得仲宣之心矣仲宣不依曹黄二袁而依劉表意亦可見故仲宣之忠於漢淵明之忠於晉羅昭諫之忠於唐皆詩人文士之識大義有氣節者樓乃胡仲方為荆南撫幹時所建楊誠齊題詩云大資孫子大參孫磊隗胷中萬卷横樓上已推千古恨晚潮更作斷腸聲亦平甫之意朱温父誠以五經教授鄉里號朱五經温為節度使其母王氏猶傭食蕭縣劉崇家始迎以歸温舉觴為夀啓曰朱五經平生讀書不登一第有子為節度使無忝於先人矣母惻然良久曰汝能至此可謂英特然行義未必如先人也賢哉此媪深哉此言其於朱五經之學必葢嘗有聞矣温簒位之日與宗戚飲博酒酣其兄全昱忽投瓊擊盆中迸散睨曰朱三爾碭山一百姓從黄巢為盗天子用汝為四鎮節度使於汝何負而滅唐家三百年社稷吾行見汝赤其族矣何以博為全昱此言亦甚賢也然則温之父賢母又賢兄又賢獨温凶徳耳荀卿謂人性惡其然豈其然乎杜詩有反言之者如云久判野鶴如雙鬢若正言之當云雙鬢如野鶴也又云黄鵠髙於五尺童化為白鳬似老翁若正言之當云五尺童時似黄鵠化為老翁似白鳬也他如紅豆啄殘鸚鵡粒碧梧棲老鳯凰枝亦然左氏傳曰室於怒市於色曽南豐曰室於議塗於歎皆如此類魏鶴山云某嘗以吕文穆夾袋冊韓忠獻甲乙丙丁集吕正獻掌記曽宣靖雌黄公議司馬公薦士篇陳宻學章藁范文獻手記近世虞忠肅翹材館録之類萃為一編名達賢録亦使士大夫識得行已用世規模須至推誠心布公道集謀慮廣忠益不惟資人輔已濟一旦之用往往居徳養才流風所被薫習演迤逮乎數世乃是先知先覺職分當然鶴山此論可謂任重道遠然薦士非難卞和之識玉九方臯之識馬此豈有法之可傳哉若識鑒未至徒以偏駁錮滯之意見稱量摸索其不為王荆公者幾希荆公常曰當今可望者惟吕恵卿一人又曰章子厚才極髙但為流俗所毁耳嗚乎翹材之所延夾袋之所載使盡如荆公之選掄則是蛇虺之淵虎狼之藪也其流毒可勝道哉故量足以容君子識足以辨小人可以為大臣矣豫章旅邸有題十二字云願天常生善人願人常行善事鄒景孟表而出之以為竒語吾鄉前輩彭執中云住世一日則做一日好人居官一日則行一日好事亦名言也自古盗賊如黄巢儂智髙敗績之後皆能脱身自免巢髠髪為僧題詩自贊有鐵衣着盡着僧衣之句智髙敗後惟金龍衣在或謂入海或謂奔大理國淳熈間江湖茶商相挺為盗推荆南茶駔頼文政為首文政多智年已六十不從曰天子無失徳天下無他釁將欲何為羣兇不聴以刀脅之黽勉而從文政知事必不集隂求貌類巳者一人曰劉四以煎油糍為業使執役左右辛㓜安為江西憲親提死士與之角困屈請降文政先與渠魁數人来見約日束兵退既謂其徒曰辛提刑瞻視不常必將殺我欲遁去其徒不可則曰寧斷吾首以降死先後不過數日耳其徒又不忍乃斬劉四之首使偽為已首以出而文政竟遁去官軍迄不知其首級之偽為也高適五十始作詩為少陵所推老蘇三十始讀書為歐公所許功深力到無早晚也聖賢之學亦然東坡詩云貧家淨掃地貧女巧梳頭下士晚聞道聊以拙自脩朱文公每借此句作話頭接引窮鄉晚學之士荆公詩云豈無他憂能老我付與天地從今始朱文公毎喜誦之鶴林玉露卷十二
