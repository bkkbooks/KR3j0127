body:
  text: 鶴林玉露卷十一宋羅大經撰福州啓運宫在開元寺有七祖御容塑像乃西京陵寢之舊南渡之初迎奉於此時金兵俶擾倉忙間載以籃輿七乘至今猶存别造朱輦七乘列于殿廡専差中官一員主香火謂之直殿莭序朝廷遣快行家齎送香燭帥守與直殿同致祭每位用朱槃列食十數品酒三獻云臨安淨慈寺後有望祭殿每嵗寒食朝廷差官一員望祭西京諸陵差升朝官讀祝版其詞云厯正仲春感載濡於雨露心馳西洛悵遐阻於山川恭惟某祖某宗靈鑒在天聖謨傳後秩上陵之典禮徒切望思蕝寓祭之權宜愈深愴慕其禮用盤食茶湯三獻酒余觀栁子厚云每遇寒食田野道路士女遍滿皂隸庸丐皆得上父母邱墓馬醫夏畦之鬼無不受子孫追飬者今以萬乘之主乃不獲遂此志至於寓祭此前古之所未有也端平初金人既退朝廷亦嘗遣使修朝陵之禮荆襄以兵五千護之未至西京諜報敵騎且至兵不敢進使者潛偕數騎星馳而往行禮而還其諸陵之無恙與否皆不可究詰也吾郡羅椿字永年誠齋髙弟也清貧入骨一介不取頗有李方叔謝無逸風味纍舉於禮部竟不第自號就齋嘗訪誠齋於毗陵誠齋作詩送之歸曰梅花香邊踏雪來杏花影裏帶春回明朝解纜還千里今日看花更一杯誰遣文章太驚俗何緣場屋不遺才南溪鷗鷺如相問為報春吟費麝煤慶元初誠齋與朱文公同召誠齋力辭永年寄詩云不愁風月只憂時髮為君王寸寸絲司馬要為元祐起西樞政坐壽皇知苦辭君命驚凡子清對梅花更與誰夢繞師門三稽首起敲冰硯訴相思誠齋擊莭又送永豐汪令詩云錦纜梅花浦江南作縣歸新來薦鶚牘驚動衮龍衣嵗晚情難别心親事却違恐君天上去扶病出煙霏頗有少陵意態他如露溼看花腳鶯啼欲曉山春消千嶂雪清逼五湖秋等句皆佳本朝大臣賜家廟者文彥博蔡京鄭居中鄧洵武余深侯蒙薛昻白時中童貫秦檜楊存中吳璹虞允文史彌逺凡十四人國風云豈無膏沐誰適為容又云豫髮曲局薄言歸沐蓋古之婦人夫不在家則不為容飾也其逺嫌防微至於如此杜陵新昏别云自嗟貧家女久致羅襦裳羅襦不復施對君洗紅粧尤可悲矣國風之後唯杜陵不可及者此類是也古人立碑廟以繫牲墓以下棺厥後乃刻嵗月或識事始末蓋亦因而文之耳若湯盤銘太公丹書所載諸銘亦因所用器物著辭以自警未嘗為徒文也後世特立石以紀事述言而謂之碑銘與古異矣杜元凱銘功於二石一置峴山之上一沈漢水之中韓退之謂張愈曰丐我一片石載二妃廟事且令後世知有子名後世好名之弊至於如此趙韓王為相置二大甕於坐屏後凡有人投利害文字皆置其中滿即焚之於通衢李文靖公曰沆居重位實無補萬分惟中外所陳利害一切報罷之惟此少以報國爾朝廷防制纖悉備具或徇所陳請施行一事即所傷多矣陸象山云往時充員敕局浮食是慚惟是四方奏請廷臣面對有所建置更革多下看詳其或書生貴遊不諳民事輕於獻計不知一旦施行片紙之出兆姓蒙害每與同官悉意論駁朝廷清明常得寢罷編摩之事稽考之勤顧何足以當大官之膳或庶幾者僅此可以償萬一耳凡此皆至論夫子曰仍舊貫何必改作古人曰利不什不變法甚言更革建置之不可輕也或曰若是則將坐視天下之弊而不之救歟余曰不然革弊以存法可也因弊而變法不可也不守法則弊生非法之足以生弊也若韓范之建明於慶厯者革弊以存法也荆公之施行於熙寧者因弊而變法也一得一失蓋可觀矣或曰荆公有志於二帝三王之法度豈可厚誹乎余曰有志於二帝三王當自格君心始不當自變法度始有堯舜之君則有堯舜之治有禹湯之君則有禹湯之治法度云乎哉否則王莽之井田房琯之車戰適足以貽千古之誚耳朱文公云浙間學者推尊史記謂夏紀贊用行夏之時事商紀贊用乘殷之輅事至髙祖紀贊則曰朝以十月黃屋左纛譏其不用夏時商輅也遷之意誠恐是如此但若使髙祖真能行夏時乘商輅亦只是漢髙祖終不可謂之禹湯潘良貴字子賤自少有氣莭崇觀間為館職不肯遊蔡京父子間使淮南不肯與中官同燕席靖康召對力論時宰何栗唐恪誤國未幾言皆驗建炎初召為右司諫首論亂臣逆黨當用重法以正邦典壯國威且及當時用事者姦邪之狀大為汪黃所忌書奏三日左遷而去復召為右史從臣向子諲奏事髙宗因與論筆法言久不輟子賤舉笏近前厲聲曰向子諲以無益之言久瀆聖聽叱之使下左右皆膽落由是又去國晚年力量尤凝定秦檜勢正炎炎冷處一角笑傲泉石作三戒説深以在得之規痛自警勵秦雖令人致語亦不答自少至老出入三朝而前後在官不過八百六十餘日所居僅蔽風雨郭外無尺寸之田經界法行獨以邱墓之寄輸帛數尺而已有磨鏡帖行於世言讀書者將以治心飬性如用藥以磨鏡也若積藥鏡上而不加磨治未必不反為鏡纍張禹孔光是已其大意如此世以為名言子賤自號默成居士伊尹祿之以天下不顧也繫馬千駟弗視也天下信之久矣故事湯事桀廢辟復辟不惟天下不以為疑而桀與太甲亦無一毫疑忌之心東坡論之曰辦天下之大事者有天下之大莭者也立天下之大節者狹天下者也夫以天下之大而不足以動其心則天下之大節有不足立而大事有不足辦者矣此論甚當後世唯諸葛武侯有伊尹風味其草廬三顧而後起與耕莘聘幣已略相類觀其告後主曰臣成都有桑八百株薄田十五頃子弟衣食自有餘饒臣身在外别無調度不别治生以長尺寸若死之日不使庫有餘帛廩有餘粟以負陛下觀此言則其視富貴為何等物故先主臨終謂之曰嗣子可輔輔之如其不然君可自取非先主照見孔明肝膽其肯發此言雖然先主孔明魚水相得發此言無難也此言之發後主與左右固皆聞之矣後主非明君也左右非無讒慝也孔明所謂諸有作姦犯科者宜付外廷論刑所以繩束左右者非不甚嚴也而當時曽無一人敢興單辭之謗後主倚信亦卒無纖芥之疑何哉只緣平時心事暴白足以取信上下故也自三代而後可謂絶無而僅有矣後之君子爭一階半級雖殺人亦為之自少至老貪榮嗜利如飛蛾之赴燭蝸牛之升璧青蠅之逐臭而曰我能立大莭辦大事其誰能信之楊東山嘗為余言昔周益公洪容齋嘗侍壽皇宴因談肴核上問容齋卿鄉里所産容齋番陽人也對曰沙地馬蹄鱉雪天牛尾狸又問益公公廬陵人也對曰金柑玉版筍銀杏水精蔥上吟賞又問一侍從忘其名浙人也對曰螺頭新婦臂龜腳老婆牙四者皆海鮮也上為之一笑某嘗陋三公之對昔某帥五羊時漕倉市舶三使者皆閩浙人酒邊各盛言其鄉里果核魚蝦之美復問某鄉里何所産某笑曰他無所産但産一歐陽子耳三公笑且慙楊東山言某初筮為永州零陵主簿太守趙謐字安卿丞相元鎮子也初參之時客將傳言待衆官退却請主簿客退趙具冠裳端立堂上凡再請某不動三請某解其意遂庭趨一揖上階稟敘逐一還他禮數既畢立問何日交割稟以欲就某日答云可一面交割一揖徑入更不延坐某退而抑鬱幾成疾以書白誠齋欲棄官而歸誠齋報曰此乃教誨吾子也他日得力處當在此某意猶未平後涉歷稍深方知此公善教人尚有前輩典刑朱文公云人家子弟初出仕宦須是討喫人打罵底差遣方是有益亦此意漢昭帝時夏陽男子成方遂居湖有故太子舍人謂之曰子貌甚似衛太子方遂利其言乃乘黃犢車詣北闕自稱衛太子公卿以下莫敢發言雋不疑後至叱吏收縛竟得其姦靖康之亂柔福帝姬隨北狩建炎四年有女子詣闕稱為柔福自敵中潛歸詔遣老宫人視之其貌良是問以宫禁舊事略能言倣佛但以足長大疑之女子顰蹙曰金人驅迫如牛羊跣足行萬里寧復故態哉上惻然不疑其詐即詔入宫授福國長公主下降髙世榮汪龍溪行制詞云彭城方急魯元嘗困於面馳江左既興益壽宜充於禁臠資粧一萬八千緡紹興十二年顯仁太后回鑾言柔福死于敵中久矣始知其詐執付詔獄乃一女巫也嘗遇一宫婢謂之曰子貌甚類柔福因告以宫禁事教之為詐遂伏誅前後請給錫賚計四十七萬九千緡古今事未嘗無對成方遂遇雋不疑故其詐不行此女巫若非顯仁之歸富貴終身矣荆公行新法鬻坊場河渡司農又請并祠廟鬻之官既得錢聽民為賈區廟中穢雜喧踐無所不至至張安道知南京上疏言宋王業所基也而以火王閼伯封於商邱以主大火微子為宋始封此二祠者獨不可免於鬻乎神宗覽之震怒批曰慢神辱國無甚於斯於是天下祠廟皆得免鬻近時豫章嘗於孺子亭前賣酒劉潛夫題詩云孺子亭前插酒旗遊人那解薦江蘺白鷗欲下還飛起曽見當年解榻時帥聞之亟令住賣嘉定間臨安西湖上三賢堂亦賣酒太學士人題詩云和靖東坡白樂天幾年秋菊薦寒泉如今往事都休問且為官司趂酒錢府尹聞之亦愧而止嘉定辛巳三月金人圍黃州詔馮榯援蘄黃榯遷延不進黃州守何大節字中立召僚佐告之曰城危矣而救不至諸君多有親老且非守土之臣可以死可以無死乃各豫以差出之檄使為去計自取郡印佩之誓以死守一夕輿兵忽奔告曰城陷矣擁之登車才出門敵兵已紛集大莭竟自沈于江未一月又陷蘄州守李誠之字茂欽手殺其妻子奴婢然後自殺官屬多死之朝廷褒贈誠之且為立廟而寧宗帝紀書大莭棄城遁二人皆出太學劉潛夫詩云淮堧便合營雙廟太學今方出二儒又云世俗今猶疑許逺君王元未識真卿蓋為中立解嘲然等死耳茂欽果決是以全莭中立遲懦是以敗名忠臣義士可以監矣李若谷為長社令日懸百錢於壁用盡即止東坡謫齊安日用不過百五十每月朔取錢四千五百斷為三十塊挂屋梁上平旦用畫乂挑取一塊即藏去又以竹筒貯用不盡者以待賓客云此賈耘老法也又與李公擇書云口腹之欲何窮之有每加莭儉亦是惜福延壽之道張無垢云余平生貧困處之亦自有法每日用度不過數十錢亦自足至今不易也有客自耒陽來言鄭亨仲日以數十錢懸壁間椒桂蔥薑皆約以一二錢曰吾平生貧苦晚年登第稍覺快意便成竒禍今學張子韶法要見舊時虀鹽風味甚長久也仇泰然守四明與一幕官極相得一日問及公家日用多少對以十口之家日用一千泰然曰何用許多錢曰早具少肉晚菜羮泰然驚曰某為太守居常不敢食肉只是喫萊公為小官乃敢食肉定非廉士自爾見疏余嘗謂莭儉之益非止一端大凡貪淫之過未有不生於奢侈者儉則不貪不淫是可以飬德也人之受用自有劑量省嗇淡泊有久長之理是可以飬夀也醉醲飽鮮昏人神志若疏食菜羮則腸胃清虛無滓無穢是可以飬神也奢則妄取茍求志氣卑辱一從儉約則於人無求於已無愧是可以飬氣也故老氏以為一寶吳請成於越句踐欲許之范蠡不可楚求和於漢髙帝欲許之張良不可此霸王成否之機也二子亦明決矣哉故曰需者事之賊又曰當斷不斷反受其亂桓玄竄位登御牀地忽陷羣臣失色殷仲文曰良由聖德深厚地不能載玄大恱南燕汝水不冰燕主超惡之李超曰良由逼帶京城近日月也燕主亦大恱下諂上愚可發一笑朱文公有足疾嘗有道人為施針尉之術旋覺輕安公大喜厚謝之且贈以詩云幾載相扶藉瘦笻一針還覺有竒功出門放杖兒童笑不是從前勃窣翁道人得詩徑去未數日足疾大作甚於未針時亟令人尋逐道人已莫知其所往矣公歎息曰某非欲罪之但欲追索其詩恐其持此誤他人爾禮記檀弓子貢曰泰山其頽則吾將安仰梁木其壞哲人其萎則吾將安倣吾郡劉尚書美中家有古本禮記梁木其壞之下有則吾將安仗五字朱文公嘗病女戒鄙淺欲别集古語成一書立篇目曰正靜曰卑弱曰孝愛曰和睦曰儉質曰寬惠曰講學且言如杜詩云嗟汝未嫁女秉心鬱忡忡防身動如律竭力機杼中凡此等句便可入正靜他皆倣此嘗以書屬靜春先生劉子澄纂輯迄不能成公蓋欲以配小學書也慶元間周益公以宰相退休楊誠齋以祕書監退休實為吾邦二大老益公嘗訪誠齋於南溪之上留詩云楊監全勝賀監家賜湖豈比賜書華回環自闢三三徑頃刻能開七七花門外有田供伏臘望中無處不煙霞却慙下客非摩詰無畫無詩只漫誇誠齋和云相國來臨處士家山間草木也光華髙軒行李能過李小隊尋花到浣花留贈新詩光奪月端令老子氣成霞味論藏去傳貼厥拈向田夫野老誇好事者繪以為圖誠齋題云平叔曽過魏秀才何如老子致元台蒼松白石青苔徑也不傳呼宰相來用魏野詩翻案也厥後誠齋冢嗣東山先生伯子端平初纍辭召命以集英殿修撰致仕家居年八十雲巢曽無疑益公門人也年尤髙嘗攜茶袖詩訪伯子其詩云褰衣不待履霜回到得如今亦樂哉泓頴有時供戲劇軒裳無用任塵埃眉頭猶自懷千恨興到何如酒一杯知道華山方睡覺打門聊伴茗奴來伯子和云雪舟不肯半塗回直到荒林意盛哉籬菊苞時披宿霧木犀香裏絶纖埃錦心繡口垂金薤月露天漿貯玉杯八十仙翁能許健片雲得得出巢來其風味庶幾可亞前二老云無疑博士工文尤精考訂有本朝新舊官制考行於世以隱逸召為祕閟校勘吾黨之士多勸其毋出而無疑竟出先君竹谷老人送以詩云泰華山人上赤墀上嗟安在見何遲老於尚父投竿日少似轅生對策時怨鶴驚猿辭舊隱鞭鸞笞鳯總新知早陳經國平邊策歸領雲巢舊住持無疑立朝逾年除大社令未及有所開陳奉祠而歸年九十乃終周益公云漢二獻皆好書而其傳國皆最逺士大夫家其可使讀書種子衰息乎杜陵詩云色難臭腐食風香色難臭腐用仙家王方平事獨食風香三字解者不注所出余觀佛書云凡諸所嗅風與香等意杜陵用此宋髙祖留葛燈籠麻繩拂於陰室唐太宗留柞木梳黑角箆於寢宫以此示後後世猶奢西漢諸儒揚子雲獨稱識字韓文公云凡為文者宜略識字則識字豈易乎哉朝景迂晚年日課識十五字楊誠齋云無事好看韻書唐李渤問歸宗禪師曰須彌納芥子僕即不疑芥子藏須彌恐無是理歸宗曰人言學士讀萬卷書是否渤曰然歸宗曰是心如椰子大萬卷書從何處著荆公詩云巫醫之所知督史之所業載車必百兩獨以方寸攝即歸宗之意余謂一心具一太極前輩謂鵬摶鯤運不足計其髙深日升月沈不足計其廣狹萬卷百車又何足道湯武應天順人之舉實出於伊尹太公湯五遣伊尹適夏意亦可見伊尹既醜有夏遂相湯伐桀詩曰實惟阿衡實左右商王不言湯用伊尹也書之誓有以地言者甘誓是也有以人言者湯誓是也有以國言者秦誓是也泰誓左傳孟氏皆謂之太誓古字泰太通前輩謂伐商之謀本於太公故以名誓詩曰維師尚父時維鷹揚涼彼武王肆伐大商不言武王用太公也湯武非富天下之志於此可見雖然夫子則不以是而恕湯武也序書之詞曰湯勝夏曰武王勝殷殺受未嘗分其罪於伊尹太公此與春秋書許世子止趙盾同一筆也東坡海外論可謂深識周孔之心矣余嘗疑商之取夏周之取商一也湯崩而太甲不明甚於成王之幼沖然夏人帖然未嘗萌蠢動之心及武王既喪商人不靖觀鴟梟小毖之詩悲哀急迫岌岌然若不可以一朝居何也湯放桀於南巢蓋亦聽其自屛於一方而終耳未至如以黃鉞斬紂之甚也故夏人之痛不如商人夫以懷王之死楚人尚且悲憤不已有楚雖三户亡秦必楚之語况六百年仁恩之所滲漉者哉當是時若非以周公之聖消息彌縫於其間則周之復為商也決矣且湯既勝夏猶有慙德栗栗危懼若將隕于深淵至于武王則全無此等意思矣由是論之湯武亦豈可並言哉朱文公云成湯聖敬日躋與盤銘數語猶有細密工夫至武王往往並不見其切已事詩曰髙山仰止景行行止景明也謂所行之光明也世俗有景仰景慕之語遂失其義妄以景訓仰多取前賢名姓加景字於上以為字如景周景顔之類失之矣前史王景略近世范景仁何嘗以景為仰哉真西山舊字景元後悟其非乃改為希元云始皇為楚所敗尚能謝王翦袁紹為魏所敗乃至殺田豐欲不亡得乎杜陵詩云萬里悲秋常作客百年多病獨登臺蓋萬里地之逺也秋時之慘悽也作客羈旅也常作客久旅也百年齒暮也多病衰疾也臺髙迥處也獨登臺無親朋也十四字之間含八意而對偶又精確古今稱大人其義不一左氏傳子服昭子曰夫必多有是説而後及其大人孟子曰有大人之事有小人之事此以位言也所謂王公大人是也孟子曰飬其大者為大人昌黎王適墓志曰翁大人不疑此以德望言也所謂大人君子是也若易之利見大人則兼德位而言之今人自稱其父曰大人然疏受對疏廣曰從大人議則叔父亦可稱大人滂將就誅與母訣曰大人割不忍之愛則母亦可稱大人太學藴道齋有小池忽一鷗飛來容與甚久一同舍生題詩云朝來池上有斯事火急報教同舍知昨夜雨餘春水滿白鷗飛下立多時讀者賞其醖藉晏子一狐裘三十年長孫道生一熊皮障泥數十年蓋貴而能儉若淵明十年著一冠則言其貧也鶴林玉露卷十一
