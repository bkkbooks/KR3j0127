body:
  text: 鶴林玉露卷二宋羅大經撰葉水心曰國初宰相權重臺諫侍從莫敢議已至韓琦范仲淹始空賢者而爭之天下議論相因而起朝廷不能主令而勢始輕雖賢否邪正不同要為以下攻上為名節地可也而未知為國家計也然韓范既以此取勝及其自用事臺諌侍從方襲其迹朝廷每有一事則是非鋒起譁然不安昔鄭子孔為載書諸司門子弗順將殺之子産止之又請為之焚書子孔不可子産以為衆怒難犯專欲難成迄焚而後定然及子産自為相却不知此直云禮義不愆何恤人言蓋韓范之所以攻人者卒其所以受攻而無以處此是以雖有志而無成也至如歐陽修先為諫官後為侍從尤好立論士之有言者皆依以為重遂以成俗及濮園議起未知是非所在而傾國之人回戈向之平日盛美一朝隳損善人君子化為仇敵然則歐陽氏之所以攻之者亦其所以受攻而不自知也水心之論如此余謂國初相權之重自藝祖鼎鐺有耳之説始趙韓王定混一之謀於風雪凌厲之中銷跋扈之謀於杯觴流行之際真社稷臣矣雷德驤何人乃敢議之宜藝祖之震怒也乃若持盈守成之時則權不可以不重亦不可以過重東坡所謂姦臣之始以臺諫折之而有餘及其既成以干戈取之而不足則臺諫侍從之敢言乃國勢之所恃以重也豈反因此而勢輕哉水心之説蓋張方平之遺論也方平之論前輩固已深闢之矣范公當國不久韓公當國時最被司馬溫公激惱然韓公包容聽受無幾微見於顔面常朝一不押班王陶至便指為跋扈而公亦無愠色蓋已為侍從臺諫則能攻宰相之失已為宰相則能受侍從臺諌之攻此正無意無我人已一視之道實賢人君子之盛德亦國家之美事也豈有巳則能攻人而人則不欲其攻巳哉諺云喫拳何似打拳時此言雖鄙實為至論惟歐陽公為諫官侍從時最號敢言及為執政主濮園稱親之議諸君子譁然起而攻之而歐陽公乃不能受人之攻執之愈堅辨之愈激此則歐公之過也公自著濮議兩篇其間有曰一時臺諫謂因言得罪猶足取美名是時聖德恭儉舉動無差兩府大臣亦各無大過未有事可以去者惟濮議未定乃曰此好題目所謂竒貨不可失也於是相與力言歐公此論却欠反思若如此則前此已為諫官侍從時每事爭辨豈亦是貪美名求竒貨尋好題目耶余嘗作濮議詩云濮園議起沸烏臺傳語歐公莫怨猜須記上坡持槖日也曾尋探好題來告命自九品而上角軸二等以大小别之此其卑也染牙以為經凡五等升朝歷數而上也而穗草為尊錦幖其端凡四等而細毬之錦配穗草告身皆制綾為之玳瑁軸素繪二等而繪為尊告身五綵而又有紫絲法錦囊其外其小異者錦之紅緑耳犀軸亦二等藻繪雖同而大小有别三品通用也絲囊如玳瑁而錦幖又不同告身亦如之而加以金縷此人臣一品之極也宫掖之嚴帝姬之親大略七等鐫犀為軸雕玉以為龍告身五綵絲囊幖首純紅而繪如雕玉者最髙以近君也犀軸絲囊為最髙而繪皆雲鳯者次之玳軸者又次之繪事如玳瑁而告紙損其三者又次之自此而下三等皆紫絲法錦雖有差次始寖卑矣宰相親王贈封視紫絲髙者執政贈封視次者其上四等明有尊不敢逼也絲囊之制以小鈴十繫之按式名曰帉錔黃金塗金白金三等外庭之繫惟白金耳侍從庶僚所封視其官蕃官祠宇所封從其秩合而陳之二十有八等品位愈髙則物采愈華此遊默齋所記宋朝之制甚詳明范曄作東漢史為方士立傳如左慈之事妖怪特甚君子所不道而乃大書特書之何其陋也曹子建辨道論曰世有方士吾王悉所招致甘陵有甘始廬江有左慈陽城有郤儉善辟榖悉號數百嵗所以集之魏國者誠恐此人挾姦宄以欺衆行妖惡以惑民豈復欲觀神仙於瀛洲求安期於邊海釋金輅而顧雲輿棄文驥而求飛龍哉子建此論其識過范曄逺矣漢武帝刻意求仙至以愛女妻方士可謂顛倒之極末年乃忽悔悟曰世豈有仙者節食服藥差可少病耳此論却甚確近時劉潛夫詩云但聞方士騰空去不見童男入海回無藥能令炎帝在有人曾哭老􅖫來盧景亮言足食足兵而人才足用則天下不難理矣著論曰三足記范旗叟為廣西憲會僚屬小酌曰今日之集非特不談風月亦且不論文章只説政疵民病衆皆唯唯余從容曰若談夫子孟軻之文章以澆光風霽月之胸次則民吾同胞物吾同與也癢痾疾痛舉切吾身施之有政當有本末先後而民病庶乎有瘳矣旗叟甚喜不以為忤旗叟號西堂先生開明練逹遇事如破竹性剛介有不可必逹其意而後止在廣西嵗餘丏祠歸養親發奏牘之日即出臺治寓僧舍不請俸給錢將漕湖南總所專人來索錢在庭咆哮無禮命杖而黥之既畢上章自劾乞歸田里總所迄不敢害朝廷為頒召命然竟卒於湖南其將卒也請僚屬入卧內命吏取案牘來據榻判結數事既畢又曰某縣有母訴其子者此關繫風教不可不施行命取來又判訖略言及身後事與僚屬揖别須臾已逝矣其精爽不亂如此有對越集百卷行于世皆其歷任判斷之語也近年門生故吏合辭請于朝特諡清敏余初任為容南法掾才數月偶留帥幕旗叟忽袖中出職狀一紙畀余余辭以未書一考不當受旗叟曰固也子亦漫收之若書一考而某未以罪去則可以放散不然亦聊見某具一隻眼耳又曰非特不必以詩文相惠明日亦不必到客位因言近日來諛風可羞長官招僚屬一杯其初招也則有所謂謝請其既畢也又有所謂謝會一杯之酒兩至客位行之者不以為耻此何等風俗耶小官不足責推其原皆由長官無見識妄自尊大遂成此風此雖小事然摧壞小官氣節關繫却大周禮庖人共祭祀之好羞鄭康成注云好羞謂四時所謂膳食若荆州之鮺魚揚州之蟹胥陸德明音釋云蟹醬也山谷詩云蟹胥與竹萌乃不羡羊腔或曰用兵之法殺人如殺草使錢如使水余曰軍無賞士不往軍無財士不來使錢如使水可也乃若殺人如殺草則非至論夫軍士固以嚴濟然禮樂慈愛戰所蓄也所以不得已而誅不用命者蓋一有逗撓亂行則三軍暴骨矣誅一人所以全千萬人豈以多殺為能以嗜殺為貴哉若如所言則趙充國王忠嗣曹彬反不若白起輩矣楊東山嘗謂余曰文章各有體歐陽公所以為一代文章冠冕者固以其溫純雅正藹然為仁人之言粹然為治世之音然亦以其事事合體故也如作詩便幾及李杜作碑銘記序便不減韓退之作五代史記便與司馬子長並駕作四六便一洗崑體圓活有理致作詩本義便能發明毛鄭之所未到作奏議便庶幾陸宣公雖遊戲作小詞亦無愧唐人花間集蓋得文章之全者也其次莫如東坡然其詩如武庫矛戟已不無利鈍且未嘗作史藉令作史其淵然之光蒼然之色亦未必能及歐公也曾子固之古雅蘇老泉之雄健固亦文章之傑然皆不能作詩山谷詩騷妙天下而散文頗覺瑣碎局促渡江以來汪孫洪周四六皆工然皆不能作詩其碑銘等文亦只是詞科程文手段終乏古意近時真景元亦然但長於作奏疏魏華甫奏疏亦佳至作碑記雖雄麗典實大槩似一篇好策耳又云歐公文非特事事合體且是和平深厚得文章正氣蓋讀他人好文章如喫飯八珍雖美而易厭至於飯一日不可無一生喫不厭蓋八珍乃竒味飯乃正味也宋紹定辛卯臨安之火比辛酉之火加五分之三雖太廟亦不免而史丞相府獨全洪舜俞詩云殿前將軍猛如虎救得汾陽令公府祖宗神靈飛上天可憐九廟成焦土時殿帥乃馮榯也人言籍籍迄今不免責韓蘄王之夫人京口娼也嘗五更入府伺候賀朔忽於廟柱下見一虎蹲卧鼻息齁齁然驚駭亟走出不敢言已而人至者衆復往視之乃一卒也因蹴之起問其姓名為韓世忠心異之密告其母謂此卒定非凡人乃邀至其家具酒食卜夜盡歡深相結納資以金帛約為夫婦蘄王後立殊功為中興名將遂封兩國夫人蘄王嘗邀烏珠於黃天蕩幾成擒矣一夕鑿河遁去夫人奏疏言世忠失機縱敵乞加罪責舉朝為之動色其明智英偉如此宋乾道間林謙之為司業與正字彭仲舉遊天竺小飲論詩談到少陵妙處仲舉微醉忽大呼曰杜少陵可殺有俗子在鄰壁聞之遍告人曰有一怪事林司業與彭正字在天竺謀殺人或問所謀殺者為誰曰杜少陵也不知是何處人聞者絶倒喧傳縉紳間余謂此言亦不足怪若曹操之於楊德祖隋煬之於薛道衡蓋真殺之也薑堯章學詩于蕭千巖琢句精工有詩云夜暗歸雲繞柁牙江涵星影鴈團沙行人悵望蘇臺栁曾與吳王掃落花楊誠齋喜誦之嘗以詩送江東集歸誠齋云翰墨場中老斫輪真能一筆掃千軍年年花月無虛日處處江山怕見君箭在的中非爾力風行水上自成文先生只可三千首回視江東日暮雲誠齋大稱賞謂其冡嗣伯子曰吾與汝弗如薑堯章也報之以詩云尤蕭范陸四詩翁此後誰當第一功新拜南湖為上將更差白石作先鋒可憐公等皆癡絶不見詞人到老窮謝遣管城儂已晚酒泉端欲乞疏封南湖謂張功父也堯章自號白石道人潘德久贈詩云世間官職似樗蒲采到枯松亦大夫白石道人新拜號斷無繳駮任稱呼時黃巖老亦號白石亦學詩於千巖詩亦工時人號雙白石云宋淳熙中王季海為相奏起汪玉山為大宗伯知貢舉且以書速其來玉山將就道有一布衣之友平生極相得屢黜於禮部心甚念之乃以書約其胥會于富陽一蕭寺與之對榻夜分密語之曰某此行或者典貢舉當特相牢籠省試程文易義冒子中可用三古字以此為驗其人感喜玉山既知舉搜易卷中果有冒子內用三古字者遂徑批上置之前列及拆號乃非其友人也私竊怪之數日友人來見玉山怒責之曰此必足下輕名重利售之他人何相負乃如此友人指天誓日曰某以暴疾幾死不能就試何敢漏泄於他人玉山終不釋然未幾以古字得者來謁玉山因問之曰老兄頭場冒子中用三古字何也其人泯默久之對曰茲事甚怪先生既問不敢不以實對某之來就試也假宿于富陽某寺中與寺僧間步廡下見室下一棺塵埃漫漶僧曰此一官員女也殯于此十年矣杳無骨肉來問又不敢自葬之因相與默然是夕夢一女子行廡下謂某曰官人赴省試妾有一語相告此去頭場冒子中可用三古字必登髙科但幸勿相忘使妾朽骨早得入土既覺甚怪之遂用其言果叨前列近已往寺中葬其女矣玉山驚嘆此事馮北山可久為余言雖近於語怪然亦不可不傳足以袪人二蔽一則功名富貴信有定分有則鬼神相之無則雖典貢舉者欲相牢籠至於場屋亦不能入此豈人之智巧所能為乎一則人發一念出一言雖昏夜暗室人所不知而鬼神已知之矣彼欲自欺於冥冥之中而曰莫豫云覯者又惑之甚者也宋隆興初張真父自殿中侍御史除起居郎孝宗玉音云張震知無不言言皆當理令載之訓詞大哉王言真臺諌之金科玉條也張循王之兄保嘗怨循王不相援引循王曰今以錢十萬緡卒五千付兄要使錢與人流轉不息兄能之乎保默然久之曰不能循王曰宜弟之不敢輕相援引也王嘗春日遊後圃見一老卒卧日中王蹴之曰何慵眠如是卒起聲喏對曰無事可做只得慵眠王曰汝會做甚事對曰諸事薄曉如回易之類亦粗能之王曰汝能回易吾以萬緡付汝何如對曰不足為也王曰付汝五萬對曰亦不足為也王曰汝需幾何對曰不能百萬亦五十萬乃可耳王壯之豫五十萬恣其所為其人乃造巨艦極其華麗市美女能歌舞音樂者百餘人廣收綾錦竒玩珍羞佳果及黃白之器募紫衣吏軒昻間雅若書司客將者十數輩卒徒百人樂飲逾月忽飄然浮海去逾嵗而歸珠犀香藥之外且得駿馬獲利幾十倍時諸將皆缺馬惟循王得此馬軍容獨壯大喜問其何以致此曰到海外諸國稱大宋回易使謁戎王餽以綾錦竒玩為招其貴近珍羞畢陳女樂迭奏其君臣大悅以名馬易美女且為治舟載馬以犀珠香藥易綾錦等物餽遺甚厚是以獲利如此王咨嗟褒賞賜豫優厚問能再往乎對曰此戲也再往則敗矣願仍為退卒老園中嗚呼觀循王之兄與浮海之卒其智愚相去奚翅三十里哉彼卒者頽然甘寢苔階花影之下而其胸中之智圓轉恢竒乃如此則等而上之若伊吕管葛者世亦豈盡無也哉特莫能識其人無繇試其藴耳以一弊衣老卒循王慨然捐五十萬緡畀之不問其出入此其意度之恢𢎞固亦足以使之從容展布以盡其能矣勾踐以四封之內外付種蠡漢髙皇捐黃金四十萬斤於陳平由此其推也蓋不知其人而輕任之與知其人而不能專任皆不足以有功視其一往之後辭不復再又幾於知進退存亡者異哉百官殿門侍班幕次臺諌皆設倚餘官則各以交牀自隨周益公自殿院除起居郎徐淳立戲曰罰却倚子矣春秋之時天王之使交馳於列國而列國之君如京師者絶少夫子謹而書之固以正列國之罪而端本澄源之意其致責於天王者尤深矣唐之藩鎮猶春秋之諸侯也杜陵詩云諸侯春不貢使者日相望蓋與春秋同一筆太學古詩云有髮頭陀寺無官御史臺言其清苦而鯁亮也宋嘉定間余在太學聞長上同舍言乾淳間齋舍質素飲器止陶瓦棟宇無設飾近時諸齋亭榭簾幕競為靡麗每一會飲黃白錯落非頭陀寺比矣國有大事讜論間發言侍從之所不敢言攻臺諫之所不敢攻由昔迄今偉節相望近世以來非無直言或陽為矯激或陰有附麗亦未能純然如古之真御史矣余謂必甘清苦如老頭陀乃能攄鯁亮如真御史濓溪明道伊川橫渠之講道盛矣因數明理復有一邵康節出焉晦庵南軒東萊象山講道盛矣因數明理復有一蔡西山出焉昔孔孟教人言理不言數然天地之間有理必有數二者未嘗相離河圖洛書與危微精一之語並傳邵蔡二子蓋將發諸子之所未言而使理與數燦然於天地之間其功亦不細近年以來八君子之學固人傳其訓家有其書而邵蔡之學則幾於無傳矣杜陵詩云新松恨不長千尺惡竹應須斬萬竿言君子之孤難扶植小人之多難驅除也嗚呼世道至於如此亦可哀矣唐薛能詩云山屐經過滿徑蹤隔溪遙見夕陽舂當時諸葛成何事只合終身作臥龍王荆公晚年喜誦之然能之論非也孔明之出雖不能掃清中原吹火德之灰然伸討賊之義盡託孤之責以教萬世之為人臣者安得謂之成何事哉荆公誦此蓋以自喻然孔明開誠心布公道集謀慮廣忠益其存心無愧伊吕出師未捷身先死此天也荆公剛愎自任新法煩苛毒流四海不忍君子之見排甘引小人以求助卒為其所擠陷此豈天也哉自古隱士出山第一箇是伊尹第二箇是傳説第三箇是太公第四箇是嚴陵第五箇是孔明第六箇是李泌皆為世間做得些事雖以四皓之出或者猶議其安劉是滅劉况如樊英輩者乎吾輩學道須是打疊教心下快活古曰無悶曰不愠曰樂則生矣曰樂莫大焉夫子有曲肱飲水之樂顔子有陋巷簞瓢之樂曾點有浴沂詠歸之樂曾參有履穿肘見歌若金石之樂周程有愛蓮觀草㺯月吟風傍花隨栁之樂學道而至於樂方能真有所得大槩於世間一切聲色嗜好洗得淨一切榮辱得失看得破然後快活意思方自此生或曰君子有終身之憂又曰憂以天下又曰莫知我憂又曰先天下之憂而憂此義又是如何曰聖賢憂樂二字並行不悖故魏鶴山詩云須知陋巷憂中樂又識耕莘樂處憂古之詩人有識見者如陶彭澤杜少陵亦皆有憂樂如採菊東籬揮杯勸影樂矣而有平陸成江之憂步屧春風泥飲田父樂矣而有眉攢萬國之憂蓋惟賢者而後有真憂亦惟賢者而後有真樂樂不以憂而廢憂亦不以樂而忘鶴林玉露卷二
