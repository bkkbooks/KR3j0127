body:
  text: 鶴林玉露卷十宋羅大經撰韓魏公曰養兵雖非古然亦自有利處議者但謂不如漢唐調兵於民獨不見杜甫石壕吏一篇調兵於民其弊乃如此後世旣收拾强悍無賴者養之以為兵良民雖稅斂良厚而終身保骨肉相聚之樂父子兄弟夫婦免生離死别之苦此豈小事魏公此論可謂至當余觀梅聖俞寳元間為葉縣宰詔書令民三丁籍一立校與長號弓箭手以備不虞田里騷然聖俞作田家詩云誰道田家樂春稅秋未足里胥叩我門日夕苦煎促盛夏流潦多白水髙於屋水旣害我菽蝗又食我粟前月詔書來生齒復版録三丁籍一壯惡使操弓韣州符令又嚴老吏持鞭朴搜索雅與艾唯存跛無目田閭敢怨嗟父子各悲哭南畝焉可事買箭賣牛犢愁氣變久雨鐺缶空無粥盲跛不能耕死亡在遲速我聞誠所慚徒爾叨君禄却詠歸去來刈薪向深谷又汝墳貧女云汝墳貧家女行哭音悽愴自言有老父孤獨無丁壯郡吏來何暴縣官不敢抗督遣勿稽留龍鍾去持杖勤勤囑四鄰幸願相倚傍適聞閭里歸問訊疑猶强果聞寒雨中僵死壤河上弱質無以託横屍無以葬生女不如男雖存何以當拊膺呼蒼天生死將奈向觀此二詩與石壕吏等篇何以異當是時乃太平極盛之時而一有籍民為兵之令便覺氣象與天寳相似乃知養兵之制實萬世之仁而魏公之說不可易也然魏公旣知籍民為兵之害矣而陜西義勇之制實出於公雖司馬温公極言其不便竟不為止又何與前言相戾也杜詩云江蓮揺白羽天棘夢青絲下句殊不可曉說者曰天棘栁也或曰天門冬也夢當作弄旣無考據意亦短淺譚浚明嘗為余言此出佛書終南長老入定夢天帝賜以青棘之香蓋言江蓮之香如所夢天棘之香爾此詩為僧齊已賦故引此事余甚喜其說然終未知果出何經近閱葉石林過庭録亦言此句出佛書則浚明之言宜可信山谷晚年作日録題曰家乗取孟子晉之乗之義謫死宜州永州有唐生者從之㳺為之經紀後事收拾遺文獨所謂家乗者倉忙間為人竊去尋訪了不可得後百餘年史衛王當國乃有得之以獻者衛王甚珍之後黄伯庸帥蜀以其為雙井之族乃以贐其行建炎中大駕駐維揚康伯可上中興十策一請皇帝設壇與羣臣六軍縞素戎服以必兩宫之歸二請移蹕關中治兵積粟號召兩河為雪恥計東南不足立事三請略去常制為馬上治用漢故事選天下英俊日侍左右講求天下利病通達外情四請河北未陷州郡朝廷不復置吏詔土人自相推擇各保鄉社以兩軍屯要害為聲援滑州置留府通接號令五請刪内侍百司州縣冗員文書務簡實以省財便事六請大赦與民更始前事一切不問不限文武不次登用以收人心七請北人避胡挈郡邑南來以從吾君者其首領皆豪傑當待之以將帥不可指為盗賊八請増損保甲之法團結山東京東西兩淮之民以備不虞九請講求漢唐漕運江淮道塗置使以餽關中十請許天下直言便宜州郡卽日繳奏置籍親覽以廣豪傑進用之路時宰相汪黄輩不能聽用而伯可名聲由是甚著余觀其策正大的確雖李伯紀趙元鎮亦何以逺過然厥後秦檜當國伯可乃附㑹求進擢為臺郎值慈寧歸飬兩宫燕樂伯可專應制為歌詞諛艶粉飾於是聲名掃地而世但以比栁耆卿輩矣檜死伯可亦貶五羊楞嚴經佛告波斯匿王汝年十三時見恒河水與今無異是汝皮肉雖皺見精不皺以明身有老少而見精常存身有死生而本性常在也晁文元嘗問隱者劉海蟾以不死之道海蟾笑曰人何曽死而君乃畏之求生乎所可死者形爾不與形俱滅者固常在也此理本常理但異端說得黏皮著骨如易曰精氣為物㳺魂為變孟子曰所過者化所存者神伊川曰堯舜㡬千年其心至今在横渠曰物物故能過化性性故能存神又曰存吾順事沒吾寧也說得多少混融楊誠齊月下傳杯詩云老夫渴急月更急酒落杯中月先入領取青天併入來和月和天都蘸溼天旣愛酒自古傳月不解飲真浪言舉杯將月一口吞舉頭見月猶在天老夫大笑問客道月是一團還兩團酒入詩腸風火發月入詩腸冰雪潑一杯未盡詩已成誦詩向天天亦驚焉知萬古一骸骨酌酒更吞一團月余年十許嵗侍家君竹谷老人謁誠齋親聞誠齋誦此詩且曰老夫此作自謂彷彿李太白徐思叔題貧樂圖詩首句云迺翁畫灰教兒書嬌兒赤骭玉雪膚厥妻曝日補破襦弊筐何有金十奴楊伯子和云三間破屋一床書錦心繡口冰肌膚自紉枯葉作袴襦此君便是長鬚奴王才臣和云大兒阻饑頗廢書小兒忍寒粟生膚婦縱有褌無一襦不敢縁此相庸奴三詩皆佳而後出者尤竒松栢之貫四時傲雪霜皆自拱把以至合抱惟竹生長於旬日之間而干霄入雲其挺特堅貞乃與松栢等此草木靈異之尤者也白樂天東坡潁濱與近時劉子翬論竹甚詳皆未及此杜陵詩云平生憩息地必種數竿竹梅聖俞云買山須買泉種樹須種竹信哉虞雍公初除樞密偶至陳丞相應求閣子内見楊誠齋千慮策讀一篇歎曰東南乃有此人物某初除合薦兩人當以此人為首應求導誠齋謁雍公一見握手如舊誠齋曰相公且子細秀才子口頭言語豈可便信雍公大笑卒援之登朝誠齋嘗言士大夫窮達初不必容心某平生不能開口求薦然薦之改秩者張魏公也薦之立朝者虞雍公也二公皆蜀人皆非有平生雅故雍公有翹館録載當世人物甚詳詩莫尚乎興聖人言語亦有専是興者逝者如斯夫不舎晝夜山梁雌雉時哉時哉無非興也特不曽櫽括恊韻爾蓋興者因物感觸言在於此而意寄於彼義味乃可識非若賦比之直言其事也故興多兼比賦比賦不兼興古詩皆然今姑以杜陵詩言之發潭州云岸花飛送客檣燕語留人蓋因飛花語燕傷人情之薄言送客留人止有燕與花耳此賦也亦興也若感時花濺淚恨别鳥驚心則賦而非興矣堂成云暫止飛烏將數子頻來語燕定新巢盖因烏飛燕語而喜已之攜雛卜居其樂與之相似此比也亦興也若鴻鴈影来聨塞上􅆃令飛急到沙頭則比而非興也荆公詩云謀臣本自繫安危賤妾何能作禍基但願君王誅宰嚭不愁宫裏有西施夫妲己者飛廉惡來之所寄也褒姒者棸子膳夫之所寄也太真者林甫國忠之所寄也女寵蠱君心而後憸壬階之以進依之以安大臣格君之事必以逺聲色為第一義而謂不愁宫裏有西施何哉范蠡霸越之後脫屣富貴扁舟五湖可謂一塵不染矣然猶挾西施以行蠡非恱其色也蓋懼其復以蠱吳者而蠱越則越不可保矣於是挾之以行以絶越之禍基是蠡雖去越未嘗忘越也曽謂荆公之見而不及蠡乎惟管仲之告齊桓公以竪刁易牙開方為不可用而謂聲色為不害霸與荆公之論略同其論商鞅曰今人未可非商鞅商鞅能令政必行夫二帝三王之政何嘗不行奚獨有取於鞅哉東坡曰商鞅韓非之刑非舜之刑而所以用刑者則舜之術也此說猶回護不如荆公之直截無忌憚其詠昭君曰漢恩自淺胡自深人生樂在相知心推此言也茍心不相知臣可以叛其君妻可以棄其夫乎其視白樂天黄金何日贖娥睂之句蓋天淵懸絶也其論馮道曰屈已利人有諸佛菩薩之行唐質肅折之曰道事十主更四姓安得謂之純臣荆公乃曰伊尹五就湯五就桀亦可謂之非純臣乎其强辨如此又曰有伊尹之志則放其君可也有周公之志則誅其兄可也有周后妃之志則求賢審官可也似此議論豈特執抝而已真悖理傷道也荀卿立性惡之論法後王之論李斯得其說遂以亡秦今荆公議論過於荀卿身試其說天下既受其毒矣章蔡祖其說而推演之加以凶險安得不産靖康之禍乎荆公論韓信曰貧賤侵陵富貴驕功名無復在芻蕘將軍北面師降虜此事人間久寂寥論曹參曰束髪山河百戰功白頭富貴亦成空華堂不着新歌舞却要區區一老翁二詩意却甚正然其當國也偏執己見凡諸君子之論一切指為流俗曽不如韓信之師李左車曹參之師蓋公又何也楊子幼以南山種豆之句殺其身此詩禍之始也至於空梁落燕泥之句庭草無人隨意緑之句非有所譏刺徒以琱斵工巧為暴君所忌嫉至賈竒禍則詩真可畏哉賈至謫岳州嚴武謫巴州杜少陵寄詩云賈筆論孤憤嚴君賦㡬篇定知深意苦莫使衆人傳貝錦無停織朱絲有斷絃浦鷗防碎首霜鶻不空拳蓋深戒之也劉禹錫種桃之句不過感歎之詞耳非甚有所譏刺也然亦不免於遷謫近世蔡持正數其罪惡雖兩觀之誅亦不為過乃以車蓋亭絶句謂為譏刺貶新州夫小人擿抉君子之詩文以為罪無怪也君子豈可亦擿抉小人之詩文以為罪乎東坡文章妙絶古今而其病在於好譏刺文與可戒以詩曰北客若來休問事西湖雖好莫吟詩盖深恐其賈禍也烏臺之勘赤壁之貶卒於不免觀其獄中詩云夢繞雲山心似鹿魂飛湯火命如雞亦可哀矣然纔出獄便賦詩云却對酒杯疑是夢試拈詩筆已如神略無懲艾之意何也晚年自朱崖量移合浦郭功甫寄詩云君恩浩蕩似陽春海外移來住海濱莫向沙邊弄明月夜深無數採珠人其意亦深矣渡江以來詩禍殆絶惟寳紹間中興江湖集出劉潛夫詩云不是朱三能跋扈只縁鄭五欠經綸又云東風謬掌花權柄却忌孤髙不主張敖器之詩云梧桐秋雨何王府楊栁春風彼相橋曽景建詩云九十日春晴景少一千年事亂時多當國者見而惡之並行貶斥景建布衣也臨川人竟謫舂陵死焉其往舂陵也作詩曰挾䇿行行訪楚囚也勝流落嶠南州鬢絲半是吴蠶吐襟血全因蜀鳥流徑窄不妨隨繭栗路長那更聽鈎輈家山千里雲千疊十口生離兩地愁自古豪傑之士立業建功定變弭難大抵以無所為而為之者為髙三代人物固不待言下此如范蠡霸越而扁舟五湖魯仲連下聊城而辭千金之謝却帝秦而逃上爵之封張子房顛嬴蹶項而飄然從赤松子遊皆足以髙出秦漢人物之上左太冲詩云功成不受賞長揖歸田廬李太白詩云事了拂衣去深藏身與名而世降俗末乃有激變稔禍欺君誤國殺人害物以希功賞者是誠何心哉是誠何心哉漢髙帝晚嵗欲易太子蓋以吕后鷙悍惠帝仁柔為宗社逺慮初非溺於戚姬之愛而為是邪謀也蘇老泉謂帝之以太尉屬周勃及病中欲斬樊噲皆是知有吕氏之禍可謂識帝之心者矣子房智人也乃引四皓為羽翼使帝涕泣悲歌而止帝之泣豈為兒女子而泣耶厥後趙王以酖亡惠帝以憂死向非吕后先殂平勃交驩則劉氏無噍類而火徳灰矣杜牧之所謂四老安劉是滅劉者誠哉是言也夫立子以長固萬世之定法然亦有不容拘者泰伯遜而周以興建成立而唐㡬危一得一失盖可見也夫子善齊桓首止之盟而美泰伯為至徳蓋善齊桓者明萬世之常經也美泰伯者示萬世之通誼也安子文與楊巨源李好義合謀誅逆曦旋殺巨源而專其功久之朝廷疑其跋扈俾帥長沙子文盡室出蜀嘗自賛云面目鄒搜行步藞䕢人言託住半周天我道一場真戯耍今日到湖南又成閒話靶在長沙計利析秋毫設㕔前豢豕成羣糞穢狼藉肥腯則烹而賣之罷鎮捆載歸蜀厥後楊九鼎在蜀以刻剥致諸軍之怨軍士莫簡倡亂殺九鼎剖其腹實以金銀曰使其貪腹飽飫時子文家居散財結士生擒莫簡剖心以祭九鼎再平蜀難余三十年前於釣臺壁間塵埃漫漶中得一詩云生涯千頃水雲寛舒卷乾坤一釣竿夢裏偶然伸隻脚渠知天子是何官不知何人作也句意頗佳近時戴式之詩云萬事無心一釣竿三公不換此江山當初誤識劉文叔惹起虚名滿世間句雖甚爽意實未然今考史籍光武儒者也素號謹厚觀諸母之言可見矣子陵意氣豪邁實人中龍故有狂奴之稱方其相友於𨼆約之中傷王室之陵夷歎海宇之横潰知光武為帝胄之英名義甚正所以激發其志氣而道之以除兇剪逆吹火徳於既灰者當必有成謀矣異時披圖興歎岸幘迎笑雄姿英發視向時謹敇之文叔如二人焉子陵實隂有功於其間天下既定從容訪帝共榻之卧足加帝腹情義如此子陵豈以匹夫自嫌而帝亦豈以萬乗自居哉當是之時而欲使之俛首為三公宜其不屑就矣史臣不察乃以之與周黨同稱夫周黨特一𨼆士耳豈若子陵友真主於潛龍之日而琢磨講貫𨼆然有功於中興之業者哉余嘗題釣臺云平生謹敕劉文叔却與狂奴意氣投激發潜龍雲雨志了知功跨鄧元侯講磨潜佐漢中興豈是空標處士名堪笑史臣無卓識却將周黨與同稱脩水深山間有小溪其渡曰來蘇蓋子由貶髙安監酒時東坡來訪之經過此渡鄉人以為榮故名以來蘇嗚呼當時小人媒蘖摧挫欲置之死地而其所經過之地溪翁野叟亦以為光華人心是非之公其不可泯如此所謂石壓筍斜出者是也張乖崖為崇陽令一吏自庫中出視其鬂傍巾下有一錢詰之乃庫中錢也乖崖命杖之吏勃然曰一錢何足道乃杖我邪爾能杖我不能斬我也乖崖援筆判云一日一錢千日一千繩鋸木斷水滴石穿自仗劔下堦斬其首申臺府自劾崇陽人至今傳之蓋自五代以來軍卒凌將帥胥吏凌長官餘風至此時猶未盡除乖崖此舉非為一錢而設其意深矣其事偉矣馮京字當世鄂州咸寧人其父商也壯年無子將如京師其妻授以白金數笏曰君未有子可以此為買妾之資及至京師買一妾立劵償錢矣問妾所自來涕泣不肯言固問之乃言其父有官因綱運欠折鬻妾以為陪償之計遂惻然不忍犯遣還其父不索其錢及歸妻問買妾安在具告以故妻曰君用心如此何患無子居數月妻有娠將誕里中人皆夢鼓吹喧闐迎狀元京乃生家貧甚讀書於􅈞山僧舍有犬京與共學者烹食之僧訴之縣縣令命作偷狗賦援筆立成警聯云團飯引來喜掉續貂之尾索綯牽去驚回顧之頭令擊莭釋之延之上座明年遂作三元有詩號􅈞山集皆其未遇時所作如琴彈夜月龍魂冷劔擊秋風鬼膽粗吟氣老懐長劔古醉胸橫得太行寛塵埃掉臂離長陌琴酒和雲入舊山豐年足酒容身易世路無媒着脚難皆不凡真西山帥長沙郡人為立生祠一夕有大書一詩于壁間者其辭云舉世知公不愛名湘人苦欲置丹青西天又出一活佛南極添成兩夀星㡬百年方鍾間氣八千春願祝修齡不須更作生祠記四海蒼生口是銘廬陵苗斛元額三十六萬承平時民户納苗一斛官支與鹽二斗五升蓋優之也龍泉太和兩縣去郡差逺添支一升渡江以來非惟官不支鹽反勒民户納鹽由是輸苗一斛者并鹽為一斛二斗五升而兩縣亦皆増納一升今世和買官不支錢而白取已為可怪若鹽者乃以其予民之數而為取民之數抑又甚矣然前後牧守不知㡬人曽無一人惻然動心為之敷奏蠲閣者是可歎也東山先生楊伯子嘗為余言某昔為宗正丞真西山以直院兼玉牒宫甞至某位中見案上有近時人詩文一編西山一見擲之曰宗丞何用看此某悚然問故西山曰此人大非端士筆頭雖寫得數句行所謂木心不正脉理皆邪讀之將恐染神亂志非徒無益某佩服其言再三謝之因言近世如夏英公丁晉公王岐公吕惠卿林子中蔡持正輩亦非無文章然而君子不道者皆以是也葉石林云杜工部詩對偶至嚴而送楊六判官云子雲清自守今日起為官獨不相對切意今日字當是令尹字傳寫之訛耳余謂不然此聯之工正為假雲對日兩句一意乃詩家活法若作令尹字則索然無神夫人能道之矣且送楊姓人故用子雲為切題豈應又泛然用一令尹耶如次第尋書札呼兒檢贈篇之句亦是假以第對兒詩家此類甚多道家之教宗老莊其後乃有神仙形解飛昇之說方士鍊丹葆形之術然老子云吾有大患為吾有身吾既無身而有何患莊子云予惡乎知恱生之非惑耶予惡乎知惡死之非弱喪而不知歸者邪麗之姬艾封人之子也晉國之始得之也涕泣霑襟及其至於王所與王同匡牀食芻豢而後悔其泣也予惡乎知夫死者不悔其始之蘄生乎又髑髏謂莊子曰子欲聞死之說乎死無君於上無臣於下亦無四時之事從然以天地為春秋雖南面王樂不能過也莊子不信曰吾使司命復生子形為子骨月肌膚反子父母妻子閭里知識子欲之乎髑髏深矉蹙額曰吾安能棄南面王樂而復為人間之勞乎是老莊之意以身為贅以生為苦以死為樂也今神仙方士乃欲長生不死正與老莊之說背而馳矣佛家所謂生滅滅已寂滅為樂乃老莊之本意也故老莊與佛元不為二歐陽公云道家乃貪生之論佛家乃畏死之論此蓋未嘗深考二家之要旨者也老莊何嘗貪生瞿曇何甞畏死貪生畏死之說僅足以排方士而已韓文公歐陽公皆不曽深看佛書故但能攻其皮毛唯朱文公早年洞究釋氏之旨故其言曰佛說盡出老莊今道家有老莊書不看盡為釋氏竊而用之却去倣效釋氏作經教之屬如清凈消災度人等經模擬可笑而北斗經尤鄙俚譬如巨室弟子所有珍寳悉為之盗去却去收人家破甕破釜此論窺見其骨髓矣然非特文公之言為然傅奕曰佛入中國􅏽兒幼夫模象莊老以文飾之則固已知其出於莊老矣唐武后斷王后蕭妃之手足置於酒甕中曰使此二婢骨醉蕭妃臨死曰願武為鼠吾為猫生生世世扼其喉亦可悲矣今俗間相傳謂猫為天子妃者蓋本此也予自讀唐史此段每見猫得鼠未嘗不為之稱快人心之公憤有千萬年而不可磨滅者嘗有詩云陋室偏遭黠鼠欺狸奴雖小策勲竒扼喉莫訝無遺力應記當年骨醉時鶴林玉露卷十
