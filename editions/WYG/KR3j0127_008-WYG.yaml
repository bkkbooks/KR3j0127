body:
  text: 鶴林玉露卷八宋羅大經撰常州宜興縣黃土村東坡南遷北歸嘗與單秀才步田至其地地主攜酒來餉曰此紅友也坡曰此人知有紅友而不知有黃封可謂快活余嘗因是言而推之金貂紫綬誠不如黃帽青蓑朱轂繡鞍誠不如芒鞵藤杖醇醪豢牛誠不如白酒黃雞玉户金鋪誠不如松窗竹屋無他其天者全也韓平原嘗為南海尉延一士人作館客甚賢而文旣别音問杳不通平原當國常思其人一日忽來上謁蓋已改名登第數年矣一見歡甚館遇極厚嘗夜䦨酒罷平原屏左右促膝問曰某謬當國秉外間議論如何其人太息曰平章家族危如累卵矣尚復何言平原愕然問故對曰是不難知也椒殿之立非出於平章則椒殿怨矣皇子之立非出於平章則皇子怨矣賢人君子自朱熹彭龜年趙汝愚而下斥逐貶死不可勝數則士大夫怨矣邊釁旣開三軍暴骨孤兒寡婦之哭聲相聞則三軍怨矣並邊之民死於殺掠内地之民死於科需則四海萬姓皆怨矣叢是衆怨平章何以當之平原黙然久之曰何以教我其人辭謝再三固問乃曰僅有一䇿主上非心黃屋若急建青官開陳三聖家法為揖遜之舉則皇子之怨可變而為恩而椒殿退居徳壽雖怨無能為矣於是輔佐新君渙然與海内更始曩時諸賢死者贈恤生者召擢遣使聘虜釋怨請和以安邊境優犒諸軍厚恤死士除苛解嬺盡去軍興無名之賦使百姓有更生之意然後選擇名儒遜以相位乞身告老為緑野之游則易危為安轉禍為福或者其庶幾乎平原猶豫不能决欲留其人處以掌故其人力辭竟去未幾禍作杜少陵詩云鷗行炯自如形容甚妙如召南大夫節儉正直而退食委蛇彼都人士行歸于周而從容有常皆炯自如者也杜少陵詩云莫笑田家老瓦盆自從盛酒長兒孫傾銀注玉驚人眼共醉終同臥竹根蓋言以瓦盆盛酒與傾銀壺而注玉盃者同一醉也尚何分别之有由是推之蹇驢布韉與金鞍駿馬同一遊也松牀筦席與繡帷玉枕同一寢也知此則貧富貴賤可以一視矣昔有僕嫌其妻之陋者主翁聞之召僕至以銀杯瓦椀各一酌酒飲之問曰酒佳乎對曰佳銀杯者佳乎瓦椀者佳乎對曰皆佳主翁曰杯有精粗酒無分别汝旣知此則無嫌於汝妻之陋矣僕悟遂安其室少陵詩意正如此而一本迺改玉字作瓦字失之矣李太白去婦詞云憶昔初嫁君小姑纔倚牀今日妾辭君小姑如妾長回頭語小姑莫嫁如兄夫古今以為絶唱然以余觀之特忿恨决絶之詞耳豈若谷風去婦之詞曰毋逝我梁母發我笱雖遭放棄而猶反顧其家戀戀不忍乎乃知國風優柔忠厚信非後世詩人所能彷彿也古今賦昭君詞多矣唯白樂天云漢使却迴憑寄語黃金何日贖娥眉君王若問妾顔色莫道不如宫裏時前輩以為高出衆作之上亦謂其有戀戀不忘君之意也歐陽公明妃詞自以為勝太白而實不及樂天至於荆公云漢恩自淺胡自深人生樂在相知心則悖理傷道甚矣杜子美儒冠忍餓垂翅青冥殘盃冷炙酸辛萬狀不得已而去秦然其詩曰尚憐終南山回首清渭濱戀君之意藹然溢於言外其為千載詩人之冠冕良有以也魏鶴山云處人倫之變當以三百五篇為正考槃小宛之為臣小弁凱風之為子燕燕谷風之為婦終風之為母栢舟之為宗臣何人斯之為友皆不遇者也而責已重以周待人輕以約優柔諄切怨而不怒憂而不敢疏也東坡在黃在惠在儋不患不偉患其傷於太豪便欠畏威敬怒之意如兹遊最竒絶所欠唯一死之類詞氣不甚平又如韓文公廟碑詩云作書詆佛譏君王要觀南海窺衡湘方作諫書時亦冀諌行而跡隱豈是故為詆訐要為南海之行蓋後世詞人多有此意如去國一身高名千古之類十有八九若此不知君臣義重家國憂深聖賢去魯去齊不若是恝者非以一去為難也此論精矣武惠妃薨明皇悼念不置後宫數千無當意者或言壽王妃楊氏之美絶世無雙帝見而悦之乃令妃自以其意乞為女官號太真更為壽王娶韋昭訓女潜納太真宫中寵遇如惠妃冊為貴妃與衛宣公納伋之妻無以異白樂天長恨歌云楊家有女初長成養在深閨人未識天生麗質難自棄一朝選在君王側為尊者諱也近時楊誠齋題武惠妃傳云桂折秋風露折蘭干花無朶可天顔壽王不忍金宫冷獨獻君王一玉環詞雖工意亦未婉唯李商隱云龍池賜酒敞雲屏羯鼓聲高衆樂停夜半宴歸宫漏永薛王沉醉壽王醒其詞微而顯得風人之體士大夫危言峻節遷謫凄凉晚嵗收用衰落懲創刓方為圓者多矣吕子約謫廬陵量移高安楊誠齋送行詩云不愁不上青霄去上了青霄莫愛身蓋祖杜少陵送嚴鄭公云公若居台輔臨危莫愛身然以之送遷謫向用之士則意味尤深長也晁以道與陳叔易俱隱嵩山叔易被召出山以道作詩云處士何人為作牙盡攜猿鶴到京華故山巖壑應惆悵六六峰前只一家籍溪胡原仲除正字朱文公寄詩云先生去上芸香閣閣老新峩豸角冠留取幽人卧空谷一川風月要人㸔二詩相似然以道後亦出山時人反以此詩嘲之文公卷舒以道難進易退高節全名師表百世乃知終南少室之流與有道之士正不可同年語也東坡批答吕大防辭免恩命云卿有夷狄盜賊之虞倉廩禮樂之歎隂陽風雨之憂此三者誠當今之大計孟子曰責難於君謂之恭夫旣以責其君而不以身任之非仁人也蓋援其所自言者以勉之近時真西山批答參政樓鑰乞致仕不允云夫七十致仕雖著于經二三大臣難拘此制卿昔代言嘗以是却臣隣之請矣豈今日遂忘斯誼乎此又切矣李泰發忤秦檜貶海上雷州守王彦恭存問周餽甚至檜聞之貶彦恭辰陽陸升之泰發姪壻也告訐泰發家事得刪定官檜死彦恭復官升之貶雷州胡澹菴謫嶺南士大夫多凌蔑之否則畏避之方滋字務徳本亦檜黨待之獨有加禮澹菴深徳之檜死其黨皆逐務徳入京謀一差遣不可得栖栖旅館澹菴偶與王梅溪語及其事梅溪曰此君子也率館中諸公訪之且揄揚其美務徳由此遂晉用由此觀之君子嬴得做君子小人枉了做小人潁濱釋荘子曰魚不畏網罟而畏鶗鶘畏其天也物之畏其天誠有可恠者余里中一村童嘗見大蛙十數聚于汙池叢棘之下欲前捕之熟視乃一巨蛇蟠棘下以次啖羣蛙羣蛙凝立待啖不敢動又村叟見蜈蚣逐一蛇行甚急蜈蚣漸近蛇不復動張口以待蜈蚣竟入其腹逾時而出蛇已斃矣村叟棄蛇于深山中踰旬往視之小蜈蚣無數食其腐肉蓋蜈蚣産卵于蛇腹中也余又嘗見一蜘蛛逐蜈蚣甚急蜈蚣逃入籬搶竹中蜘蛛不復入但以足跨竹上摇腹數四而去伺蜈蚣久不出剖竹視之蜈蚣已節節爛㫁如鱟醬矣蓋蜘蛛摇腹之時乃灑溺以殺之也物之畏其天有如此者夫蛇之恣啖羣蛙自以為莫已敵矣而不知蜈蚣之能涉其腹也蜈蚣之斃蛇育子自以為莫吾禦矣而不知蜘蛛之能醢其軀也世之人昂昂然以凶毒自多者可以觀矣且蛙之不能敵蛇固也蜈蚣小於蛇矣而能制蛇蜘蛛小於蜈蚣矣而能制蜈蚣物豈專以小大為强弱哉詩用助語字貴帖妥如杜少陵云古人稱逝矣吾道卜終焉又云去矣英雄事荒哉割據心山谷云且然聊爾耳得也自知之韓子蒼云曲檻以南青嶂合高堂其上白雲深皆渾然帖妥吾郡前輩王才臣云並舍者誰清可喜各家之竹翠相交曾幼度云不可以風霜後葉何傷於月雨餘雲亦佳朱文公晚年以野服見客榜客位云滎陽吕公嘗言京洛致仕官與人相接皆以閒居野服為禮而歎外郡之不能然其㫖深矣某巳叨誤恩許致其事本未敢遽以老夫自居而比縁久病艱於動作遂不免遵用舊京故俗輒以野服從事然上衣下裳大帶方履比之凉衫自不為簡其所便者但取束帶足以為禮解帶足以燕居且使窮鄉下邑得以復見祖宗盛時京都舊俗如此之美也余嘗於趙季仁處見其服上衣下裳衣用黃白青皆可直領兩帶結之縁以皂如道服長與膝齊裳必用黄中及兩旁皆四幅不相屬頭帶皆用一色取黄裳之義也别以白絹為大帶兩旁以青或皂縁之見儕輩則繫帶見卑者則否謂之野服又謂之便服寶慶初元洪舜俞為考功郎應詔言事詞㫖剴切真西山謂陳正甫曰讀洪考功封事某殊有愧色其封事中論臺諫失職云月課將臨筆不敢下稱量議論之異同揣摩情分之厚薄可否未决吞吐不能其相率勇往而不顧者恭請聖駕欵謁景靈宫而已臺臣摘以為言謂祇見宗廟此重事也而洪某乃言欵謁景靈宫而已詞語嫚易有輕宗廟之意遂遭罷黜仍鐫三官舜俞有詩云不得之乎成一事却因而已失三官庶人之讎釋記禮者謂可盡五世矧有天下者乎齊襄復九世之讎春秋大之我國家之於金人蓋百世不共戴天之讎也開禧之舉韓侂胄無謀浪戰固可罪矣然乃至函其首以乞和何也當時太學諸生之詩曰晁錯旣誅終叛漢於期已入竟亡燕此但以利害言耳蓋未嘗以名義言也譬如人家子孫其祖父為人所殺其田宅為人所吞有一狂僕佐之復讎謀疎計淺迄不能遂乃歸罪此僕送之讎人使之甘心焉可乎哉韓昌黎上大尹李實書云愈來京師於今十五年所見公卿大臣不可勝數皆能守官奉職無過失而已未見有赤心事上憂國如閣下者今年以來不雨者百有餘日種不入土野無青草而盜賊不敢起穀價不敢貴百坊百二十司六軍二十四縣之人皆若閣下親臨其家老姦宿贓銷縮摧沮魂亡魄䘮影滅迹絶非閣下條理鎮服布宣天子威徳其何能及此其後作順宗實錄乃云實謟事李齊運驟遷至京兆尹恃寵强愎不顧邦法是時大旱畿甸乏食實一不以介意方務聚斂徵求以給進奉每奏對輒曰今年雖旱而穀甚好由是租税皆不免陵轢公卿勇於殺害人不聊生及謫通州長史市里讙呼皆袖瓦礫遮道伺之與前書一何反也豈書乃過情之譽而史乃紀實之辭耶然退之古君子單辭片語必欲傳信寜肯妄發而譽之過情乃至於此是不可曉也近時汪彦章投李伯紀啓云孤忠貫日正二儀傾側之中凛氣横秋揮萬騎笑談之頃又云士訟公寃咸舉幡而集闕下帝從民望令免胄以見國人其賛美至矣及居翰苑草伯紀謫詞乃云朋姦罔上有虞必去於驩兠欺世盜名孔子先誅於正卯又云専殺尚威傷列聖好生之徳信讒喜佞為一時羣小之宗與前啓又何反也伯紀真君子而醜詆至此嘻其甚矣當時亦有以此問彦章者彦章云我前啓自直一翰林學士而彼不我用安得不醜詆之是可笑也退之之於李實豈亦若是耶然李實真小人與伯紀不同退之失於前之過譽彦章失於後之過毁譽猶可過也毁不可過也杜少陵絶句云遲日江山麗春風花草香泥融飛燕子沙暖睡鴛鴦或謂此與兒童之屬對何異余曰不然上二句見兩間莫非生意下二句見萬物莫不適性於此而涵泳之體認之豈不足以感發吾心之真樂乎大抵古人好詩在人如何㸔在人把做甚麽用如水流心不競雲在意俱遲野色更無山隔斷天光直與水相通樂意相闗禽對語生香不斷樹交花等句只把做景物㸔亦可把做道理看其中亦儘有可玩索處大抵看詩要胸次玲瓏活絡韓世忠嘗議買新淦縣官田高宗聞之御札特以賜世忠其詞云卿遇敵必克克且無擾聞卿買新淦田為子孫計今舉以賜卿聊旌卿之忠故其荘號旌忠蓋當時諸將各以姓為軍號如張家軍岳家軍之類朝廷頗疑其跋扈聞其買田蓋以為喜故特賜之世忠之買田亦未必非蕭何之意也克且無擾四字可謂要言如王全斌輩非不克奈擾何信能行此四字雖古名將何以加諸漢惟一趙充國唐惟一王忠嗣本朝惟一曹彬有三代將帥氣象唐人詩云澤國山河入戰圖生民何計樂樵蘇憑君莫話封侯事一將功成萬骨枯讀之可為酸鼻杜少陵詩云彤庭所分帛本自寒女出鞭撻其夫家聚斂貢城闕聖人筐篚恩實欲邦國活臣如忽至理君豈棄此物即爾俸爾禄民膏民脂之意也士大夫誦此亦可以悚然懼惻然思矣余嘗見州郡迓新者設飾甚費因成詩云赤子須摩撫紅塵幾送迎幕張雲匼匝車列鑑鮮明豈是朘民血空教適宦情忍聞分竹者竭澤自求盈兖王假山成請宫僚觀之姚坦熟視曰此血山耳開寶塔成田錫上疏曰衆以為金碧熒煌臣以為塗膏釁血諸葛孔明曰吾心如秤不能為人作輕重至哉言乎信能此則吾心即造化也殺之而不怨利之而不庸已不勞而萬物服矣乃知孔明長嘯草廬時其所講不在伊吕下杜少陵云伯仲之間見伊吕指揮若定失蕭曹可謂識孔明心事矣或謂旣比之以伊吕矣又比之以蕭曹何也余曰不然下句蓋惜其指揮未定而死耳使其指揮若定則雖蕭曹且不能當况司馬仲達乎指揮蓋措置經畫也如兵民雜耕留屯久駐之類失猶無也故末句有志决身殱之歎郭仲晦云用兵以持重為貴蓋知彼知己先為不可勝以待敵之可勝此百戰百勝之術也昔韓范二公在五路韓公力於戰范公則不然曰吾唯知練兵選將積穀豐財而已余觀東軒筆録載韓公欲五路進兵以襲平夏范公不可韓公遣尹師魯至慶州約進兵范公曰我師新敗士卒氣沮但當謹守以觀其變豈可輕兵深入師魯歎曰公於此乃不及韓公也韓公嘗云大凡用兵當先置勝負於度外公何區區過慎如此范公曰大軍一動萬命所懸乃可置於度外乎師魯不能强而還韓公遂舉兵次好水川元昊設伏我師䧟没大將任福死之韓公遽還至半塗亡者之父兄妻子數千人號於馬首持故衣紙錢招魂而哭曰汝昔從招討出征今招討歸而汝死矣汝之魂識亦能從招討以歸乎哀慟之聲震天地韓公掩泣駐馬不能進范公聞之歎曰當是時難置勝負於度外也國朝人物當以范文正為第一富韓皆不及富公欲誅晁仲約其見亦不逮范公余嘗有詩云奮髯要斬高郵守攘臂甘驅好水軍到得繞牀停轡日始知心服范希文劉元城貶梅州章惇輩必欲殺之郡有土豪兇人也以貲得官往來京師見章惇自言能殺元城惇大喜即除本路轉運判官其人驅車速還及境郡守遣人告元城元城略處置後事與客笑談飲酒以待之至夜半忽聞鐘聲問之則其人忽嘔血死矣秦檜晚年嘗一夕秉燭獨入小閣治文書至夜分蓋欲盡殺張徳逺胡邦衡諸君子凡十一人區處旣定只俟明早奏行之四更忽得疾數日而卒檜父嘗為靜江府古縣令守帥胡舜陟欲為檜父立祠於縣以為逢迎計縣令高登剛正士也堅不奉命舜陟大怒文致其罪送獄鍛鍊備極慘毒登幾不能堪未數日舜陟忽殂登乃獲免近時大理評事胡夢昱以直言貶象郡過桂林帥錢宏祖欲害之未及有所施行亦暴亡嗚呼謂天不佑忠賢可乎朱文公云齊人歸女樂説者為受女樂必怠於政事故孔子遂行然以史記觀之又似夫子懼其讒毁而去如曰彼婦之口可以出走是已魯仲連論帝秦之害亦曰彼又將使其子女讒妾為諸侯妃處梁之宫梁君安得晏然而已乎想當時列國多此等事故夫子不得不星夜急走余謂齊人但欲蠱魯君之心君心旣蠱則所謂怠於政事聴讒嫉賢之事自然色色有之楊誠齋云人主之治天下必先正其治之之主人臣之相其君必先正其人主之主而小人敵國之欲傾人之國也必先敗其人主之主而已齊人懲於夾谷而謀魯也不以齊謀魯也以魯謀魯也魯以女樂罷朝而孔子行則先敗其用孔子之主也孰謂用孔子之主非魯君之心乎苗傅劉正彦之亂張魏公在秀州謀舉勤王之師苗劉偽詔至大赦厚犒諸軍公潜於府庫中尋舊詔書令人馳往十數里外易其詔旣至令僚屬宣詔但為撫諭之詞略張於譙樓旋即斂之大犒諸軍羣情頼以不揺時張俊亦在秀州公深結之㑹韓世忠舟師亦至公與世忠對哭因饗俊世忠將士呼諸將校至前抗聲問曰今日之事孰逆孰順皆對曰賊逆我順又曰若浚此舉違天悖人可取浚頭歸苗傅不然一有退縮悉以軍法從事衆皆感憤遂勒兵行次臨平逆黨屯拒不得前世忠等摶戰大破之傅正彦遁入閩追獲斬首拜公知樞宻院事時年纔三十二楊誠齋贈抄經頭陀詩云刺血抄經奈若何十年依舊一頭陀袈裟未着言多事着了袈裟事更多今世儒生竭半生之精力以應舉覔官幸而得之便指為富貴安逸之媒非特於學問切己事不知盡心而書冊亦幾絶交如韓昌黎所謂墻角君看短檠棄陳后山所謂一登吏部選筆硯隨掃除者多矣是未知着了袈裟之事更多也余同年李南金登第後畫師以冠裳冩其真南金題詩云落魄江湖十二年布衫闊袖裹風煙如今各様新装束典却清狂賣却顛雖一時戲語然知紳裳之東縳非韋布比而加意檢束亦自有味鶴林玉露卷八
