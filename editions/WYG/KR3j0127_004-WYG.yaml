body:
  text: 鶴林玉露巻四宋羅大經撰蔡攸嘗賜飲禁中徽宗頻以巨觥宣勸之攸懇辭不任杯酌將至顛踣上曰就令灌死亦不至失一司馬光也由是言之則上之尊光而薄攸至矣然光已死不免削奪而攸迄被眷寵是可歎也唐子西在惠州名酒之和者曰養生主勁者曰齊物論楊誠齋退休名酒之和者曰金盤露勁者曰椒花雨嘗曰余愛椒花雨甚於金盤露意蓋有為也余嘗謂與其一於和勁孰若和勁兩忘頃在太學時同舍以思堂春合潤州北府兵厨以慶逺堂合嚴州瀟洒泉飲之甚佳余曰不剛不柔可以觀徳非寛非猛可以觀政矣厥後官于容南太守王元邃以白酒之和者紅酒之勁者手自劑量合而為一殺以白灰一刀圭風韻頓竒索余作詩余為長句云小槽真珠太森嚴兵厨玉友專甘醇兩家風味欠商畧偏剛偏柔俱可憐使君䄂有轉物手鸕鷀杓中平等分更憑石髓媒妁之混融併作一家春季良不用笑伯髙張竦何必譏陳遵時中便是尼父聖孤竹栁下成一人平雖有智難獨任勃也未可嫌少文黄龍丙魏要兼用姚宋相濟成開元試將此酒反觀我胸中問學當日新更将此酒逹觀國宇宙皆可歸經綸書生觸處便饒舌以一貫萬如斵輪使君聞此却絶倒罰以太白眠金尊書曰若作和羮爾惟鹽梅詩曰摽有梅其實七兮又曰終南何有有條有梅毛氏曰梅枏也陸璣曰佀杏而實酸蓋但取其實與材而已未嘗及其花也至六朝時乃略有詠之者及唐而吟詠滋多至宋朝則詩與歌詞連篇累牘推為羣芳之首至恨離騷集衆香艸而不應遺梅余觀三百五篇如桃李芍藥棠棣蘭之類無不歌詠如梅之清香玉色迥出桃李之上豈獨取其材與實而遺其花哉或者古之梅花其色香之竒未必如後世亦未可知也蓋天地之氣騰降變易不常其所而物亦隨之故或昔有而今無或昔無而今有或昔庸凡而今瑰異或昔瑰異而今庸凡要皆難以一定言且如古人之祭􅌊蕭酌鬱鬯取其香也而今之蕭與鬱金何嘗有香蓋離騷已指蕭艾為惡草矣又如牡丹自唐以前未有聞至武后時樵夫採山乃得之國色天香髙掩羣花於是舒元輿為之賦李太白為之詩固已竒矣至宋朝紫黄丹白標目尤盛至於近時則翻騰百種愈出愈竒又如荔支明皇時所謂一騎紅塵妃子笑者謂瀘戎産也故杜子美有憶向瀘戎摘荔支之句是時閩品絶未有聞至今則閩品竒妙香味皆可僕視瀘戎蔡君謨作譜為品已多而自後竒名異品又有出於君謨所譜之外者他如木犀山礬素馨茉莉其香之清婉皆不出蘭芷下而自唐以前墨客槧人曾未有一話及之者何也游成之曰一氣埏埴孰測端倪烏知古所無者今不新出而昔常見者後不變滅哉人生須㬰即以耳目之常者拘議造物亦已陋矣余聞秦中不産竹昔年山崩其下乃皆鉅竹頭由是言之古固産竹矣晉葛洪欲問丹砂求為勾漏令勾漏縣𨽻容州余嘗為法曹親至其地求所謂丹砂者顆粒不可得豈非昔有而今無哉蓋非特物然也巴卭閩矯夙號荒陋而漢唐以來漸産人才至本朝益盛古稱山西出將山東出相又曰汝潁多竒士燕趙多佳人其説拘矣宋紹興辛巳金主亮南侵髙宗下詔親征其詞云惟天惟祖宗既共昌於基運有民有社稷敢自逸於燕安又云嵗星臨於呉分定成淝水之勲鬭士倍於晉師可決韓原之勝洪容齋筆也車駕決平江亮被弑遂班師次年壬午内禪孝宗即位鋭意規恢起張魏公督師南軒以内機入奏引見徳夀宫時盧仲賢使金髙宗問曾見仲賢否對曰臣已見之又問卿父謂如何莫便議和否對曰臣嘗謂金人必衰敗國家必隆興上曰何如對曰太上皇帝仁孝之徳上格于天又傳位聖子雖古唐虞無以過而海陵不道簒奪相仍古稱好善惡淫不知天心祐國家乎祐金人乎臣有以知其然也上曰極是今日金人誠衰乎對曰自亮弑死之後士馬物故甚衆諸國背叛人心怨離金誠衰矣上曰自亮死非特金人衰弱吾國亦未免力弱但仲賢等既囘何以應之對曰臣父職在邊隅戰守是謹此事著廟堂如何議但願審處而徐應之無貽後悔上曰只是説與卿父今日國家須更量度民力國力早收拾取聞契丹與金相攻若契丹事成他日自可收卞荘子刺虎之功若金未有亂且務恤民治軍待時而動可也髙宗懲於變故意不欲戰且聞金人議欲尊我為兄故頗喜之孝宗幼年規恢之志甚鋭而卒不得逞者非特當時謀臣猛將凋喪畧盡財屈兵弱未可展布亦以徳夀聖志主於安靜不忍違也厥後蓄積稍羡又嘗有意用兵祭酒芮國器奏曰陛下只是被數文腥錢使作何不試打筭了得幾畨犒賞上曰朕未知計也待打筭報卿後打筭只了得十三畨犒賞於是用兵之意又寢乃知南北分合自有定數雖英明之主不能强也元次山避水于髙原餱糧不繼遂餓而死陳后山為館職當侍祠郊丘非重裘不能禦寒后山止有其一其内子與趙挺之之内親姊妺也乃為趙假一裘以衣之后山問所從来内以實告后山曰汝豈不知我不著他衣裳即却去之止衣一裘竟感寒疾而死嗚呼二子可謂志士不忘在溝壑者矣充二子之才識徳望曳絲乗車食養賢之鼎其誰曰不宜然志節清髙寧甘於餓死凍死而不肯少枉其道少失其身此所以皜皜乎不可尚也陸龜蒙杞菊賦曰我豈不知屠沽兒有酒食耶亦畧有二子風味揚子雲曰古者髙餓顯下禄隱楊誠齋曰李杜饑寒能幾日却教富貴不論年文中子曰通也受夫子罔極之恩孟子曰不失其身而能事其親者吾聞之矣失其身而能事其親者吾未之聞也由是言之今儒者大半是吾夫子之罪人嵗將饑小民餐必倍俗諺謂之作荒此天地之氣先見也宋開禧兵興之先江西果木秋冬生花有山礬而生梔子花桃樹而生李實此天地之氣先亂也馮北山為余言之唐子西詩云山靜佀太古日長如小年余家深山之中每春夏之交蒼蘚盈堦落花滿徑門無剥啄松影參差禽聲上下午睡初足旋汲山泉拾松枝煑苦茗啜之隨意讀周易國風左氏傳離騷太史公書及陶杜詩韓蘇文數篇從容步山徑撫松竹與麛犢共偃息於長林豐草間坐弄流泉潄齒濯足既歸竹窓下則山妻稚子作筍蕨供麥飯欣然一飽弄筆牕間隨大小作數十字展所藏法帖筆蹟畫卷縱觀之興到則吟小詩或艸玉露一兩段再烹苦茗一杯出步溪邊解后園翁溪友問桑麻説秔稻量晴校雨探節數時相與劇談一餉歸而倚杖柴門之下則夕陽在山紫緑萬狀變幻頃刻恍可人目牛背笛聲兩兩来歸而月印前溪矣味子西此句可謂妙絶然此句妙矣識其妙者蓋少彼牽黄臂蒼馳獵於聲利之場者但見衮衮馬頭塵匆匆駒隙影耳烏知此句之妙哉人能真知此妙則東坡所謂無事此靜坐一日是兩日若活七十年便是百四十所得不已多乎余少年時於鍾陵解后日本國一僧名安覺自言離其國已十年欲盡記一部藏經乃歸念誦甚苦不舍晝夜每有遺忘則叩頭佛前祈佛陰相是時已記藏經一半矣夷狄之人異教之徒其立志堅苦不退轉至於如此朱文公云今世學者讀書尋行數墨備禮應數六經語孟不曾全記得三五板如此而望有成亦已難矣其視此僧殆有愧色史言蜀諸賢凋喪孔明身當軍國之務罰二十以上皆親之以勞瘁致斃此真兒童之論也夫孔明不死則漢業可復禮樂可興孔明死則為劉石又變為六朝幅裂其所關繫甚大中營隕星之變天意蓋可知矣豈因罰二十以上皆親之而致斃乎且孔明死時纔五十四初非癃老不任勞苦之時况以孔明之明逹豈不能量事之小大身之勞逸而顧弊精神於瑣瑣以自殞其軀乎此決無之理也杜少陵知之故曰伯仲之間見伊吕指麾若定失蕭曹運移漢祚難恢復志決身殱軍務勞言孔明之死乃漢運已移漢祚已終大數不可支持耳志決身殱豈因軍務之勞乎蓋不然史臣之説也龍洲劉改之詩云退一步行安樂法道三箇好喜歡縁真西山喜誦之或曰退一步行可也至於道三箇好乃隨俗徇情耳何足言乎余曰古人直道而行理之所在驀直行将去仕止久速莫不皆然烏有所謂退一步者自後世貪榮競進爭一階半級至於殺人於是始以退一步行為安樂法矣古人是則曰是非則曰非明白正直曾何囘䕶自後世惡直好佞以直言賈禍者比比皆是於是始以道三箇好為喜歡縁矣此處衰世之法也蓋萬事稱好不特司馬徳操為然而吾夫子固有危行言孫之説矣好盡言以翹人之過此國武子所以見殺也可不戒哉宋孝宗御宇髙宗在徳夀光宗在青宫寧宗在平陽邸四世本支之盛亘古未有楊誠齋時為宫僚賀光宗誕辰詩云祖堯父舜真千載禹子湯孫更一家讀者服其精切又云天意分明昌火徳誕辰三世總丁年蓋髙宗生於丁亥孝宗生於丁未光宗生於丁夘也丁年字出李陵書借用亦佳張子房蓋俠士之知義䇿士之知幾者要非儒也故早年頗佀荆軻晚嵗頗似魯仲連得老氏不敢為天下先之術不代大匠斵故不傷手善於打乖荆公詩云漢業存亡俯仰中留侯於此每從容固陵始議韓彭地複道方謀雍齒封蓋因機乘時與之斡旋未嘗自我發端故消弭事變全不費力朱文公云子房只是占便宜不肯自犯手做如為韓報秦攛掇髙祖入關及項羽殺韓王成又使髙祖平項羽兩次報仇皆不自做後来定太子事他亦自處閒地又只教四老人出来做後来誅戮功臣時更討他不着邵康節之學亦與子房相似康節本是要出来有為之人又不肯深犯手做凡事直待可做處方試為之纔覺難便抽身退如擊壤集中以道觀道等語是物各付物之意蓋自家都不犯手又凡事只到半中央便止如看花切勿看離披是也楊誠齋夫人羅氏年七十餘每寒月黎明即起詣厨躬作粥一釡遍享奴婢然後使之服役其子東山先生啓曰天寒何自苦如此夫人曰奴婢亦人子也清晨寒冷須使其腹中略有火氣乃堪服役耳東山曰夫人老且賤事何倒行而逆施乎夫人怒曰我自樂此不知寒也汝為此言必不能如吾矣東山守呉夫人嘗於郡圃種苧躬紡緝以為衣時年蓋八十餘矣東山月俸分以奉母夫人忽小疾既愈出所積劵曰此長物也自吾積此意不樂果致疾今宜悉以謝醫則吾無事矣平居首飾止於銀衣止於紬絹生四子三女悉自乳曰饑人之子以哺吾子是誠何心哉誠齋父子視金玉如糞土誠齋将漕江東有俸給僅萬緡留庫中棄之而歸東山帥五羊以俸錢七千緡代下户輸租其家采椽土階如田舍翁三世無增飾東山病且死無衣裳適廣西帥趙季仁餽纈絹數端東山曰此賢者之賜也衾材無憂矣史良叔守廬陵官滿来訪入其門升其堂目之所見無非可敬可仰可師可法者所得多矣因命畫工圖之而去誠齋東山清介絶俗固皆得之天資而婦道母儀所助亦已多矣左傳文伯之母老而猶績文伯曰以􅍦之家而主猶績乎其母嘆曰魯其亡乎使童子備官而未之聞也居吾語汝民勞則思思則善心生逸則淫淫則惡心生沃土之民不才淫也瘠土之民莫不向義勞也是故王后親織𤣥紞公侯之夫人加以紘綖卿之内子為大帶命婦成祭服列士之妻加之以朝服自庶士以下皆衣其夫社而賦事烝而獻功男女效績愆則有辟古之制也吾冀而朝夕修曰必無廢先人爾今曰胡不自安以是承君之官予懼穆伯之絶嗣也因是觀誠齋夫人乃知古今未嘗無烈女未嘗無賢母楚公子微服過宋門者難之其僕操箠而罵曰𨽻也不力門者出之晉王廞之敗沙門曇永匿其幼子華使提衣嚢自隨津邏疑之永訶曰奴子不速行捶之數十由是得免宇文泰與侯景戰河上馬逸墜地李穆見之以䇿抶泰之背曰籠東軍士汝曹主何在而尚留此追者不疑其為貴人與之馬與俱還三事相類若郭子儀殺羊而裴諝劾之李愬進馬而温造彈之亦此意也宋淳熈中范至能使北孝宗令口奏金主謂河南乃宋朝陵寢所在願受侵地至能奏曰兹事須與宰相商量臣乞以聖意諭之議定乃行上首肯既而宰相力以為未可而聖意堅不囘至能遂自為一書述聖語至金庭納之袖中既跪進國書伏地不起時金主乃葛王也性寛慈傳宣問使人何故不起至能徐出袖中書奏曰臣来時大宋皇帝别有聖㫖難載國書令臣口奏臣今謹以書述乞賜聖覽書既上殿上觀者皆失色至能猶伏地再傳宣曰書詞已見使人可就館至能再拜而退金庭羣臣或不平議羈留使人而金主不可至能将囘又奏曰口奏之事乞與國書中明報仍先宣示庶使臣不墮欺罔之罪金主許之報書云口奏之説殊駭觀聽事須審處邦乃孚休既還上甚嘉其不辱命由是超擢以至大用至能在燕京㑹同館官吏微言有羈留之議乃賦詩曰萬里孤臣致命秋此身何止一浮漚提攜漢節同生死休問羝羊解乳不范文正公云常調官好做家常飯好喫余謂人能甘於喫家常飯然後甘於做常調官五代史漢王章為三司使征利剥下緡錢出入元以八十為陌章每出錢陌必減其三至今七十七為官省錢者自章始然今官府於七十七之中又除頭子錢五文有竒則愈削於章矣唐初蕭銑據荆㐮敗於李靖諸郡皆降而所召援兵至者又十萬人李煜據江南其亡也亦有援兵十數萬本朝靖康之禍勤王之師至者絶少縱有之率皆望風奔潰不敢向賊發一矢蓋五代以前兵寓於農素習戰鬭一呼即集本朝兵費最多兵力最弱皆縁官自養兵紹熈中張魏公在川陜奏以王庶帥興元制置利䕫二路軍士於興洋金蓬開逹諸州令縣選强壯兩丁取一五丁取二户與免物力錢二百五十千五十人為一隊長以知縣為軍正尉為軍副月閱於縣春秋閲於郡不半月有兵二十萬乾道初宿亳之役禁旅多出征江上之備空虚陳福公首獻民兵之䇿及登庸亟欲推行㑹罷相遂格然兩淮已用其法而荆襄尤有成規開禧用兵禁旅多敗而兩淮山水寨萬弩手率有功特為官軍所嫉無以慰其心盡其力耳丙寅金大舉南牧圍安襄以撼荆鄂宣司檄召諸處兵與湖北義勇俱往救諸郡兵不待見敵而潰所過鈔畧甚於敵人獨義勇隨其帥進退不敢有秋毫犯蓋過其室家門户故也張宣公帥荆州與朱文公書云郭杲嘗獻緩急保江之䇿某折之曰劉信叔劉共父皆嘗有此論真謬計也縱敵入肝脾裏何以為國上付公以北門當盡力報國要軍要糧此間當應副事茍不濟守臣仗節而死耳郭聞之悚然某之所恃者有義勇二萬六千人也孝宗命吕成公詮擇國朝文章成公盡繙三館之儲踰年成編賜名文鑑周益公承制譔序云建隆雍熈之間其文偉咸平景徳之際其文博天聖明道之詞古熈寧元祐之詞逹雖體制互興源流間出而氣全理正其歸則同成公為此書朱文公張宣公殊不以為然謂伯恭先意思承當此事便好截下因以發明人主之學昔温公作資治通鑑可謂有補治道識者尚惜其枉費一生精力况文鑑乎辛幼安晚春詞云更能消幾畨風雨匆匆春又歸去惜花長恨花開早何况亂紅無數春且住見説道天涯芳草迷歸路怨春不語筭只有殷勤畫簷蛛網盡日惹飛絮長門事准擬佳期又誤娥眉曾有人妬千金縱買相如賦脉脉此情誰訴君莫舞君不見玉環飛燕皆塵土閒愁最苦休去倚危闌斜陽正在􅈣栁斷腸處詞意殊怨斜陽􅈣栁之句其與未須愁日暮天際乍輕陰者異矣使在漢唐時寧不賈種豆種桃之禍哉愚聞夀皇見此詞頗不悦然終不加罪可謂盛徳也已其題江西造口詞云鬱孤臺下清江水中間多少行人淚西北是長安可憐無數山青山遮不住畢竟東流去江晚正愁予山深聞鷓鴣蓋南渡之初金人追隆祐太后御舟至造口不及而還幼安自此起興聞鷓鴣之句謂恢復之事行不得也又寄邱宗卿詞云千古江山英雄無覔孫仲謀處舞榭歌臺風流緫被雨打風吹去斜陽草樹尋常巷陌人道寄奴曾住想當年鐵馬氣吞萬里如虎元家子草草封狼居胥嬴得倉皇北顧四十三年望中燈火猶記揚州路可堪囘首佛狸祠下一片神鴉社鼓慿誰問亷頗老矣尚能飯不此詞集中不載尤雋壮可喜朱文公云辛幼安陳同甫若朝廷賞罰明此等人皆可用鶴林玉露卷四
