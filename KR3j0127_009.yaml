body:
  text: 鶴林玉露巻九宋羅大經撰趙昌父云古人以學為詩今人以詩為學夫以詩為學自唐以來則然如嘔出心肝搯擢胃腎此生精力盡於詩者是誠弊精神於無用矣乃若古人亦何嘗以學為詩哉今觀國風間出於小夫賤隸婦人女子之口未必皆學也而其言優柔諄切忠厚雅正後之經生學士雖窮年畢世未必能措一辭正使以後世之學為詩其胸中之不淳不正必有不能掩者矣雖貪者賦㢘仕者賦隠逸詩亦豈能逃識者之眼哉如白樂天之詩曠達閒適意輕軒冕孰不信之然朱文公獨謂樂天人多說其清髙其實愛官職詩中及富貴處皆說得口津津地涎出可謂能窺見其微矣嗟夫樂天之言且不可盡信况餘人乎楊誠齋云古人之詩天也後世之詩人焉而已此論得之古人觀理每於活處看故詩曰鳶飛戾天魚躍于淵夫子曰逝者如斯夫不舎晝夜又曰山梁雌雉時哉時哉孟子曰觀水有術必觀其瀾又曰原泉混混不舎晝夜明道不除窻前草欲觀其意思與自家一般又養小魚欲觀其自得意皆是於活處看故曰觀我生觀其生又曰復其見天地之心學者能如是觀理胸襟不患不開濶氣象不患不和平陸象山在荆門上元不設醮但合士民於公㕔前聽講洪範皇極斂時五福一段謂此卽為民祈福也今世聖莭令僧陞法座祝聖壽而郡守以下環坐而聽之殊無義理程大昌鄭丙在建寧並不許僧陞堂說法朱文公在臨漳且令隨例祝香不許人問話余謂若祖象山之法但請教官陞郡庠講席講詩天保一篇以見歸美報上之意亦自雅馴莊子謂至人入水不濡入火不熱如周公遭變而赤舄几几孔子厄陳而絃歌自如皆至人也不濡不熱言其心耳非言其血肉之身也杜陵詩云不分桃花紅勝錦生憎栁絮白於綿初讀只似童子屬對之語及細思之乃送杜侍御入朝蓋錦綿皆有用之物而桃花栁絮乃以區區之顔色而勝之亦猶小人以巧言令色而勝君子也侍御分别邪正之官故以此告之觀不分生憎之語其剛正嫉邪可見矣韓平原作南園於吳山之上其中有所謂村莊者竹籬茅舎宛然田家氣象平原嘗遊其間甚喜曰撰得絶似但欠雞鳴犬吠耳旣出莊遊他所忽聞莊中雞犬聲令人視之乃府尹所為也平原大笑益親愛之太學諸生有詩曰堪笑明庭鴛鷺甘作村莊犬雞一日冰山失勢湯燖鑊煮刀刲岳武穆家謝昭雪表云青編塵乙夜之觀白簡悟壬人之譛甚工王荆公論末世風俗云賢者不得行道不肖者得行無道賤者不得行禮貴者得行無禮其論精矣嗟夫荆公生於本朝極盛之時猶有此歎况愈降愈下乎荆公詩云卧占寛閒五百弓盖佛家以四肘為弓肘一尺八寸四肘蓋七尺二寸其說出譯梵紹熙甲寅孝宗升遐光宗疾不能喪中外人情洶洶襄陽兵官陳應祥歸正人也欲乗此為變結約已定其間一卒買卜於市所謂白羊先生者卜者詰之曰此卜將何用觀所占是要殺爺殺娘底事大不好莫做却吉其人色動時都統馮湛帳前適有一人在傍知見遂濳跡至一茶肆與之語紿以已得罪於湛倘有所謀願預一人之數卒始不肯言再三問之乃以實告但深以卜不吉為疑其人曰若疑其不吉當與汝同首可轉禍為福卒然之然恐無騐乃引其人詣陳曰此人都統帳前人也近偶得罪可為内應陳始不信再三言之乃與以白巾一告以期約其人與卒急詣湛告變時張定叟作帥湛擕首狀告定叟時定叟方卧起與湛密議定復就寢徐令具酒肴與客飲遣數人請陳及其他一二兵官同來面以首狀及白巾詰之陳辭屈乃集衆於教場射殺之二人及白羊先生皆補官莊子之文以無為有戰國策之文以曲作直東坡平生熟此二書故其為文横說竪說惟意所到俊辨痛快無復滯礙其論刑賞也曰當堯之時臯陶為士將殺人皋陶曰殺之三堯曰宥之三故天下畏皋陶執法之堅而樂堯用刑之寛其論武王也曰使當時有良史如董狐者則南巢之事必以叛書牧野之事必以殺書而湯武仁人也必將為法受惡周公作無逸曰殷王中宗及髙宗及祖甲及我周文王兹四人廸哲上不及湯下不及武王其以是哉其論范増也曰増始勸項梁立義帝諸侯以此服從中道而弑之非増意也夫豈獨非其意將必力爭而不聽也不用其言而殺其所立羽之疑増自此始矣其論戰國任俠也曰楚漢之禍生民盡矣豪傑宜無㡬而代相陳豨從車千乗蕭曹為政莫之禁也豈懲秦之禍以為爵禄不能盡縻天下之士故少寛之使得或出於此也邪凡此類皆以無為有者也其論厲法禁也曰商鞅韓非之刑非舜之刑而所以用刑者則舜之術也其論唐太宗征遼也曰唐太宗旣平天下而又嵗嵗出師以從事於夷狄蓋晚而不倦暴露於千里之外親擊髙麗者再焉凡此者皆所以爭先而處强也其論従衆也曰宋襄公雖行仁義失衆而亡田常雖不義得衆而强是以君子未論行事之是非先觀衆心之向背謝安之用諸桓未必是而衆之所樂則國以乂安庾亮之召蘇峻未必非而勢有不可則反成危辱凡此類皆以曲作直者也葉水心云蘇文架虚行危縦横倐忽數百千言讀者皆如其欲出推者莫知其所自來古今議論之傑也葉水心云唐時道州西原蠻掠居民而諸使調登符牒乃至二百函故元結詩以為賊之不如杜少陵遂有粲粲元道州前賢畏後生之語蓋一經兵亂不肖之人妄相促迫草芥其民賊猶未足以為病而官吏相與亡其國矣至哉言乎古今國家之亡兆之者夷狄盗賊而成之者不肖之官吏也且非特兵亂之後暴驅虐取吾民而已方其變之始也不務為弭變之道乃以幸變之心施激變之術張皇其事誇大其功借生靈之性命為富貴之梯媒甚者假夷狄盗賊以邀脅其君展轉滋蔓日甚一日而國隨之矣唐太宗相房𤣥齡二十三年用魏徴及相十八年此外惟李林甫元載最久國朝魏野贈王文正詩云太平宰相年年出君在中書十二秋蓋以為最久矣至蔡京秦檜皆及十八九年近時史衛王獨專國秉至二十六年此古今所無至晚年得末疾猶專國秉數年尤古今所無故洪舜俞詩云陰陽眠燮理東坡謫儋耳道經南安於一寺壁間作叢竹醜石甚竒韓平原當國劄下本軍取之守臣親監臨以紙糊壁全堵脫而龕之以獻平原大喜置之閱古堂中平原敗籍其家壁入祕書省著作庭辛夘之火焚右文殿道山堂而著作庭幸無恙壁至今猶存坡之北歸經過韶州月華寺值其改建法堂僧丐坡題梁坡欣然援筆右梁題嵗月左梁題云天子萬年永作神主斂時五福敷錫庶民地獄天宫同為淨土有性無性齊成佛道右梁題字一夕為盗所竊左梁字尚存余嘗見之墨色如新坡歸至常州報恩寺僧堂新成以板為壁坡暇日題寫㡬遍後黨禍作凡坡之遣墨所在搜毁寺僧以厚紙糊壁塗之以漆字賴以全至紹興中詔求蘇黄墨跡時僧死久矣一老頭陀知之以告郡守除去漆紙字畫宛然臨本以進髙宗大喜老頭陀得祠曹牒為僧劉禹錫作九日詩欲用餻字以其不經見迄不敢用故宋子京詩云劉郎不敢題餻字虚負詩中一世豪然白樂天詩云移坐就菊叢餻酒前羅列則固已用之矣劉白倡和之時不知曽談及此否張子房欲為韓報讐乃捐金募死士於博浪沙中以鐵椎狙擊始皇誤中其副車始皇大怒索三日不獲未逾年始皇竟死自此陳勝吳廣田儋項梁之徒始相尋而起是禠祖龍之魄倡羣雄之心皆子房一擊之力也其關係豈小哉余嘗有詩云不惜黄金募鐵椎祖龍身在魄先飛齊田楚項紛紛起輸與先生第一機李太白云剗却君山好平鋪湘水流杜子美云所却月中桂清光應更多二公所以為詩人冠冕者胸襟濶大故也此皆自然流出不假安排左氏傳王子朝之亂晉命諸侯輸周粟宋樂大心不可晉士伯折之乃受牒而歸今世臺府移文屬郡曰牒蓋春秋時霸主於列國已用之矣今江湖間俗語謂錢之薄惡者曰慳錢按賈誼疏云今法錢不立農民釋其耒耜冶鎔炊炭姦錢日多俗音訛以姦為慳爾左氏傳吳師在魯微虎欲宵攻王舍擇卒三百有若與焉葉水心曰有若尚刼寨何况他人余謂吳師壓魯魯亡無日有若視父母之邦阽危如此義氣所激願與宵攻之列使誠因是而死得死所矣豈不賢於子路之死乎水心以為刼寨過矣周易無皆作无王述曰天屈西北為无蓋東南為春夏陽之伸也故萬物敷榮西北為秋冬陽之屈也故萬物老死老死則無矣此字說之有意味者也廬陵士友藏朱文公一小簡真跡云便中承書知比日侍奉安佳吾子讀書比復如何只是専一勤苦無不成就第一更切檢東操守不可放逸親近師友莫與不勝己者往來熏染習熟壞了人也景陽想已赴省季章當只在家凡百必能盡心苦口切須承稟不可有違諺云成人不自在自在不成人此言雖淺然實切至之論千萬勉之大學說漫納試讀之不曉處可問季章也未卽相見千萬為門户自愛此簡蓋與其親戚卑行也大全集所不載後生晚輩能寫一通置之坐側朝夕觀省何患不做好人景陽姓許名子春季章姓劉名黼皆廬陵醇儒從文公學季章後為特奏第一人開禧用兵諸將皆敗唯畢再遇數有功敵常以水櫃敗我再遇夜縳藁人數千衣以甲胄持旗幟戈矛儼立成行昧爽鳴鼓敵人驚視亟放水櫃旋知其非真也甚沮乃出師攻之敵大敗又嘗引敵與戰且前且却至於數四視日已晚乃以香料煮黒豆布地上復前搏戰佯為敗走敵乗勝追逐其馬已饑聞豆香皆就食鞭之不前我師反攻之敵人馬死者不勝計又嘗與敵對壘度敵兵至者日衆難與爭鋒一夕拔營去慮來相追乃留旗幟於營并縳生羊置其前二足於鼓上擊鼓有聲敵不覺其為空營復相持竟日及覺欲追則已逺矣近時沅州蠻叛荆湖制司遣兵討之蠻以竹為箭傅以毒藥略着人肉血濡縷無不立死官軍畏之莫敢前乃祖再遇之智裝束藁人羅列焜耀蠻見之以為官軍萬矢俱發伺其矢盡乃出兵攻之直擣其穴一戰而平近時趙紫芝詩云一瓶茶外無祗待同上西樓看晚山世以為佳然杜少陵云莫嫌野外無供給乗興還來看藥欄卽此意也杜子野詩云尋常一樣窻前月纔有梅花便不同世亦以為佳然唐人詩云世間何處無風月纔到僧房分外清亦此意也欲道古人所未道信矣其難矣紫芝又有詩云野水多於地春山半是雲世尤以為佳然余讀文苑英華所載唐詩兩句皆有之但不作一處耳唐僧詩云河分岡勢斷春入燒痕青有僧嘲其蹈襲云河分岡勢司空曙春入燒痕劉長卿不是師兄偷古句古人詩句犯師兄此雖戯言理實如此作詩者豈故欲竊古人之語以為已語哉景意所觸自有偶然而同者蓋自開闢以至於今只是如此風花雪月只是如此人情物態伯夷不立於惡人之朝不與惡人言可謂離世絶俗矣然不念舊惡未嘗流於刻薄也栁下惠視袒裼裸裎焉能凂我可謂和光同塵矣然不以三公易其介未甞流於茍賤也此其所以為百世師歟東漢徐孺子矯矯特立諸公薦辟皆不就然及薦辟者死炙雞漬酒萬里赴弔於清髙不混俗之中有忠厚不忘恩之意其為東漢人物之冠冕不亦宜乎山谷題𤣥真子圖詞所謂人間底是無波處一日風波十二時者固已妙矣張仲宗詞云釣笠披雲青嶂曉橛頭細雨春江渺白鳥飛來風滿棹收綸了漁童拍手樵青笑明月太虚同一照浮家泛宅忘昏曉醉眼冷看朝市閙煙波老誰能惹得閒煩惱語意尤飄逸仲宗年逾四十即掛冠後因作詞送胡澹庵貶新州忤秦檜亦得罪其標致如此宜其能道𤣥真子心事自古夷狄盗賊之禍所以蔓延滋長日深一日其終或至於亡國者皆將帥之臣玩冦以自安養冦以自固譽冦以自重也故杜少陵詩其於王室播遷之禍每每深責將帥如云將帥蒙恩澤兵戈有嵗年至今勞聖主何以報皇天又云登壇名絶假報主爾何遲又云天地日流血朝廷誰請纓又云獨使至尊憂社稷諸公何以答昇平皆是意也然將帥之不用命實由於朝廷駕御操縱之無法古人云譬如養鷹飽則颺去我太祖之御諸將有守邊一二十年而不遷官者蓋謂扞禦免侵軼特僅不失職耳非有戰勝攻取官固不可妄遷也至於曹彬之平江南功亦不細矣然使相之除終至吝惜止於賜錢百萬而已夫太祖豈食言之君而曹彬亦豈飽則颺去之人哉英君誼辟逺慮微權衆人固不識也近世以來將帥守邊僅免侵軼及至嵗終則論功行賞屢遷不一遷不知使其能掃清關河哭單于於陰山又將何以賞之少陵詩云今日翔麟馬先宜駕鼔車無勞問河北諸將覺榮華言雖翔麟之馬亦必先使之駕鼓車由賤而後可以致貴今諸將驟登貴顯如馬之未駕鼓車而遽駕玉輅安於榮華志得意滿無復驅攘之志河北叛亂決難討除無勞問也又云雜虜横戈數功臣甲第髙亦此意漢食貨志云冬民旣入婦人相從夜績女工一月得四十五日注謂每日又得半夜為四十五日也然則農之宵爾索綯儒之短檠夜誦豈可少哉胡澹庵書遺從子維寧曰古之君子學欲其日益善欲其日加徳欲其日起身欲其日省體欲其日强行欲其日見心欲其日休道欲其日章以為未也又曰日知其所亡見其所不見一日不使其躬怠焉其愛日如是足矣猶以為未也必時習焉無一時不習也必時敏焉無一時不敏也必時術焉無一時不術也必時中焉無一時不中也其競時如是可以已矣猶以為未也則曰夜者日之餘也吾必繼晷焉燈必親薪必燃膏必焚燭必秉蠟必濡螢必照月必帶雪必映光必隙明必借暗則記嗚呼如此極矣然而君子又曰終夜不寢必如孔子雞鳴而起必如大舜坐以待旦必如周公然則何時而已邪范寗曰君子之為學也沒身而已矣衛青少服役平陽公主家後為大將軍貴顯震天下公主仳離擇配左右以為無如大將軍公主曰此我家馬前奴也不可已而遍擇羣臣貴顯無踰大將軍者迄歸大將軍丁晉公起甲第鉅麗無比軍卒楊杲宗躬負土之役勞苦萬狀後杲宗以外戚起家晉公得罪貶海上朝廷以其第賜杲宗居之三十年世事翻覆如此古詩云君不見河陽花今如泥土昔如霞又不見武昌栁春作青絲秋作帚人生馬耳射東風栁色桃花豈長久秦時東陵千户侯華蟲被體腰蒼璆漢初沛邑刀筆吏折腰如磬頭搶地蕭相厥初謁邵平中庭百拜百不譍邵平後來謁蕭相故侯一拜一惆悵萬事反覆何所無二子豈是大丈夫窮通流坎皆偶爾摶扶未必賢搶榆華胥别是一天地醉鄉何曽有生死儂欲與君歸去來千愁萬恨付一杯朱文公云二蘇以精深敏妙之文煽傾危變幻之習又云早拾蘇張之緒餘晚醉佛老之糟粕余謂此文公二十八字彈文也自程蘇相攻其徒各右其師孝宗最重大蘇之文御製序賛太學翕然誦讀所謂人傳元祐之學家有眉山之書蓋紀實也文公每與其徒言蘇氏之學壞人心術學校尤宜禁絶編楚詞後語坡公諸賦皆不取惟收胡麻賦以其文類橘頌編名臣言行録於坡公議論所取甚少有日者謁黄直卿云善筭星數知人禍福直卿曰吾亦有箇大筭數書曰惠廸吉從逆凶作善降之百祥作不善降之百殃大學曰言悖而出者亦悖而入貨悖而入者亦悖而出此箇數亘古今不差豈不優於子之筭數乎眞西山論菜云百姓不可一日有此色士大夫不可一日不知此味余謂百姓之有此色正縁士大夫不知此味若自一命以上至於公卿皆得咬菜根之人則當必知其職分之所在矣百姓何愁無飯喫鶴林玉露卷九
