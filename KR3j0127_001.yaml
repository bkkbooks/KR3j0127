body:
  text: 鶴林玉露卷一宋羅大經撰朱文公告陳同父云真正大英雄人却從戰戰兢兢臨深履薄處做將出來若是氣血粗豪却一點使不著也此論於同父可謂頂門上一針矣余觀大禹不矜不伐愚夫愚婦皆謂一能勝豫而鑿龍門排伊闕明德美功被千萬世周公不驕不吝勞謙下士而東征三年赤舄几几履讒歷變卒安周室孔子恂恂於鄉黨在宗廟朝廷似不能言者而却萊夷墮三都誅少正卯便有一變至道氣象此皆所謂真正大英雄也後世之士殘忍尅核能聚斂能殺戮者則謂之有才閙鄰罵坐無忌憚無顧藉者則謂之有氣計利就便善捭闔善傾覆者則謂之有智一旦臨利害得喪死生禍福之際鮮有不顛沛錯亂震懼隕越而失其守者况望其立大節弭大變撑拄乾坤昭洗日月乎此無他任其氣稟之偏安其識見之陋驕恣傲誕不知有所謂戰戰兢兢臨深履薄之工夫故也孫何帥錢塘栁耆卿作望江潮詞贈之云東南形勝三吳都會錢塘自古繁華煙栁畫橋風簾翠幕參差十萬人家雲樹繞隄沙怒濤卷霜雪天塹無涯市列珠璣户盈羅綺競豪奢重湖疊巘清佳有三秋桂子十里荷花羌管㺯晴菱歌泛夜嬉嬉釣叟蓮娃千騎擁髙牙乘醉聽簫鼓吟賞煙霞異日圖將好景歸去鳳池誇此詞流播金主亮聞歌欣然有慕於三秋桂子十里荷花遂起投鞭渡江之志近時謝處厚詩云誰把杭州曲子謳荷花十里桂三秋那知卉木無情物牽動長江萬里愁余謂此詞雖牽動長江之愁然卒為海陵被殺之媒未足恨也至於荷艷桂香粧點湖山之清麗使士夫流連於歌舞嬉遊之樂遂忘中原是則深可恨耳因和其詩云須知快劒是清謳牛渚依然一片秋却恨荷花留玉輦竟忘煙栁汴宫愁楚辭云餐秋鞠之落英釋者云落始也如詩訪落之落謂初英也古人言語多如此故以亂為治以臭為香以擾為馴以慊為足以特為匹以原為再以落為萌嶽陽有酒香山相傳古有仙酒飲者不死漢武帝得之東方朔竊飲焉帝怒欲誅之方朔曰陛下殺臣臣亦不死臣死酒亦不驗遂得免方朔數語圓轉簡明意其竊飲以發此論蓋風武帝之求長生也宋髙宗嘗問張魏公卿兒想甚長成魏公對曰臣子栻年十四脫然可與語聖人之道及隆興初張魏公督師南軒以內機入奏引見于德夀宫首問魏公起居飲食狀又問卿幾嵗對曰臣年三十一又問卿母安否對曰久失所恃上愀然久之曰朕記卿父再娶時以無繼嗣曾來商量卿父曾奏欲令卿來見今次方得見卿朕與卿父義則君臣情同骨肉卿行奏來有香茶與卿父為信嗚呼君臣相與其恩意乃至是哉或者乃謂髙宗晚年追悼明受不滿於魏公至有寧失天下不用張浚之言殆不然也杜陵病楠詩曰猶含棟梁具無復霄漢志良工古昔少識者出涕淚傷賢者之老病而不獲用也又曰種榆水中央成長何容易截承金露盤裊裊不自畏言少不更事之人無所涵養而驟膺拔擢以當重任力綿才腐凜凜危亡而曾不知畏也又舟中上水遣懷詩云篙工密逞巧氣若酣杯酒歌謳互激烈回斡明授受善知應觸類各藉頴脫手古來經濟才何事獨罕有蓋嘆舟人操舟尚有妙手而整頓乾坤獨未見妙手也方天寶間杜陵少壯之時雖亂離瘼矣而人才尚多故洗兵馬行曰成王功大心轉小郭相謀深古來少司徒清鑒懸明鏡尚書氣與秋天杳二三豪俊為時出整頓乾坤濟時了又云張公一生江海客身長九尺鬚眉蒼徵起適遇風雲會扶顛始知籌策良蓋幸其所以支撑世變者尚有人也及杜陵晚嵗八哀之詩既作則一時豪傑或老或死而後來者未有其人此病楠種榆之歎舟師妙手之歎意益婉而詞益哀嗚呼此唐室所以終不振乎本朝元豐間洛陽諸老為耆英會圖形賦詩一時誇為盛事而識者悲之曰此皆仁宗所養之君子至是而皆老矣升降消長之會過此甚可畏也時林行已曰天將祚其國必祚其國之君子視其君子之衆多如林則知其國之盛視其君子之落落如晨星則知其國之衰視其君子之康寧福澤如山如海則知其為太平之象視其君子之摧折頓挫如湍舟如霜木則知其為衰亂之時又曰天將使建中為崇寧則不使范忠宣復相於初元天將使宣和為靖康則不使劉陳二忠肅憗遺於數嵗皆至論也詩家用遮莫字蓋今俗語所謂儘教者是也故杜陵詩云已判野鶴如雙鬢遮莫鄰雞下五更言鬢如野鶴已判老矣儘教鄰雞下五更日月逾邁不復惜也而乃有用為禁止之辭者誤矣洛陽人謂牡丹為花成都人謂海棠為花尊貴之也亦如稱歐陽公司馬公之類不復指其名字稱號然必其品格超絶始可當此不然則進而君公退而爾汝者多矣衛靈公與夫人夜坐聞車聲轔轔至闕而止過闕復有聲公問夫人曰知此為誰夫人曰此蘧伯玉也公曰何以知之夫人曰妾聞禮下公門式路馬所以廣敬也夫忠臣與孝子不為昭昭信節不為冥冥墮行蘧伯玉衛之賢大夫也仁而有智敬於事上此其人必不以暗昧廢禮是以知之公使人視之果伯玉也中庸曰君子之所不可及者其惟人之所不見乎伯玉可謂真君子矣細考論語夫子所與友者僅見伯玉一人使人於夫子而夫子問其起居則金石交情可以略見伯玉之躬行純一如此宜夫子樂與之交也夫人即南子也南子有淫行然觀其所言醇粹正大有後世老師宿儒之所不能道者且知伯玉之賢而又知伯玉之所以賢何其明也乃知以衛靈之無道南子之淫奚而不喪者非止仲叔圉祝鮀王孫賈輩之功而已又知夫子之所以見南子者蓋以見識議論如此倘能改行或者尚可輔衛靈公以有為子路不説是未知夫子之心也然南子知賢者不為冥冥墮行而卒不能回光內照改其淫佚靈公因南子之言固宜識伯玉之為忠臣矣然卒不授之以政信乎知善非難行善為難知賢非難用賢為難也有良家女流落可嘆者余同年李南金贈以詞曰流落今如許我亦三生杜牧為秋娘著句先自多愁多感慨更值江南春暮君看取落花飛絮也有吹來穿繡幌有因風飄墮隨塵土人世事總無據佳人命薄君休欣若説與英雄心事一生更苦且盡尊前今日意休記緑窗眉嫵但春到兒家庭户幽恨一簾煙月曉恐明年鴈亦無尋處渾欲倩鶯留住此詞凄婉頓挫不減古作者南史齊范縝謂竟陵王子良曰人生如樹花同發隨風而散或拂簾幌落茵席之上或關籬墻落糞溷之中墜茵席者殿下是也落糞溷者下官是也此詞前闋蓋祖此説南金自號三溪冰雪翁尤工於詩有江頭吟云兒時盛氣髙於山不信壯士有飢寒如今一杯零落酒風雨蝕盡征袍單側立崑奴面鐵色楚客不言未吹笛關山有月無人聲自是江頭渚花發渚花春少未得妍凝立青山圍水天杜鶻故態不識事盡情呌入青楓煙壯士未握邊頭槊旄頭如月幾時落如今世界不愛賢看取青峯白雲角嗚呼一歌兮歌已怨壺中無酒可續咽蓋模擬少陵之作詞旨清婉可愛嶺南人以檳榔代茶且謂可以禦瘴余始至不能食久之亦能稍稍居嵗餘則不可一日無此君矣故嘗謂檳榔之功有四一曰醒能使之醉蓋每食之則熏然頰赤若飲酒然東坡所謂紅潮登頰醉檳榔者是也二曰醉能使之醒蓋酒後嚼之則寬氣下疾餘酲頓解三曰飢能使之飽蓋飢而食之則充然氣盛若有飽意四曰飽能使之飢蓋食後食之則飲食消化不至停積嘗舉似於西堂先生范旗叟曰子可謂檳榔舉主矣然子知其功未知其德檳榔賦性疏通而不泄氣稟味嚴正而有餘甘有是德故有是功也曲端在陜西甚有威望張魏公宣撫首擢用之金人萬户羅索與薩里罕等冦邠州端擊敗之至白店原又大敗之薩里罕乘髙望師懼而號哭金人因目之為啼哭郎君後以端恃功驕恣廢不用又懼其得士心竟殺之自端之死衆心稍離金人再戰于富平我師詐張端旗以懼敵羅索知端已死撫掌笑曰何紿我也於是盡鋭力攻我師敗績自是陜西非我有矣宋淳熙間髙廟配享洪景盧舉此為魏公罪迄不得侑食昔孔明斬馬謖已為失計魏公襲其事幾於自壞萬里長城至於詐張端旗尤為拙謀徒足以召敵人之笑沮我師之氣耳端亦知書嘗作詩云破碎山河不足論幾時重到渭南村昔人詩欲挂衣冠神武門先尋水竹渭南村即此事也市璞寶燕石煮簀食蟛蜞識者少也孟子言求放心而康節邵子曰心要能放二者天淵懸絶蓋放心者自放也心放者吾能放也放心者如雞豚出於塒柵不求則不得心放者如鷹隼翔於雲霄而絛鏇固在吾手也衆人之心易放聖賢之心能放易放者流蕩能放者開闊流蕩者失其本心開闊者全其本心余家藏山谷八大字云作德日休為善最樂摘經史語混然天成可置座右周禮注六榖稌黍稷梁麥苽六清水漿醴䣼音京􅫐音醫酏七菹韭菁茒葵芹菭筍六獸麋鹿熊麕野豕兔六禽鴈鶉鷃鴙鳩鴿五藥草木蟲石榖陸象山少年時常坐臨安市肆觀棊如是者纍日棊工曰官人日日來看必是髙手願求教一局象山曰未也三日後却來乃買棊局一副歸而懸之室中卧而仰視之者兩日忽悟曰此河圖數也遂往與棋工對棋工連負二局乃起謝曰某是臨安第一手棋凡來著者皆饒一先今官人之棊反饒得某一先天下無敵手矣象山笑而去其聰明過人如此其子弟每喜令其著棋嘗與包敏道書云制子初時與春弟頗不能及今年反出春弟之下近旬日棋又甚進春弟又少不逮矣凡此皆在其精神之盛衰耳漢文帝以七月己亥崩乙巳葬才七日耳與窶人之家斂手足形還葬者何以異景帝必不忍以天下儉其親此殆文帝之顧命也雖未合中道見亦卓矣文帝此等見解皆自黃老中來歐陽公問一僧曰古之髙僧有去來翛然者何今世之鮮也僧曰古人念念在定慧臨終安得而亂今人念念在散亂臨終安得而定公深然之此説却是正理如吾儒易簀結纓之類皆是平日講貫得明操守得定涵養得熟視生死如晝夜故能如此不亂靜春先生劉子澄朱文公髙弟也病革周益公推之曰子澄澄其慮靜春開目微視曰無慮何澄言訖而逝或問杜陵詩云日月籠中鳥乾坤水上萍何也余曰此自嘆之詞耳蓋拘束以度日月若鳥在籠中漂泛於乾坤間若萍浮水上本是形容凄涼之意乃翻作壯麗之語東坡雪詩凍合玉樓寒起粟光搖銀海眩生花亦此類文章一小技於道未為尊此論後世之文也文者貫道之器此論古人之文也天以雲漢星斗為文地以山川草木為文要皆一元之氣所發露古人之文似之巧女之刺繡雖精妙絢爛才可人目初無補於實用後世之文似之尹穡字少稷博學工文杜門讀書不汲汲於仕進諸公薦之與陸務觀同賜出身少稷言行有法又通世務時論翕然歸重嘗論減年賞當與實歷對使孝宗用其説至今行之後乃附麗湯思退力排張魏公以是除諫議公論始薄之厥後貶嶺南纍年蒙恩北歸周益公素與之善便道來訪謂益公曰某三十年閉户讀書養得少名望思之不審所得於彼者幾何而破壞掃地雖悔何及悵然者久之益公每舉以為士大夫之戒張文潛作陳湯論末云昔者韓患秦之無厭也下令曰有能得秦王者寡人與之國大夫皆諫曰賞不可以若是其重也韓王笑曰得秦王而寡人與之國是賞有再乎且得秦王矣寡人其憂無國哉一本云昔者魏國患河其邊之臣起徙而決之趙魏王大喜賞其臣以十縣其相諫曰守邊而徙河犯官也從而賞之王之臣無守職者矣魏王笑曰子憂過矣有功於魏者有比於徙河者乎魏無二河則徙河之賞無再也二事皆切而徙河之事尤勝蓋徙河犯官有矯制之意世傳吕洞濱唐進士也詣京師應舉遇鍾離翁于嶽陽授以仙訣遂不復之京師今嶽陽飛吟亭是其處也近時有題絶句于亭上云覔官千里赴神京鍾老相傳蓋便傾未必無心唐事業金丹一粒誤先生余酷愛其旨趣蓋夫子告沮溺之意也四方以西為尊王者之廟太祖坐西所謂正太祖東向之位是也三昭則坐北面南故謂之昭昭明也向南面之明也三穆則坐南面北故謂之穆穆幽也向北面之幽也今朝廷之上羣臣皆自東階而升不敢升自西階非特嫌若賓主敵體亦以西為尊也班孟堅西都賦曰左墄右平左東也東則為墄若世所謂澀道乃羣臣所由登降之階也右西也西則為平而不為墄也凡賓主之席主東而賓西亦所以尊賓也非謂東尊於西而使賓次主也故禮客降一等則就主人之階蓋客不敢自西階為賓主禮欲自東階隨主人而升也主人辭客乃復位蓋主人不許客然後自西階升也唐狄昌詩云馬嵬煙栁正依依重見鑾輿幸蜀歸泉下阿蠻應有語這回休更罪楊妃杜陵詩云朝廷雖無幽王禍得不哀痛塵再蒙蓋幽王以褒姒而致犬戎之禍明皇以妃子而致祿山之變正相似也今無妃子孽矣而鑾輿乃再蒙塵何哉此其胎變稔禍必有出於女寵之外者矣是不可不哀痛而悔艾也詩意與狄昌同而其惻怛規戒涵蓄不露則大有徑庭矣自大舜稱禹不過勤儉兩字况下於禹者可以不勤不儉乎余嘗論儉有四益勤亦有三益蓋民生在勤勤則不匱一夫不耕必受其飢一婦不蠶必受其寒是勤可以免飢寒也農民晝則力作夜則頽然甘寢故非心淫念無從而生魯公父文伯之母曰瘠土之民莫不向義勞也淵明詩曰田家豈不苦弗獲辭此難四體誠乃疲而無異患干是勤可以逺淫辟也户樞不蠧流水不腐周公論三宗文王之夀必歸之無逸吕成公釋之曰主靜則悠逺博厚自強則堅實精明操存則血氣循軌而不亂收斂則精神內守而不浮是勤可以致夀考也何斯舉云壬寅正月雨雪連旬忽爾開霽閭里翁媪相呼賀曰黃綿襖子出矣因作歌以紀之此名甚新但所以作歌未甚愜人意乃更為補作一絶句云范叔綈袍暖一身大裘只蓋洛陽人九州四海黃綿襖誰似天公賜與均白樂天詩云安得大裘長萬丈與君都蓋洛陽人渡江初吕元直為相堂厨每廳日食四千至秦會之當國每食折四十餘千執政有差於是始不會食胡明仲侍郎曰雖欲伴食不可得矣鶴林玉露卷一
