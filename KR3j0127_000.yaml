body:
  text: 鶴林玉露雜家類三雜説之屬提要臣等謹案鶴林玉露十六卷宋羅大經撰大經字景綸廬陵人事迹無考惟所記竹谷老人畏説一條有同年鄱陽景顔語知嘗登第又髙登忤秦檜一條有為容州法曹掾語知嘗官嶺南耳其書體例在詩話語録之間詳於議論而略於考證所引多朱子張栻真德季魏了翁楊萬里語而又兼推陸九淵極稱歐陽修蘇軾之文而又謂司馬光資治通鑑且為虛費精力何况吕祖謙文鑑既引張栻之説謂詞科不可習又引真德秀之説謂詞科當習大抵本文章之士而兼慕道學之名者故每持兩端不能歸一然要其大旨固不謬於聖賢也乾隆四十二年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1a919a3e88fbbb9f8055f8ad0278f5d12cdbf9f751e697a2976fda54170359c8
