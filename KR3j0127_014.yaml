body:
  text: 鶴林玉露卷十四宋羅大經撰嘉定間當國者憚真西山剛正遂謂詞科人每挾文章科目以輕朝廷自後詞科不取人雖以徐子儀之文亦以巫咸一字之誤而出之由是無復習者內外制唯稍能四六者即入選殊不知制誥詔令貴於典重溫雅深厚惻怛與尋常四六不同今以尋常四六手為之往往褒稱過實或似啓事諛詞雕刻求工又如賔筵樂語失王言之體矣胡衛盧祖舉在翰苑草眀堂赦文云江淮盡掃於驚塵太學諸生嘲之曰驚塵已被江淮掃却道江淮盡掃於又曰傳語胡盧兩學士不如依樣畫胡盧端平初患代言乏人乃略更其制出題眀注出何書乃許上請中選者堂除教官然名實既輕習者亦少昔孝宗朝議者欲科舉取士以論策共為一場制詔表章為一場上欣然欲行之而周益公等不主其說遂不行余謂若行此法則舉子無不習王言者習者既多自有精工者出於其間他時選拔而用之何患絲綸之不雅正乎楊誠齊丞零陵時有春日絶句云梅子流酸軟齒牙芭蕉分緑上忩紗日長睡起無情思間看兒童捉栁花張紫岩見之曰廷秀胸襟透脫矣與敵對壘必分兵以擾之設詐以疑之擾之則其力不給疑之則其心不安力不給則敗心不安則遁李績謂其弟德曰吾子孫若有志氣不倫交游非類者必先撾殺之而後以聞其言嚴厲如此酉陽雜俎載績孫敬業年十許嵗勇悍異甚績心患之伺其入林獵獸縱火焚林敬業見火至刳所乘馬入其腹中火過浴血而出迄不能害臨終之戒為敬業發也厥後則天之禍敬業起兵所謂一抔之土未乾六尺之孤何在者名義固正亦狂率矣卒殱其宗然武氏之立大臣力爭之以績家事一語而定唐之子孫半為血肉殱宗之禍非天報耶徐淵子詩云俸餘擬辦買山錢却買端州古硯磚依舊被渠驅使在買山之事定何年劉改之賀徐直院啓云以載鶴之船載書入覲之清標如此移買山之錢買硯平生之雅好可知淵子詞清雅余尤愛其夜泊廬山詞云風緊浪花生蛟吼鼉鳴家人睡著怕人驚只有一翁捫虱坐依約三更雪又打殘燈欲暗還眀有誰知我此時情獨對梅花傾一盞又詩成杜陵詩云孤鴈不飲啄飛鳴聲念羣誰憐一片影相失萬重雲望斷似猶見哀多如更聞野鴉無意緒鳴噪自紛紛又云獨鶴歸何晚昏鴉已滿林似興君子寡而小人多君子凄涼零落小人噂沓喧競其形容精矣世傳滿江紅詞云膠擾勞生待足後何時是足據見定隨家豐儉便堪龜縮得意濃時休進步須知世事多翻覆漫教人白了少年頭徒碌碌誰不愛黃金屋誰不羡千鍾祿奈五行不是這般題目枉費心神空計較兒孫自有兒孫福不須採藥訪神仙惟寡欲以為朱文公所作余讀而疑之以為此特安分無求者之辭耳決非文公口中語後官於容南節推翁諤為余言其所居與文公鄰嘗舉此詞問公公曰非某作也乃一僧作其僧亦自號晦庵云又水調歌頭云富貴有餘樂貧賤不堪憂那知天路幽險倚伏互相酬請看東門黃犬更聽華亭清唳千古恨難收何似鴟夷子散髮弄扁舟鴟夷子成霸業有餘謀收身千乘卿相歸把釣魚鈎春畫五湖煙浪秋夜一天雲月此外儘悠悠永棄人間事吾道付滄洲此詞乃文公作然特敷衍櫽括李杜之詩耳嘉泰中鄧友龍使金有賂驛使夜半求見者具言金為蒙古困饑饉連年民不聊生王師若來勢如拉朽友龍大喜厚賂遣之歸告托胄且上倡兵之書北伐之議遂決其後王師失利托胄誅友龍竄或疑夜半求見之人誑誕誤我然觀金之南遷録其言皆不誣此必中原義士不忘國家涵濡之澤幸金之亂潛告我使惜乎將相非人無謀浪戰竟孤其望是可歎也楊誠齊自祕書監將漕江東年未七十退休南溪之上老屋一區僅庇風雨長鬚赤腳才三四人徐靈暉贈詩云清得門如水貧唯帶有金蓋紀實也聰明强健享清閒之福十有六年寧皇初元與朱文公同召文公出公獨不起文公與公書云更能不以樂天知命之樂而忘與人同憂之憂毋過於優游毋決於遁思則區區者猶有望於斯世也然公髙蹈之志已不可違也嘗自贊云江風索我吟山月唤我飲醉倒落花前天地為衾枕又云青白不形眼底雌黃不出口中只有一罪不赦唐突眀月清風紹興甲寅壽皇不豫光宗以疾不能過宫然猶日臨內朝宰相率百官固請不從嘗降出一草茅書言建儲事宰相袖取進止上變色曰儲不豫建建即代矣朕第欲卿知其妄耳越數日宰執再以請御批有厯事嵗久念欲廢間之語壽皇升遐上不能喪羣臣相率攀上衣裾泣曰壽皇死也陛下合上輦一出隨至福寧殿不退上亦泣曰此非卿等行處可急還時中外訛言洶洶或言某將輒奔赴或言某軍私聚哭朝士有潛遁者近幸富人競匿重器都人皇皇趙忠定在西府密謀內禪念莫可達意於夀聖者韓托胄壽聖甥也乃令閣門蔡勝潜告之托胄遂因知省關禮白壽聖議始定忠定令工部尚書趙彥逾戒殿帥郭杲敇宿衛起居郎彭龜年告嘉邸備進發七月甲寅禫祭壽聖引宰相執政簾下諭曰皇帝疾至今未能執喪自欲退閒此御筆也嘉王可即皇帝位於重華宫躬行喪禮嘉王却避再三托胄扶抱登御榻流涕被面命泰安宫提舉楊舜卿往南內請八寶初猶靳豫舜卿傳奏云官家兒子做了乃得寶出事定托胄意望節鉞忠定不與知閣劉弼乘間言曰此事托胄頗有功亦合分些官職與他忠定曰渠亦有何大功弼語托胄托胄未信謁忠定以探其意忠定岸然不交一談托胄退而歎曰劉知閣不吾欺於是邪心始萌調逐忠定矣李公甫謁真西山丐詞科文字西山留之小飲書房指竹夫人為題曰蘄春縣君祝氏可封衛國夫人公甫援筆立成末聯云於戲保抱攜持朕不忘兩夜之寢展轉反側爾尚形四方之風西山擊節蓋八字用詩書全語皆婦人事而形四方之風又見竹夫人玲瓏之意其中頌德云常居大夏之間多為涼德之助剖心析肝陳數條之風刺自頂至踵無一節之瑕疵栁子厚文章精麗而心術不掩焉故理意多舛駮余嘗書其罵尸蟲文後云尸蟲伏人骸竅間狙伺𨼆慝上訴之帝意求飲食人以是多罹咎謫栁子憎而罵之余謂尸蟲未果有也果有之疑帝借以為耳目未可罵也世之人唯不知有尸蟲世之人而知有尸蟲則豈特摩牙奮距昻昻然以凶毒自名者削迹於世哉色厲內荏聲善實狠若共兜少正卯輩當亦少衰矣故余謂尸蟲之有禆於世教甚大帝之福善禍淫有藉於尸蟲甚切帝之飲以飲食也初非賞讒尸蟲之嘵嘵上訴也亦非以讒故仁人君子謂宜彰尸蟲之功於天下俾警焉可矣罵者何也且栁子何畏乎尸蟲謹修而身宅而心七情所動不違其則雖有尸蟲將焉攸訴彼若鼓其讒頰咀毒銜鋒謂巢由汚龍逢比干佞謂周孔不仁則帝之聰眀將怒殛之矣奚聽信以降割於我民設或循其首以至踵未能無面熱汗下徒憎其不為己𨼆申之以罵焉余恐秖益其訴帝之說而已張宣公帥江陵道經澧澧之士子十數輩執文書郊迎公喜見鬚眉就馬上長揖索其文觀之乃舉劉郡守政績公擲其文於地曰諸公之來某意其相與講切義理之是非啓告閭閻之利病有以見教今乃不然是特被十隻冷饅頭使耳躍馬徑去澧守上謁亦不容見嘉定間山東忠義李全跋扈日甚朝廷擇人帥山陽見大夫無可使遂用武國國武人也特換文資除大府卿以重其行國至山陽偃然自大受全庭參全軍忿怒囚而殺之幕客杜子野詩人也亦死焉初國之換文資喬壽朋以書抵史丞相曰祖宗朝制置使多用名將紹興間不獨張韓劉嶽嘗為之楊沂中吳玠吳珙劉錡王燮成閔李顯中諸人亦為之不特制置使可為樞密處置宣撫等使亦可為也豈必盡文臣哉至於文臣任邉事固有反以觀察使授之者如韓忠獻范文正陳堯咨是也今若就加本寺之官以重制帥之選初無不可乃使之處非其地遽易以清班彼修飾邉幅强自標置求以稱此人心固未易服恐反使人有輕視不平之心此不可不慮也廟堂不能從未幾果敗李全自此遂叛常曰吾不患兵不精唯患財不贍有士人教之以依朝廷式樣造楮劵全從之所造不勝計持過江南市物人莫能辨其用頓饒而江南之楮益賤上下共以全為憂辛卯上元夜酒酣自提兵攻維忽陷於城外淖中而死朱文公云古者男子拜兩膝齊屈如今之道拜杜子春注周禮竒拜以為先屈一膝如今之雅拜即今拜也古者婦女以肅拜為正謂兩膝齊跪手至地而頭不下也拜手亦然南北朝有樂府詩說婦人曰伸腰再拜跪問客今安否伸腰亦是頭不下也周宣帝令命婦相見皆跪如男子之儀不知婦人膝不跪地而變為而今之拜者起於何時程泰之以為始於武后不知是否余觀王建宫詞云射生宫女盡紅粧請得新弓各自張臨上馬時齊賜酒男兒跪拜謝君王則唐時婦女拜不跪可證矣諸葛孔眀征蠻馬謖曰攻心為上攻城為下義戰為上兵戰為下其論髙矣街亭之敗用秦穆宥孟眀故事可也蜀勢日傾蜀才日少而乃流涕斬謖過矣夫法立必誅而不權以古人八議之仁此申韓之所為也前輩謂子房之學出於黃老孔明之學出於申韓信矣近世張魏公之斬曲端趙哲乃效孔眀所為尤非也唐子西立朝賦梅花詩云桃花能紅李能白春深無處無顔色不意尚有數枝梅可是東君苦留客向來開處是嚴冬桃李未在交遊中只今已是丈人行勿與年少爭春風執政者惡其自專一斥不復後以黨禍謫羅浮作詩云說與門前白鷺羣也須從此斷知聞諸公有意除鈎黨甲乙推求恐到君殊有意味又云鶴歸遼海悲人世猿入巴山叫月眀唯有蟲沙今好在往來休傍水邉行抱朴子云周穆王南征一軍皆化君子化為猿鶴小人化為蟲沙詩意言君子或死或貶唯小人得志深畏其含沙射影也士大夫若愛一文不直一文陳簡齊詩云從來有名士不用無名錢楊伯子嘗為豫言士大夫清亷便是七分人了蓋公忠仁眀皆自此生伯子誠齊冡嗣號東山先生清節髙文趾美克肖其帥畨禺將受代有俸錢七千緡盡以代下戶輸租有詩云兩年枉了鬢霜華照管南人沒一些七百萬緡都不要脂膏留放小民家又别石門詩云石門得得泊歸舟江水依依别故侯擬把片香投贈汝這回欲帶忘來休蓋昔吳𨼆之守五羊不市南物歸舟有香一片舉而投諸石門江中用此事也其帥三山不請供給錢以忤豪貴劾去作詩貽先君云與世長多忤持身轉覺孤夤緣新齒舌收拾老頭顱我已訶瀧史君誰誦子虛同歸燈火讀家裡石渠書時先君與之同入閩故也陳膚仲作玉壺冰朱絲絃二詩送之林自和送行詩云公來無琴鶴公去有芒鞋又有幕官詩云從渠腰下有金帶何處山中無菜羹真西山入對主上問當今亷吏西山既以趙政夫為對翌日又奏臣昨所舉亷吏未盡如崔與之之出蜀唯載歸艎之圖籍楊長孺之守閩靡侵公帑之毫釐皆當今亷吏也東坡守杭守潁皆有西湖故潁川謝表云入參兩禁每玷北扉之榮出典二州輒為西湖之長秦少章詩云十里薰風菡蓞初我公所至有西湖欲將公事湖中了見說官間事亦無後謫惠州亦有西湖楊誠齊詩云三處西湖一色秋錢塘汝潁及羅浮東坡原是西湖長不到羅浮便得休胡文定春秋傳作於渡江之初其論國滅也曰春秋滅人之國其罪則一而見滅之君其例有三以歸者既無死難之節又無克復之志貪生畏死甘就執辱其罪為重許斯賴牂之類是也出奔者雖不死於社稷有興復之望焉託於諸侯猶得寓禮其罪為輕弦子溫子之類是也若夫國滅死於其位是得正而斃焉者矣於禮為合於時為不幸若江黃二國是也其㫖嚴矣如劉禪愍懷皆春秋之罪人也近時蒙古入蔡殘金之主守緒乃能聚薪自焚義不受辱庶幾於江黃陸務觀農師之孫有詩名壽皇嘗謂周益公曰今世詩人亦有如李白者乎益公因薦務觀由是擢用賜出身南宫舍人嘗從范石湖辟入蜀故其詩號劔南集多豪麗語言征伐恢復事其題俠客圖云趙魏風塵十丈黃遺民膏血飽豺狼功名不遣斯人了無奈和戎白面郎壽皇讀之為之太息臺評劾其恃酒頽放因自號放翁作詞云橋如虹水如空一葉飄然煙雨中天教稱放翁晚年為韓平原作南園記除從官楊誠齊寄詩云君居東浙我江西鏡裡新添幾縷絲花落六回疏信息月明千里兩相思不應李杜翻鯨海更羡䕫龍集鳯池道是樊川輕薄殺猶將萬戶比千詩蓋切磋之也然南園記唯勉以忠獻之事業無諛辭晚年和平粹美有中原承平時氣象朱文公喜稱之古人席地而坐登席而去履襪左氏傳禇師聲子襪而登席衛侯怒其無禮如簠簋籩豆高不踰尺便於取食今世夫子廟塑像巍然髙坐祭器乃陳於地殊覺未安朱文公云先君嘗過列子廟見其塑像以石為席而坐於地先聖像設亦宜倣此楊東山言道藏經云蝶交則粉退蜂交則黃退周美成詞云蝶粉蜂黃渾退了正用此也而說者以為宫粧且以退為褪誤矣余因歎曰區區小詞讀書不博者尚不能得其㫖況古人之文章而可以臆見妄解乎唐司空圖書云昨日流鶯今日蟬起來又是夕陽天六龍飛轡長相窘更忍乘危自著鞭戒色自戕者也楊誠齊善謔嘗謂好色者曰閻羅王未曾相唤子乃自求押到何也即此詩之意廖子晦為小官遭長官以非理對移殊不能堪朱文公以書曉之云吾人所學正要此處呈驗已展不縮已進不退只得硬脊梁與他厮捱看如何自家決定不肻開口告他若到任滿便作對移批書離任則他許多威風都無處使豈不快哉此間有吳伯起者不曾講學後聞李子靜說話自謂有所得及作令被對移他邑主簿却不肯行百方求免某嘗笑之以為何至如此若對移作指使即逐日執杖子去知府㕔前唱喏若對移作押録即逐日抱文書去知縣㕔前呈覆便作耆長壯丁亦不妨與他去做況主簿乎文公之意蓋謂心無愧怍則無入而不自得心無貪戀則無往而不自安此不於臨事遇變之時而在於平居講學之際講之素精見之素定真知夫進退得喪死生禍福之不足以纍吾心則雖鼎鑊刀鋸視之如寢席之安矣況於一陟黜豫奪之間者哉韓昌黎云夫儒者之於患難苟非其自取之其拒而不受於懷也若築河堤以障屋霤其容而消之也若水之於海冰之於夏日其玩而忘之以文辭也若奏金石以破蟋蟀之鳴蟲飛之聲況一不快於考功盛山一出入息之間哉此最善形容處考功官銜盛山地名也鶴林玉露卷十四
