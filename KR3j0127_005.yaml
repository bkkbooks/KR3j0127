body:
  text: 鶴林玉露卷五宋羅大經撰自文籍既生學者固不可不讀書子路有何必讀書之説夫子斥之至於學詩學易學禮與夫志在春秋行在孝經之説拳拳為其子及門人言之晚而歸魯刪定繫作其功至賢於堯舜則後之欲學聖人者舍書則何以哉然是時詞章之名未立科舉之法未行士之讀書者上則取之以撫世酬物又次則取之以博識多聞下至蘇秦之刺股讀書專為揣摩遊説之計固已陋矣然言詩書為有用之具固未有入耳出口如後世之甚者也蓋于今之士非堯舜文王周孔不談非語孟中庸大學不觀言必稱周程張朱學必曰致知格物此自三代而後所未有也可謂盛矣然豪傑之士不出禮義之俗不成士風日陋於一日人才嵗衰於一嵗而學校之所講逢掖之所談幾有若屠兒之禮佛倡家之讀禮者是可歎也昔子貢問子石子不學詩乎子石子曰吾暇乎哉父母求吾孝兄弟求吾弟朋友求吾信吾暇乎哉子貢曰請投吾詩以學於子公明宣學於曾子三年不讀書曾子曰宣子居參之門三年不學何也對曰安敢不學宣見夫子居親庭叱咤之聲未嘗至於犬馬宣説之學而未能宣見夫子之應賓客恭儉而不懈惰宣説之學而未能宣見夫子之居朝廷嚴臨下而不毁傷宣説之學而未能宣安敢不學而居夫子之門乎若子石子公明宣之説今之學者誠不可以不知也楚蒍吕臣奉已而不在民於是晉文無復憂已嗚呼自三代衰民不見先王之治日入於亂皆上下之間懐此一念有以致之豈獨一蒍吕臣哉此無他古學不講不識一箇仁字而已本朝大臣最是范文正公司馬温公見得此箇字分明蘇子瞻謫儋州以儋與瞻字相近也子由謫雷州以雷字下有田字也黄魯直謫宜州以宜字類直字也此章子厚騃謔之意當時有術士曰儋字從立人子儋其尚能北歸乎雷字雨在田上承天之澤也子由其未艾乎宜字乃直字有蓋棺之義也魯直其不返乎後子瞻北歸至毘陵而卒子由退老于潁十餘年乃終魯直竟卒於宜山東義士張林告淮閫曰土地歸本朝銅錢将安往此説儘是余欲添二句云人心歸本朝土地将安往光禹之罪浮於王氏六臣之罪浮於朱温人人皆王陵則吕氏不敢動矣人人皆王章則王氏不敢動矣東坡云養猫以捕鼠不可以無鼠而養不捕之猫蓄犬以防姦不可以無姦而蓄不吠之犬余謂不捕猶可也不捕鼠而捕雞則甚矣不吠猶可也不吠盜而吠主則甚矣疾視正人必欲盡擊去之非捕雞乎委心權要使天子孤立非吠主乎桂林石山恠偉東南所無韓退之謂山如碧玉簮栁子厚謂拔地峭起林立四野黄魯直謂平地蒼玉忽嶒峩近時劉叔治云環城五里皆竒石疑是虚無海上山皆極其形容然此特言石山耳至於暗洞之瑰恠尤不可具道相傳與九疑相通范石湖嘗游焉燭盡而反余嘗隨桂林伯趙季仁遊其間列炬數百隨以皷吹市人從之者以千計已而入申而出入自曾公巖出于棲霞洞入若深夜出乃白晝恍如隔宿異世季仁索余賦詩紀之其畧曰瑰竒恣捜討貝闕青瑶房方隘疑永巷峩敞如華堂玉橋巧横溪瓊户正當牕仙佛肖彷彿鍾鼓鏗擊撞贔贔左顧龜狺狺欲吠厖丹龜儼亡恙芝田藹生香摶噬千恠聚絢爛五色彰更無一塵涴但覺六月涼玲瓏穿數路屈曲通三湘神鬼妙剜刻乾坤真混茫入如深夜暗出乃皦日光隔世疑恍惚異境難揣量然終不能盡形容也又嘗遊容州勾漏洞天四面石山圍繞中平野數里洞在平地不煩登陟外畧敞豁中一暗溪穿入因同北流令結小桴秉燭坐其上命篙師撑入詰屈而行水清無底兩㟁石如虎豹猱玃森然欲摶行一里許仰見一大星炯然細視乃石穿一孔透天光若星也溪不可窮乃返洞對面髙厓上夏間望見荷葉田田然峻絶不可到土人云或見荷花則嵗必大熟宜春傅公謀詞云艸艸三間屋愛竹旋添栽碧紗牕户眼前都是翠雲堆一月山翁髙卧踏雪水村清冷木落逺山開唯有平安竹留得伴寒梅家童開門看有誰來客来一笑清話煑茗更傳杯有酒只愁無客有客又愁無酒酒熟且徘徊明日人間事天自有安排此詞清甚末句尤逹可歌也許及之為分宜宰公謀作賀雨詩云獅子關前半篆煙二龍飛下卓篙泉銀河掣電連宵雨緑野翻雲四月天便覺春生花一縣㑹看秋熟米三錢何時卓魯登黄閣都與寰區作有年及之撃節公謀尤工作酸文嘗作無遮榜語云紅旗渡口凄涼芳艸夕陽天白紙山頭慘淡落花寒食節甚工自古夷狄交侵中國衰微必人主真有哀痛之誠将帥真有憤切之志然後可以言恢復杜陵冬狩行曰草間狐兔盡何益天子不在咸陽宫規警將帥也又曰朝廷雖無幽王禍得不哀痛塵再蒙規警人主也然人主者本也人主果有興衰撥亂之志其誰敢不從故又曰烏乎得不哀痛塵再䝉所以深規警人主也大凡舉事輕捷則易成繁重則難濟春秋時宋人殺楚使者楚子聞之投袂而起屨及於窒皇劒及於寢門之外車及於蒲胥之市何其輕捷也澶淵之役冦凖與真宗論親征上欲入凖曰陛下不可入入則不出矣於是髙瓊在殿下大呼逍遥子即擁以行亦何其捷疾舉事須知此乃能壓難成功此却非倉卒所致須平時有備有謀規模定號令明然後臨事之時上下始能相應蓋亦不出易簡二字而已東坡云千鈞之牛制於三尺之童子弭耳而下之曾不如狙猿之奮擲於山林大抵易簡則輕捷繁難則重滯朱文公於當世之文獨取周益公於當世之詩獨取陸放翁蓋二公詩文氣質渾厚故也人之狂惑失其本心有大可笑者南史范雲初為陳武帝屬官武帝九錫之命在旦夕雲忽感寒疾恐不獲預慶事召徐文伯診視以實懇之曰可便得愈乎文伯曰欲便差甚易政恐二年後不復起耳雲曰朝聞道夕死猶可况二年乎文伯乃以火燒地布桃葉設席置雲其上頃刻汗解裹以温松翌日有瘳雲喜甚文伯曰不足喜也越二年果卒夫老子曰身與名孰親况於榮貴外物有道之士蓋視為塵垢粃糠藉曰所見未超未能忘情則亦必有此身乃可有此榮貴也今雲欲預九錫之慶乃甘心促夀愈疾以從之所謂皮之不存毛将安傅豈不愚惑之甚哉且其言曰朝問道夕死可矣夫輔人以簒奪而分其富貴是果何道哉末世之士不知世間香臭至於如此亦可哀矣東坡云劉聰聞為遮湏國王則不復畏死人之愛富貴有甚於生者月犯少微呉中髙士求死不得人之好名有甘於一死者固皆可笑矣然未若范雲可笑之甚也杜成已為相以為宰相日見賓客疲神妨務無益於事乃不復見客但設青櫃於府門有欲言利害者投之越旬日并櫃撤去有題一聯于府門者曰杜光範之門人將望而去矣撤暗投之櫃我且卷而懐之夫題門者則已薄矣而成已此舉亦未之思也楊慈湖詩云山禽説我胸中事煙栁藏他物外機又云萬里蒼茫融妙意三杯虚白浴天真又六言云净几横琴曉寒梅花落在絃間我欲清吟無句轉煩門外青山句意清圓足覘其所養殿帥楊存中有所親愛吏平居賜予無筭一旦無故怒而逐之吏莫知得罪之由泣拜辭去存中曰無事莫来見我吏悟其意歸以厚貲俾其子入臺中為吏居無何御史欲論存中乾没軍中糞錢十餘萬其子聞知告其父其父奔告存中存中即具劄奏言軍中有糞錢若干椿管某處惟朝廷所用不數日果以為言髙宗出存中劄子示之御史坐妄言被黜而存中之眷日隆存中之逐吏亦兵法之餘智也然御史可謂不宻矣淵明雪詩云傾耳無希聲在目皓已結只十字而雪之輕虚潔白盡在是矣後来者莫能加也士豈能長守山林長親蓑笠但居市朝軒冕時要使山林蓑笠之念不忘乃為勝耳陶淵明赴鎮軍參軍詩曰望雲慙髙鳥臨水愧游魚真想初在襟誰謂形迹拘似此胸襟豈為外榮所㸃染哉荆公拜相之日題詩壁間曰霜松雪竹鍾山寺投老歸歟寄此生只為他見趣髙故合則留不合則拂袖便去更無拘絆山谷云佩玉而心若槁木立朝而意在東山亦此意也許由不受堯之天下逃諸逆旅逆旅人疑其竊皮冠伯夷叔齊適周周使叔旦往見之曰加富二等就官一列血牲而盟之二子相視而笑此雖寓言然人識見相逺奚啻九牛毛其不知心者亦往往類此陸象山家于撫州金谿累世義居一人最長者為家長一家之事聽命焉逐年選差子弟分任家事或主田疇或主租税或主出納或主厨爨或主賓客公堂之田僅足給一嵗之食家人計口打飯自辦蔬肉不合食私房婢僕各自供給許以米附炊每清曉附炊之米交至掌厨爨者置厯交收飯熟按厯給散賓至則掌賓者先見之然後白家長出見欵以五酌但隨堂飯食夜則巵酒杯羮雖久留不厭每晨興家長率衆子弟致恭于祖禰祠堂聚揖于㕔婦女道萬福于堂暮安置亦如之子弟有過家長㑹衆子弟責而訓之不改則撻之終不改度不可容則告於官屏之逺方晨揖擊皷三疊子弟一人唱云聽聽聽勞我以生天理定若還懶惰必饑寒莫到饑寒方怨命虚空自有神明聽又唱云聽聽聽衣食生身天付定酒肉貪多折人夀經營太甚違天命定定定楊誠齋為零陵丞以弟子禮謁張魏公時公以遷謫故杜門謝客南軒為之介紹數月乃得見因跪請教公曰元符貴人腰金紆紫者何限惟鄒至完陳瑩中姓名與日月爭光誠齋得此語終身厲清直之操晚年退休悵然曰吾平生志在批鱗請劒以忠鯁南遷幸遇時平主聖老矣不獲遂所願矣立朝時論諫挺挺如乞用張浚配享言朱熹不當與唐仲友同罷論儲君監國皆天下大事髙宗嘗曰楊萬里直不中律孝宗亦曰楊萬里有性氣故其自賛云禹曰也有性氣舜云直不中律自有二聖玉音不用千秋史筆胡澹庵見楊龜山龜山舉兩肘示之曰吾此肘不離案三十年然後於道有進張無垢謫横浦寓城西寳界寺其寢室有短牕每日昩爽輒抱書立窓下就明而讀如是者十四年洎北歸窓下石上雙跌之跡隱然至今猶存前輩為學勤苦如此然龜山蓋少年事無垢乃晚年尤難也歐陽公居永豐縣之沙溪其考崇公葬焉所謂瀧岡阡是也厥後奉母鄭夫人之喪歸合葬載青州石鐫阡表石緑色髙丈餘光可鑑阡近沙山太守廟襄事禱于廟祝板猶存曰大事有日陰雲屢興假以三日之晴則拜神之賜其敢忘報執政得立功徳寺公素排佛教雅不欲立寺崇公諱觀又不可立觀乃立青陽宫然公自葬鄭夫人之後不復歸故鄉其作吉州學記云幸余他日因得歸榮故鄉将見吉之士皆道徳明秀而可為公卿問於其俗而婚喪飲食皆中禮節入於其里而長幼相孝慈觀於其家行於其郊而少者扶其羸老壮者代其負荷於道路然後樂學之道成而得時從先生耆老席于衆賓之後聽鄉樂之歌飲獻酬之酒而以詩頌天子太平之功周覽學舍思詠李侯之遺愛不亦美哉雖有此言而迄不踐樂潁昌山水作思潁詩退休竟老焉前輩議其無囘首敝廬息肩喬木之意近時周益公歸休尹直卿以詩賀之云六一先生薄吉州歸田去作穎昌游我公不向螺江住羞殺青原白鷺洲夀皇在宫中常攜一漆拄杖宦官宫妾莫得睨視嘗游後苑偶忘攜焉特命小黄門取之二人竭力曳以来蓋精鐵也上方有意中原故陰自習勞苦如此東坡賛文與可梅竹石云梅寒而秀竹痩而夀石醜而文是為三益之友席子擇遭喪山谷憐其貧糾合同志者助之其辭云富貴不仁理難共語仁者不富孰能獨成百足之蟲至死不僵以扶之者衆也願與諸君同力賑之二帖余皆見其真跡坡谷集所不載周益公參大政朱文公與劉子澄書云如今是大氣證渠却下四君子湯雖不為害恐無益於病爾嗚呼以乾淳之盛文公猶恨當國者不用大承氣湯况下於乾淳者乎然歴考往聖如孔子相魯而下大承氣湯固是對證大舜繼堯亦不免下大承氣湯信矣文公之為名言也益公初在後省龍大淵曽覿除閣門格其制不下奉祠而去十年不用天下髙之後入直翰林覿以使事還除節鉞人謂公必不草制而公竟草之其詞云八綂馭民敬故在尊賢之上宜其不敢用大承氣湯也歐陽子曰隱公非攝也使隱果攝則春秋不稱公春秋稱公則隱公非攝無疑也此論未然春秋雖不書隱公居攝而於書仲子之事自隱然可見夫母以子貴世俗之情也使桓不將立則仲子特一生公子之妾耳周王何為而歸其賵魯國何為而考其宫今也歸賵而不嫌瀆亂之譏考官而加嚴事之禮徒以桓之將為君也桓將為君則隱之攝著矣或曰隱攝則何以稱公東坡曰周公攝而克復子者也故不稱王隱公攝而不克復子者也故稱公史有諡國有廟春秋獨得不稱公乎此論亦未然周公之攝也誥命之際曰周公曰王若曰曷嘗自稱王乎竊意魯史舊文必著隱公攝位之實去攝而書公乃仲尼之特筆一以著隱之不當遜一以著桓之不當立二者皆非也歐公論隱公趙盾許止事皆未明春秋之㫖春秋之所以為春秋者正當微顯闡幽若但直書其事則夫人能矣何為游夏不能措一辭哉朱文公與慶國卓夫人書云聞尊意欲為五哥經營幹官差遣某切以為不可人家子弟多因此壊却心性蓋其生長富貴本不知艱難一旦仕宦便為此官逐司只有使長一人可相拘轄又多寛厚長者不欲以法度見繩上無職事了辦之責下無吏民繫縶之憂而州縣守令勢反出已下可以陵轢故後生子弟為此官者無不傲慢縱恣觸事懵然愚意以為可且為營一稍在人下職事喫人打罵差遣乃所以成就之若必欲與求幹官乃是置之有過之地誤其終身前輩愛人以徳至於如此卓夫人乃少傅劉公子羽之配樞宻其父之母五哥即平甫朱與劉蓋姻婭初文公之父韋齋疾革手自為書以家事屬少傅韋齋殁文公年十四少傅為築室於其里俾奉母居焉少傅手書與白水劉致中云於緋溪得屋五間器用完備又於七倉前得地可以樹有圃可蔬有池可魚朱家人口不多可以居文公視卓夫人猶母云五代史漢王章不喜文士常語人曰此輩與一把筭子未知顛倒何益於國筭子本俗語歐公據其言書之殊有古意温公通鑑改作授之握筭不知縱横不如歐史矣農圃家風漁樵樂事唐人絶句模冩精矣余摘十首題壁間每菜羮豆飯後啜苦茗一杯偃卧松窓竹榻間令兒童吟誦數過自謂勝如吹竹彈絲今記於此韓偓云聞説經旬不啟關藥窓誰伴醉開顔夜来雪壓前村竹剰看溪南幾尺山又云萬里清江萬里天一村桑柘一村煙漁翁醉着無人喚過午醒来雪滿船長孫佐輔云獨訪山家歇還涉茅屋斜連隔松葉主人聞語未開門繞籬野菜飛黄蝶薛能云邵平𤓰地接吾廬榖雨乾時偶自鋤昨夜春風欺不在就牀吹落讀殘書韋莊云南陵酒熟愛相招蘸甲傾来緑滿瓢一醉不知三日事任他童稚作漁樵杜荀鶴云山雨溪風捲釣絲瓦甌蓬底獨斟時醉来睡着無人喚流下前灘也不知陸龜蒙云雨後沙虚古岸崩漁梁攜入亂雲層歸時月落汀洲暗認得山妻結網燈鄭谷云白頭波上白頭翁家逐船移浦浦風一尺鱸魚新釣得兒孫吹火荻花中李商隱云城郭休過識者稀哀猿啼處有柴扉滄江白石漁家路薄暮歸来雨濕衣張演云鵞湖山下稻梁肥豚柵雞栖對掩扉桑柘影斜春社散家家扶得醉人歸唐人栁詩云水邊楊栁緑煙絲立馬煩君折一枝惟有春風最相惜殷勤更向手中吹朱文公每喜誦之取其興也宋文帝時司徒義康顓總朝權四方饋遺皆以上品薦義康而以次品供御上嘗冬月啖柑嘆其形味並劣義康曰今年柑殊有佳者遣人還東府取柑大供御者三寸上寖不能平義康旋以罪廢唐代宗謂李泌曰路嗣恭獻瑠璃盤九寸乃以徑尺者遺元載須其至議之賴泌一言嗣恭免罪而元載竟誅吕許公不肯多進淮白魚蓋懲此也秦檜之夫人常入禁中顯仁太后言近日子魚大者絶少夫人對曰妾家有之當以百尾進歸告檜檜咎其失言與其館客謀進青魚百尾顯仁拊掌笑曰我道這婆子村果然蓋青魚佀子魚而非特差大爾觀此賊檜之姦可見鶴林玉露卷五
